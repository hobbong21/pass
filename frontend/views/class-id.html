<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PASS 학급증 — 3-way 토글 (학급증/추가하기/인증현황)</title>
<script src="../lib/pass-api.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --chon-orange: #F7931E;
    --chon-orange-dark: #E87F0A;
    --chon-yellow-soft: #FFF3D6;
    --bg-app: #FFFBF0;
    --bg-empty: #F8FAFC;
    --text-primary: #1F1F1F;
    --text-secondary: #64748B;
    --text-tertiary: #94A3B8;
    --school-blue: #2563EB;
    --school-blue-light: #DBEAFE;
    --teacher-color: #DC2626;
    --teacher-bg: #FEE2E2;
    --teacher-border: #FCA5A5;
    --parent-color: #059669;
    --parent-bg: #D1FAE5;
    --parent-border: #6EE7B7;
    --student-color: #2563EB;
    --student-bg: #DBEAFE;
    --student-border: #93C5FD;
    --student-self-bg: #FFFFFF;
    --student-self-border: #F7931E;
    --container-class: rgba(220, 38, 38, 0.08);
    --container-class-border: rgba(220, 38, 38, 0.3);
    --container-students: rgba(37, 99, 235, 0.06);
    --container-students-border: rgba(37, 99, 235, 0.25);
    --container-myhome: rgba(255, 230, 200, 0.7);
    --container-myhome-border: rgba(247, 147, 30, 0.6);
    --status-confirmed: #10B981;
    --status-pending: #F59E0B;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 14px rgba(0,0,0,0.08);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.14);
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-pill: 999px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%);
    color: var(--text-primary);
    min-height: 100vh;
  }
  .demo-wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .demo-header {
    background: white;
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-md);
  }
  .demo-header h1 {
    margin: 0 0 8px;
    font-size: 24px;
    color: var(--school-blue);
    font-weight: 900;
  }
  .demo-header p {
    margin: 4px 0;
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.6;
  }
  .demo-badge {
    display: inline-block;
    background: var(--school-blue-light);
    color: var(--school-blue);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 700;
    margin-right: 6px;
  }
  .phones-grid {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .phone-wrapper { display: flex; flex-direction: column; align-items: center; }
  .phone-caption {
    background: var(--school-blue);
    color: white;
    padding: 8px 20px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 14px;
  }
  .phone {
    width: 380px;
    max-width: 100%;
    height: 800px;
    background: #C8C2BC;
    border-radius: 48px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    background: var(--bg-app);
    border-radius: 38px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* 모바일 — 폰 목업 베젤 제거, 도구를 전체 화면으로 */
  @media (max-width: 480px) {
    body { background: var(--bg-app); }
    .demo-wrap { padding: 0; max-width: 100%; }
    .demo-header, .phone-caption { display: none; }
    .phones-grid { display: block; gap: 0; }
    .phone-wrapper { width: 100%; }
    .phone {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      background: var(--bg-app);
    }
    .phone-screen { border-radius: 0; }
  }
  .status-bar {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px 0;
    font-size: 13px;
    font-weight: 700;
    position: relative;
  }
  .status-bar .camera-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: #1F1F1F; border: 2px solid #2A2A2A;
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  }
  .app-header {
    padding: 8px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .app-header h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 900;
    flex: 1;
    text-align: center;
  }
  .header-action {
    background: var(--bg-app);
    border: 1.5px solid var(--school-blue);
    color: var(--school-blue);
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    flex-shrink: 0;
  }
  .view-toggle {
    display: flex;
    gap: 4px;
    padding: 0 16px 12px;
  }
  .view-toggle-btn {
    flex: 1;
    background: white;
    border: 1.5px solid #E2E8F0;
    color: var(--text-secondary);
    padding: 9px 6px;
    border-radius: var(--radius-md);
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .view-toggle-btn.active {
    background: var(--school-blue);
    color: white;
    border-color: var(--school-blue);
  }
  .content {
    flex: 1;
    background: white;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .view-panel { display: none; }
  .view-panel.active { display: block; }

  /* ============================================
     Verify Summary Card
     ============================================ */
  .verify-summary {
    display: flex;
    gap: 8px;
    padding: 12px 16px 16px;
  }
  .verify-stat-card {
    flex: 1;
    background: white;
    border: 1.5px solid #E2E8F0;
    border-radius: var(--radius-md);
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .verify-stat-card.confirmed {
    border-color: rgba(16, 185, 129, 0.4);
    background: rgba(16, 185, 129, 0.06);
  }
  .verify-stat-card.pending {
    border-color: rgba(245, 158, 11, 0.4);
    background: rgba(245, 158, 11, 0.06);
  }
  .verify-stat-card:active { transform: scale(0.97); }
  .verify-stat-value {
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
  }
  .verify-stat-value.confirmed { color: var(--status-confirmed); }
  .verify-stat-value.pending { color: var(--status-pending); }
  .verify-stat-value.total { color: var(--text-primary); }
  .verify-stat-label {
    font-size: 10px;
    color: var(--text-tertiary);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-top: 6px;
  }
  .verify-quick-btn {
    background: var(--school-blue);
    color: white;
    border: none;
    padding: 4px 10px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    margin-left: 4px;
  }
  .verify-quick-btn:active { transform: scale(0.95); }

  /* ============================================
     Graph View (학급증 그래프)
     ============================================ */
  .graph-canvas-wrap {
    margin: 0 16px;
    background: var(--bg-empty);
    border: 1px solid #E2E8F0;
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  #graphSvg {
    width: 100%;
    height: 480px;
    display: block;
  }
  .graph-node-group { cursor: pointer; transition: filter 0.15s; }
  .graph-node-group:hover .graph-node-rect { filter: brightness(1.05); }
  .graph-node-group.me-glow .graph-node-rect {
    filter: drop-shadow(0 0 6px rgba(247, 147, 30, 0.4));
  }
  .graph-node-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    font-weight: 700;
    fill: var(--text-primary);
    pointer-events: none;
    text-anchor: middle;
  }
  .graph-node-rel {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 8.5px;
    font-weight: 500;
    fill: var(--text-tertiary);
    pointer-events: none;
    text-anchor: middle;
  }
  .graph-node-avatar {
    font-size: 26px;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .graph-tier-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 9px;
    font-weight: 700;
    fill: var(--text-tertiary);
    pointer-events: none;
    text-anchor: start;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .graph-legend {
    margin: 12px 16px 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .gl-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
  }
  .gl-line {
    width: 18px;
    height: 2px;
    border-radius: 1px;
    display: inline-block;
  }
  .gl-line.dashed {
    background: repeating-linear-gradient(90deg,
      currentColor 0, currentColor 3px,
      transparent 3px, transparent 6px) !important;
    background-color: transparent !important;
    height: 2px;
  }
  .class-card {
    background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%);
    margin: 12px 16px 8px;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .class-avatar {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: white;
    border: 2.5px solid var(--school-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .class-info { flex: 1; min-width: 0; }
  .class-name {
    font-size: 15px;
    font-weight: 900;
    margin-bottom: 2px;
  }
  .class-stats {
    font-size: 11px;
    color: var(--school-blue);
    font-weight: 700;
    display: flex;
    gap: 10px;
  }
  .scope-info {
    background: #EFF6FF;
    border: 1px solid #BFDBFE;
    border-radius: var(--radius-md);
    margin: 0 16px 8px;
    padding: 10px 12px;
    font-size: 11px;
    color: #1E40AF;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
  }
  .scope-info strong {
    display: block;
    color: #1E3A8A;
    margin-bottom: 2px;
  }
  .section-header {
    padding: 16px 16px 8px;
  }
  .section-header h2 {
    margin: 0;
    font-size: 14px;
    font-weight: 800;
  }
  .legend {
    padding: 0 16px 8px;
  }
  .legend-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 10px;
  }
  .legend-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: white;
    padding: 3px 8px;
    border-radius: var(--radius-pill);
    border: 1px solid #E2E8F0;
    color: var(--text-secondary);
    font-weight: 700;
  }
  .legend-chip .lc-swatch {
    width: 12px; height: 8px;
    border-radius: 3px;
    border: 1.5px solid;
  }
  .class-canvas {
    padding: 16px;
    background: var(--bg-empty);
    margin: 0 16px;
    border-radius: var(--radius-md);
  }
  .class-box {
    background: var(--container-class);
    border: 2px solid var(--container-class-border);
    border-radius: 14px;
    padding: 14px;
    position: relative;
    min-width: 280px;
  }
  .class-box-label {
    position: absolute;
    top: -10px;
    left: 14px;
    background: white;
    padding: 3px 12px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 800;
    color: var(--teacher-color);
    border: 1px solid var(--teacher-color);
  }
  .teacher-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .students-container {
    background: var(--container-students);
    border: 1.5px dashed var(--container-students-border);
    border-radius: 12px;
    padding: 14px 10px 10px;
    position: relative;
  }
  .students-label {
    position: absolute;
    top: -9px;
    left: 12px;
    background: white;
    padding: 2px 10px;
    border-radius: var(--radius-pill);
    font-size: 10px;
    font-weight: 800;
    color: var(--student-color);
    border: 1px solid var(--student-color);
  }
  .my-home-block {
    background: var(--container-myhome);
    border: 2px solid var(--container-myhome-border);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
    position: relative;
  }
  .my-home-label {
    position: absolute;
    top: -9px;
    left: 12px;
    background: white;
    padding: 2px 10px;
    border-radius: var(--radius-pill);
    font-size: 10px;
    font-weight: 800;
    color: var(--chon-orange-dark);
    border: 1px solid var(--chon-orange-dark);
  }
  .my-home-parents {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin: 6px 0 8px;
    flex-wrap: wrap;
  }
  .my-home-student {
    display: flex;
    justify-content: center;
  }
  .students-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .person-node {
    background: var(--student-bg);
    border: 2px solid var(--student-border);
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
  }
  .person-node:active { transform: scale(0.97); }
  .person-node.teacher {
    background: var(--teacher-bg);
    border-color: var(--teacher-border);
    min-width: 100px;
    padding: 10px 12px;
  }
  .person-node.parent {
    background: var(--parent-bg);
    border-color: var(--parent-border);
    min-width: 70px;
  }
  .person-node.self {
    background: var(--student-self-bg);
    border-color: var(--student-self-border);
    border-width: 2.5px;
    box-shadow: 0 0 0 3px rgba(247, 147, 30, 0.15);
    min-width: 90px;
    padding: 10px;
  }
  .person-node.pending {
    border-style: dashed;
  }
  .person-node.selected {
    box-shadow: 0 0 0 3px rgba(247, 147, 30, 0.3);
    border-color: var(--chon-orange);
  }
  .person-node-role {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text-tertiary);
    margin-bottom: 1px;
  }
  .person-node.teacher .person-node-role { color: var(--teacher-color); }
  .person-node.parent .person-node-role { color: var(--parent-color); }
  .person-node.student .person-node-role { color: var(--student-color); }
  .person-node-name {
    font-size: 12px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .person-node.self .person-node-name { color: var(--chon-orange); }
  .person-node-extra {
    font-size: 9px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }
  .person-confirm-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 16px; height: 16px;
    background: var(--status-confirmed);
    color: white;
    border-radius: 50%;
    font-size: 9px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid white;
  }
  .person-confirm-badge.pending {
    background: var(--status-pending);
  }
  .empty-slot-node {
    background: white;
    border: 2px dashed #94A3B8;
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
    cursor: pointer;
    color: #94A3B8;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 50px;
  }
  .empty-slot-node:active {
    background: var(--chon-yellow-soft);
    border-color: var(--chon-orange);
    color: var(--chon-orange-dark);
  }
  .empty-slot-node.add-classmate {
    grid-column: 1 / -1;
    padding: 12px;
  }
  .action-panel {
    position: absolute;
    background: white;
    border: 2px solid var(--chon-orange);
    border-radius: var(--radius-md);
    padding: 8px;
    box-shadow: var(--shadow-lg);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 150px;
    animation: panelPop 0.2s ease;
  }
  @keyframes panelPop {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .action-panel::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 8px solid var(--chon-orange);
  }
  .ap-btn {
    background: white;
    border: 1.5px solid #E2E8F0;
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .ap-btn:active { transform: scale(0.97); }
  .ap-btn.order { border-color: #6366F1; color: #3730A3; }
  .ap-btn.confirm { border-color: var(--status-confirmed); color: var(--status-confirmed); }
  .ap-btn.delete { border-color: #FCA5A5; color: #DC2626; }
  .list-section { padding: 0 16px 24px; margin-top: 8px; }
  .list-tier { margin-bottom: 16px; }
  .list-tier-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .tier-badge {
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 800;
    color: white;
  }
  .tier-badge.teacher { background: var(--teacher-color); }
  .tier-badge.parent { background: var(--parent-color); }
  .tier-badge.student { background: var(--student-color); }
  .tier-count { color: var(--text-tertiary); font-size: 11px; font-weight: 600; }
  .list-item {
    background: white;
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid #F1F5F9;
    cursor: pointer;
  }
  .list-item-avatar {
    width: 32px; height: 32px;
    border-radius: 6px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .list-item.teacher .list-item-avatar { background: var(--teacher-color); }
  .list-item.parent .list-item-avatar { background: var(--parent-color); }
  .list-item.student .list-item-avatar { background: var(--student-color); }
  .list-item.self .list-item-avatar {
    background: white;
    border: 2px solid var(--chon-orange);
    color: var(--chon-orange);
  }
  .list-item-info { flex: 1; min-width: 0; }
  .list-item-name {
    font-size: 13px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .list-item-rel { font-size: 11px; color: var(--text-tertiary); }
  .list-item-status { font-size: 10px; font-weight: 700; }
  .attendance-pill {
    background: var(--student-bg);
    color: var(--student-color);
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    font-size: 9px;
    font-weight: 800;
  }
  .modal-fs {
    position: absolute;
    inset: 0;
    background: var(--bg-app);
    z-index: 100;
    display: none;
    flex-direction: column;
    border-radius: 38px;
    overflow: hidden;
  }
  .modal-fs.visible {
    display: flex;
    animation: slideUpFs 0.3s ease;
  }
  @keyframes slideUpFs {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-fs-header {
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #E2E8F0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-fs-close {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text-secondary);
    cursor: pointer;
    width: 32px; height: 32px;
  }
  .modal-fs-title { font-size: 16px; font-weight: 900; text-align: center; flex: 1; }
  .modal-fs-save {
    background: var(--school-blue);
    color: white;
    border: none;
    padding: 6px 16px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  .modal-fs-body { flex: 1; overflow-y: auto; padding: 20px; }
  .modal-intro {
    background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12px;
    line-height: 1.5;
  }
  .modal-intro .intro-emoji { font-size: 24px; }
  .modal-intro strong { color: var(--school-blue); display: block; margin-bottom: 2px; }
  .modal-section { margin-bottom: 22px; }
  .modal-section-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--text-secondary);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #E2E8F0;
    border-radius: var(--radius-md);
    font-size: 16px;
    font-family: inherit;
    background: white;
  }
  .modal-input:focus { outline: none; border-color: var(--school-blue); }
  .order-stepper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border: 2px solid #E2E8F0;
    border-radius: var(--radius-md);
    padding: 8px 12px;
  }
  .order-stepper-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: var(--school-blue-light);
    color: var(--school-blue);
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
  }
  .order-stepper-btn:active { transform: scale(0.92); }
  .order-stepper-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .order-stepper-value {
    flex: 1;
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    color: var(--school-blue);
  }
  .order-hint {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 8px;
  }
  .toast {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: var(--text-primary);
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
  }
  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .desc-panel {
    background: white;
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 340px;
    box-shadow: var(--shadow-md);
  }
  .desc-panel h3 {
    margin: 0 0 12px;
    font-size: 16px;
    color: var(--school-blue);
    font-weight: 900;
  }
  .desc-section {
    margin-bottom: 18px;
    padding-bottom: 16px;
    border-bottom: 1px solid #F1F5F9;
  }
  .desc-section:last-child { border-bottom: none; }
  .desc-section h4 {
    margin: 0 0 8px;
    font-size: 13px;
    font-weight: 800;
  }
  .desc-section p, .desc-section ul {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-secondary);
    margin: 4px 0;
  }
  .desc-section ul { padding-left: 18px; }
  .desc-section strong { color: var(--text-primary); }
  .key-feature {
    display: flex;
    gap: 10px;
    padding: 10px;
    background: var(--school-blue-light);
    border-radius: var(--radius-md);
    margin-bottom: 8px;
    font-size: 11px;
    line-height: 1.5;
  }
  .key-feature .kf-icon { font-size: 20px; flex-shrink: 0; }
  .key-feature strong {
    color: var(--school-blue);
    display: block;
    margin-bottom: 2px;
    font-size: 12px;
  }
  .removed-list {
    background: #FEE2E2;
    border-radius: var(--radius-md);
    padding: 10px 12px;
    font-size: 11px;
    color: #991B1B;
    margin-bottom: 8px;
  }
  .removed-list strong {
    display: block;
    margin-bottom: 4px;
    color: #7F1D1D;
  }
  .removed-list ul {
    padding-left: 18px;
    margin: 4px 0 0;
  }
  .design-diagram {
    background: var(--bg-empty);
    border-radius: 10px;
    padding: 12px;
    margin: 8px 0;
    font-size: 10px;
    line-height: 1.5;
    font-family: 'SF Mono', Consolas, monospace;
    white-space: pre;
    overflow-x: auto;
  }
  @media (max-width: 800px) {
    .phones-grid { flex-direction: column; align-items: center; }
    .desc-panel { width: 100%; max-width: 600px; }
  }

  /* ============================================
     Single-screen mode — 데모 베젤·래퍼 제거 후 phone-screen이 메인
     반응형: 모바일은 edge-to-edge, 데스크톱은 중앙 정렬 + 외곽 배경
     ============================================ */
  body {
    background: var(--bg-app);
    min-height: 100vh;
  }
  .phone-screen {
    border-radius: 0;
    min-height: 100vh;
    height: auto;
    max-width: 480px;
    margin: 0 auto;
    box-shadow: none;
  }
  @media (min-width: 768px) {
    body { background: #F5F7FB; padding: 32px 0; }
    .phone-screen {
      min-height: calc(100vh - 64px);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
  }
  .add-actions {
    display: flex;
    gap: 8px;
    padding: 12px 16px 0;
  }
  .add-btn {
    flex: 1;
    background: white;
    border: 1.5px solid var(--student-border);
    color: var(--student-color);
    padding: 10px 12px;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  .add-btn:active { transform: scale(0.97); }

  /* ============================================
     Utility classes — inline style 대체
     ============================================ */
  .spacer-30 { height: 30px; }
  .self-tag { font-size: 9px; }
  .name-self { color: var(--chon-orange); }
  .gl-line--confirmed { background: var(--status-confirmed); }
  .gl-line--pending { background: var(--status-pending); }
  .list-item-status.confirmed { color: var(--status-confirmed); }
  .list-item-status.pending { color: var(--status-pending); }
</style>
</head>
<body>

<div class="phone-screen">
  <div class="status-bar">
    <span>9:30</span>
    <div class="camera-dot"></div>
    <div>▲ ◢ █</div>
  </div>
  <div class="app-header">
    <button class="header-action home" onclick="window.location.href='../main/home.html'">‹ 홈</button>
    <h1>🎓 학급증</h1>
    <button class="header-action" onclick="resetAll()">처음부터</button>
  </div>
  <div class="content">
    <div class="class-card">
      <div class="class-avatar">🎓</div>
      <div class="class-info">
        <div class="class-name">행복초 3학년 2반</div>
        <div class="class-stats">
          <span>👥 <strong id="statTotal">7</strong>명</span>
          <span>✓ <strong id="statConfirmed">6</strong>명</span>
        </div>
      </div>
    </div>

    <div class="graph-canvas-wrap">
      <svg id="graphSvg" viewBox="0 0 360 600" preserveAspectRatio="xMidYMid meet">
        <g id="graphEdges"></g>
        <g id="graphNodes"></g>
      </svg>
    </div>
    <div class="graph-legend">
      <div class="gl-item"><span class="gl-line gl-line--confirmed"></span> 인증됨</div>
      <div class="gl-item"><span class="gl-line dashed gl-line--pending"></span> 대기</div>
    </div>
    <div class="add-actions">
      <button class="add-btn" onclick="openModalForSlot('student')">＋ 학급친구</button>
    </div>
    <div class="spacer-30"></div>
  </div>

          <div class="modal-fs" id="modalFs1">
            <div class="modal-fs-header">
              <button class="modal-fs-close" onclick="closeFsModal()">✕</button>
              <div class="modal-fs-title" id="modalFsTitle1">새 학급친구 추가</div>
              <button class="modal-fs-save" onclick="confirmFsAdd()">완료</button>
            </div>
            <div class="modal-fs-body">
              <div class="modal-intro">
                <span class="intro-emoji">💡</span>
                <div>
                  <strong>안내</strong>
                  <span id="modalIntroText1">학급친구를 등록하세요.</span>
                </div>
              </div>
              <div class="modal-section">
                <div class="modal-section-label">이름</div>
                <input type="text" class="modal-input" id="modalFsName1" placeholder="홍길동" autocomplete="off"/>
              </div>
              <div class="modal-section" id="modalAttendanceSection">
                <div class="modal-section-label">출석번호</div>
                <div class="order-stepper">
                  <button class="order-stepper-btn" onclick="changeAttendance(-1)" id="attendDownBtn">−</button>
                  <div class="order-stepper-value">
                    <span id="attendValue">1</span>번
                  </div>
                  <button class="order-stepper-btn" onclick="changeAttendance(1)">＋</button>
                </div>
                <div class="order-hint">출석번호순으로 정렬됩니다</div>
              </div>
            </div>
          </div>

  <div class="toast" id="toast1"><span id="toastEmoji1">✓</span><span id="toastText1"></span></div>

</div>

<script>
const initialMe = {
  id: 'me', name: '홍길순', role: 'student', isSelf: true, gender: 'female',
  confirmed: true, attendanceNo: 5
};

const initialPeople = [
  { id: 't1', name: '김선생님', role: 'teacher', gender: 'female', confirmed: true },
  { id: 'mom_self', name: '엄마', role: 'parent', confirmed: true, isMyHome: true },
  { id: 'dad_self', name: '아빠', role: 'parent', confirmed: true, isMyHome: true },
  { id: 's1', name: '김영희', role: 'student', gender: 'female', confirmed: true, attendanceNo: 1 },
  { id: 's2', name: '박철수', role: 'student', gender: 'male', confirmed: true, attendanceNo: 3 },
  { id: 's3', name: '이민지', role: 'student', gender: 'female', confirmed: true, attendanceNo: 12 },
  { id: 's4', name: '정수민', role: 'student', gender: 'female', confirmed: false, attendanceNo: 22 }
];

let state = {
  me: { ...initialMe },
  people: JSON.parse(JSON.stringify(initialPeople))
};

let selectedNodeId = null;
let pendingAttendance = 1;
let pendingTarget = null;
let currentView = 'graph';

function getPerson(id) {
  if (id === 'me' || id === state.me.id) return state.me;
  return state.people.find(x => x.id === id);
}

function sortByAttendance(arr) {
  return [...arr].sort((a, b) => (a.attendanceNo || 999) - (b.attendanceNo || 999));
}

function switchView(_view) {
  renderGraph();
  document.querySelectorAll('.action-panel').forEach(p => p.remove());
}

function renderTree() {
  const canvas = document.getElementById('classCanvas');
  if (!canvas) return;
  canvas.innerHTML = '';

  const teacher = state.people.find(p => p.role === 'teacher');
  const myHomeParents = state.people.filter(p => p.role === 'parent' && p.isMyHome);
  const classmates = sortByAttendance(state.people.filter(p => p.role === 'student'));

  const classBox = document.createElement('div');
  classBox.className = 'class-box';
  classBox.innerHTML = `<div class="class-box-label">🏫 행복초 3-2 학급</div>`;

  const teacherRow = document.createElement('div');
  teacherRow.className = 'teacher-row';
  if (teacher) {
    teacherRow.appendChild(makePersonNode(teacher));
  } else {
    teacherRow.appendChild(makeEmptySlot('+담임 교사', 'teacher'));
  }
  classBox.appendChild(teacherRow);

  const studentsContainer = document.createElement('div');
  studentsContainer.className = 'students-container';
  studentsContainer.innerHTML = `<div class="students-label">👥 학생 (${classmates.length + 1}명)</div>`;

  // My home block
  const myHomeBlock = document.createElement('div');
  myHomeBlock.className = 'my-home-block';
  myHomeBlock.innerHTML = `<div class="my-home-label">🏠 우리집 · ${state.me.attendanceNo}번</div>`;

  const parentsRow = document.createElement('div');
  parentsRow.className = 'my-home-parents';
  if (myHomeParents.length > 0) {
    myHomeParents.forEach(p => parentsRow.appendChild(makePersonNode(p)));
  } else {
    parentsRow.appendChild(makeEmptySlot('+학부모', 'myhomeparent'));
  }
  myHomeBlock.appendChild(parentsRow);

  const meRow = document.createElement('div');
  meRow.className = 'my-home-student';
  meRow.appendChild(makePersonNode(state.me));
  myHomeBlock.appendChild(meRow);

  studentsContainer.appendChild(myHomeBlock);

  // Classmates grid (3 columns, students only)
  const grid = document.createElement('div');
  grid.className = 'students-grid';

  classmates.forEach(c => grid.appendChild(makePersonNode(c)));

  const addSlot = document.createElement('div');
  addSlot.className = 'empty-slot-node add-classmate';
  addSlot.textContent = '+ 학급친구 추가';
  addSlot.onclick = () => openModalForSlot('student');
  grid.appendChild(addSlot);

  studentsContainer.appendChild(grid);
  classBox.appendChild(studentsContainer);
  canvas.appendChild(classBox);
}

function makePersonNode(person) {
  const node = document.createElement('div');
  node.className = `person-node ${person.role || ''}`;
  if (person.isSelf) node.classList.add('self');
  if (!person.confirmed && !person.isSelf) node.classList.add('pending');
  if (person.id === selectedNodeId) node.classList.add('selected');

  const roleNames = { teacher: '담임', parent: '학부모', student: '학생' };
  let nameHtml = person.name;
  if (person.isSelf) nameHtml += ' <span class="self-tag">(나)</span>';

  let extra = '';
  if (person.role === 'student' && person.attendanceNo) {
    extra = `${person.attendanceNo}번`;
  }

  node.innerHTML = `
    <div class="person-node-role">${roleNames[person.role] || ''}</div>
    <div class="person-node-name">${nameHtml}</div>
    ${extra ? `<div class="person-node-extra">${extra}</div>` : ''}
    <div class="person-confirm-badge ${person.confirmed || person.isSelf ? '' : 'pending'}">${person.isSelf || person.confirmed ? '✓' : '!'}</div>
  `;

  node.onclick = (e) => {
    e.stopPropagation();
    selectNode(person.id);
  };
  return node;
}

function makeEmptySlot(label, target) {
  const slot = document.createElement('div');
  slot.className = 'empty-slot-node';
  slot.textContent = label;
  slot.onclick = (e) => {
    e.stopPropagation();
    openModalForSlot(target);
  };
  return slot;
}

function selectNode(id) {
  if (selectedNodeId === id) selectedNodeId = null;
  else selectedNodeId = id;
  renderTree();
  if (selectedNodeId) setTimeout(() => showActionPanelForSelected(), 50);
}

function showActionPanelForSelected() {
  if (!selectedNodeId) return;
  const person = selectedNodeId === 'me' || selectedNodeId === state.me.id
    ? state.me : state.people.find(p => p.id === selectedNodeId);
  if (!person) return;

  const nodes = document.querySelectorAll('.person-node.selected');
  if (nodes.length === 0) return;
  const node = nodes[0];
  const canvas = document.getElementById('classCanvas');
  const nodeRect = node.getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();

  document.querySelectorAll('.action-panel').forEach(p => p.remove());

  const panel = document.createElement('div');
  panel.className = 'action-panel';

  const buttons = [];
  if (person.role === 'student' && !person.isSelf) {
    buttons.push({ label: `↕ 출석번호 변경 (${person.attendanceNo}번)`, className: 'order', onClick: () => changeAttendanceNumber(person) });
  }
  if (!person.isSelf) {
    buttons.push({ label: person.confirmed ? '⏱ 대기로' : '✓ 인증', className: 'confirm', onClick: () => toggleConfirm(person.id) });
    buttons.push({ label: '🗑 삭제', className: 'delete', onClick: () => deletePerson(person.id) });
  }
  if (buttons.length === 0) {
    buttons.push({ label: '(추가 액션 없음)', disabled: true });
  }

  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `ap-btn ${b.className || ''}`;
    btn.textContent = b.label;
    if (b.disabled) btn.disabled = true;
    else btn.onclick = b.onClick;
    panel.appendChild(btn);
  });

  const nodeCenterX = nodeRect.left + nodeRect.width / 2 - canvasRect.left;
  const nodeBottomY = nodeRect.bottom - canvasRect.top + 12;
  panel.style.left = `${nodeCenterX - 75}px`;
  panel.style.top = `${nodeBottomY}px`;
  panel.style.position = 'absolute';
  canvas.style.position = 'relative';
  canvas.appendChild(panel);

  setTimeout(() => {
    const pr = panel.getBoundingClientRect();
    const cr = canvas.getBoundingClientRect();
    if (pr.right > cr.right - 8) panel.style.left = `${cr.right - pr.width - 8 - cr.left}px`;
    if (pr.left < cr.left + 8) panel.style.left = `8px`;
  }, 10);
}

function changeAttendanceNumber(person) {
  const n = prompt(`${person.name}의 새 출석번호:`, person.attendanceNo);
  if (!n) return;
  const num = parseInt(n);
  if (isNaN(num) || num < 1) { showToast('⚠️', '1 이상 숫자'); return; }
  person.attendanceNo = num;
  selectedNodeId = null;
  renderAll();
  showToast('↕', `${num}번으로 변경`);
}

function openModalForSlot(target) {
  pendingTarget = target;
  document.getElementById('modalFsName1').value = '';

  if (target === 'teacher') {
    document.getElementById('modalFsTitle1').textContent = '👩‍🏫 담임 교사 추가';
    document.getElementById('modalIntroText1').textContent = '담임 교사를 등록합니다.';
    document.getElementById('modalAttendanceSection').style.display = 'none';
  } else if (target === 'myhomeparent') {
    document.getElementById('modalFsTitle1').textContent = '👨‍👩 학부모 추가';
    document.getElementById('modalIntroText1').textContent = '우리집 학부모를 등록합니다.';
    document.getElementById('modalAttendanceSection').style.display = 'none';
  } else if (target === 'student') {
    document.getElementById('modalFsTitle1').textContent = '🧒 학급친구 추가';
    document.getElementById('modalIntroText1').textContent = '같은 반 친구를 등록합니다.';
    document.getElementById('modalAttendanceSection').style.display = 'block';
    const existing = state.people.filter(p => p.role === 'student').map(s => s.attendanceNo || 0);
    existing.push(state.me.attendanceNo || 0);
    pendingAttendance = Math.max(...existing) + 1;
    updateAttendanceUI();
  }

  document.getElementById('modalFs1').classList.add('visible');
  setTimeout(() => document.getElementById('modalFsName1').focus(), 350);
}

function changeAttendance(delta) {
  pendingAttendance = Math.max(1, pendingAttendance + delta);
  updateAttendanceUI();
}

function updateAttendanceUI() {
  document.getElementById('attendValue').textContent = pendingAttendance;
  document.getElementById('attendDownBtn').disabled = pendingAttendance <= 1;
}

function closeFsModal() {
  document.getElementById('modalFs1').classList.remove('visible');
  pendingTarget = null;
}

function confirmFsAdd() {
  const name = document.getElementById('modalFsName1').value.trim();
  if (!name) { showToast('⚠️', '이름을 입력'); return; }
  const newId = 'p' + Date.now();

  if (pendingTarget === 'teacher') {
    state.people = state.people.filter(p => p.role !== 'teacher');
    state.people.push({ id: newId, name, role: 'teacher', confirmed: false });
    showToast('👩‍🏫', `${name} 선생님 등록`);
  } else if (pendingTarget === 'myhomeparent') {
    state.people.push({ id: newId, name, role: 'parent', isMyHome: true, confirmed: false });
    showToast('👨‍👩', `${name} 학부모 등록`);
  } else if (pendingTarget === 'student') {
    state.people.push({ id: newId, name, role: 'student', attendanceNo: pendingAttendance, confirmed: false });
    showToast('🧒', `${name} 등록 (${pendingAttendance}번)`);
  }

  closeFsModal();
  selectedNodeId = null;
  renderAll();
}

function toggleConfirm(id) {
  const p = getPerson(id);
  if (!p) return;
  p.confirmed = !p.confirmed;
  selectedNodeId = null;
  renderAll();
}

function deletePerson(id) {
  const p = getPerson(id);
  if (!p) return;
  if (!confirm(`${p.name}님을 삭제?`)) return;
  state.people = state.people.filter(x => x.id !== id);
  selectedNodeId = null;
  renderAll();
  showToast('🗑', '삭제됨');
}

function resetAll() {
  if (!confirm('초기화?')) return;
  state = {
    me: { ...initialMe },
    people: JSON.parse(JSON.stringify(initialPeople))
  };
  selectedNodeId = null;
  renderAll();
}

// ============================================================
// Graph View (학급증 그래프)
// ============================================================
function renderGraph() {
  const svg = document.getElementById('graphSvg');
  if (!svg) return;
  const edgesG = document.getElementById('graphEdges');
  const nodesG = document.getElementById('graphNodes');
  edgesG.innerHTML = '';
  nodesG.innerHTML = '';

  const teacher = state.people.find(p => p.role === 'teacher');
  const myHomeParents = state.people.filter(p => p.role === 'parent' && p.isMyHome);
  const classmates = sortByAttendance(state.people.filter(p => p.role === 'student'));

  const positions = {};
  const W = 360;

  // ----- 위계 (상위): 담임 + 학부모 -----
  const upperRow = [];
  if (teacher) upperRow.push(teacher);
  upperRow.push(...myHomeParents);

  const upperY = 70;
  const upperStartX = Math.max(40, W / 2 - (upperRow.length - 1) * 50);
  upperRow.forEach((p, i) => positions[p.id] = { x: upperStartX + i * 100, y: upperY });

  // ----- 중심: 나 -----
  positions[state.me.id] = { x: W / 2, y: 230 };

  // ----- 친구들 (아래) -----
  const lowerY = 400;
  const cmCount = classmates.length;
  if (cmCount > 0) {
    if (cmCount === 1) {
      positions[classmates[0].id] = { x: W / 2, y: lowerY };
    } else {
      // 가로 한 줄 배치 (zigzag 제거: 50px 박스 + 라벨 영역과 충돌 방지)
      const spread = Math.min(W - 80, (cmCount - 1) * 75);
      const startX = W / 2 - spread / 2;
      classmates.forEach((p, i) => {
        positions[p.id] = {
          x: startX + (i / (cmCount - 1)) * spread,
          y: lowerY
        };
      });
    }
  }

  // ----- Tier 라벨 -----
  const tierLabels = [
    { y: upperY, label: '담임·학부모', cond: upperRow.length > 0 },
    { y: 230, label: '나', cond: true },
    { y: lowerY, label: '친구들', cond: cmCount > 0 }
  ];
  tierLabels.forEach(tl => {
    if (!tl.cond) return;
    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.classList.add('graph-tier-label');
    lbl.setAttribute('x', 8);
    lbl.setAttribute('y', tl.y - 18);
    lbl.textContent = tl.label;
    nodesG.appendChild(lbl);
  });

  // ----- Edges -----
  const edges = [];

  // 위계 그룹 내부: 담임 ↔ 학부모, 학부모 ↔ 학부모 (협력 관계)
  if (teacher) {
    myHomeParents.forEach(p => {
      edges.push({ from: teacher.id, to: p.id, status: 'confirmed', kind: 'horizontal' });
    });
  }
  if (myHomeParents.length >= 2) {
    edges.push({ from: myHomeParents[0].id, to: myHomeParents[1].id, status: 'confirmed', kind: 'horizontal' });
  }

  // 위계 → 나
  upperRow.forEach(p => {
    edges.push({ from: p.id, to: state.me.id, status: 'confirmed', kind: 'vertical' });
  });

  // 나 → 친구들
  classmates.forEach(c => {
    edges.push({ from: state.me.id, to: c.id, status: c.confirmed ? 'confirmed' : 'pending', kind: 'vertical' });
  });

  // ----- Render edges -----
  edges.forEach(e => {
    const from = positions[e.from];
    const to = positions[e.to];
    if (!from || !to) return;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    let d;
    if (e.kind === 'horizontal') {
      d = `M ${from.x} ${from.y} L ${to.x} ${to.y}`;
    } else {
      // 수직 (위 → 아래): from 박스+라벨 아래(+47)부터, to 박스 위(-25)까지, 중간 꺾임
      const fromY = from.y + 47;
      const toY = to.y - 25;
      const midY = (fromY + toY) / 2;
      d = `M ${from.x} ${fromY} L ${from.x} ${midY} L ${to.x} ${midY} L ${to.x} ${toY}`;
    }
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');

    const color = e.status === 'confirmed' ? '#10B981' : '#F59E0B';
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', e.status === 'confirmed' ? 2 : 1.5);
    if (e.status !== 'confirmed') path.setAttribute('stroke-dasharray', '4 3');
    path.setAttribute('stroke-linecap', 'round');
    edgesG.appendChild(path);
  });

  // ----- Render nodes -----
  // 관계 라벨
  const getRelLabel = (p) => {
    if (p.isSelf) return '본인';
    if (p.role === 'teacher') return '담임';
    if (p.role === 'parent') return '학부모';
    if (p.role === 'student') return '동급생';
    return '';
  };
  // 아바타 이모지
  const getAvatar = (p) => {
    if (p.role === 'teacher') return '👩‍🏫';
    if (p.role === 'parent') {
      if (/엄마|어머니|mom/i.test(p.name)) return '👩';
      if (/아빠|아버지|dad/i.test(p.name)) return '👨';
      return '👤';
    }
    if (p.role === 'student') {
      if (p.gender === 'female') return '👧';
      if (p.gender === 'male') return '👦';
      return '👤';
    }
    return '👤';
  };

  Object.entries(positions).forEach(([id, pos]) => {
    const person = getPerson(id);
    if (!person) return;

    const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    grp.classList.add('graph-node-group');
    if (person.isSelf) grp.classList.add('me-glow');

    const w = 50, h = 50;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.classList.add('graph-node-rect');
    rect.setAttribute('x', pos.x - w/2);
    rect.setAttribute('y', pos.y - h/2);
    rect.setAttribute('width', w);
    rect.setAttribute('height', h);
    rect.setAttribute('rx', 10);

    let fill, stroke, sw = 1.5;
    if (person.isSelf) {
      fill = '#FFFFFF'; stroke = 'var(--student-self-border)'; sw = 2.5;
    } else if (person.role === 'teacher') {
      fill = 'var(--teacher-bg)'; stroke = 'var(--teacher-color)'; sw = 2;
    } else if (person.role === 'parent') {
      fill = 'var(--parent-bg)'; stroke = 'var(--parent-color)'; sw = 2;
    } else {
      fill = 'var(--student-bg)'; stroke = 'var(--student-border)';
    }
    if (!person.confirmed && !person.isSelf) {
      rect.setAttribute('stroke-dasharray', '3 2');
    }
    rect.setAttribute('fill', fill);
    rect.setAttribute('stroke', stroke);
    rect.setAttribute('stroke-width', sw);
    grp.appendChild(rect);

    // 아바타 이모지 (박스 내부 중앙)
    const avatar = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    avatar.classList.add('graph-node-avatar');
    avatar.setAttribute('x', pos.x);
    avatar.setAttribute('y', pos.y);
    avatar.textContent = getAvatar(person);
    grp.appendChild(avatar);

    // 이름 (박스 아래 1행)
    const nameT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameT.classList.add('graph-node-label');
    nameT.setAttribute('x', pos.x);
    nameT.setAttribute('y', pos.y + 37);
    nameT.textContent = person.name;
    grp.appendChild(nameT);

    // 관계 (박스 아래 2행)
    const relLabel = getRelLabel(person);
    if (relLabel) {
      const relT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      relT.classList.add('graph-node-rel');
      relT.setAttribute('x', pos.x);
      relT.setAttribute('y', pos.y + 48);
      relT.textContent = relLabel;
      grp.appendChild(relT);
    }

    // 학생 출석번호 뱃지 (박스 우상단)
    if (person.role === 'student' && person.attendanceNo) {
      const bo = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      bo.setAttribute('x', pos.x + w/2 - 3);
      bo.setAttribute('y', pos.y - h/2 + 9);
      bo.setAttribute('font-size', '8');
      bo.setAttribute('font-weight', '700');
      bo.setAttribute('fill', 'var(--text-tertiary)');
      bo.setAttribute('text-anchor', 'end');
      bo.textContent = person.attendanceNo;
      grp.appendChild(bo);
    }

    // 단일 클릭: 액션 패널 표시
    // 더블클릭: 추가하기 탭으로 점프
    let clickTimer = null;
    grp.addEventListener('click', (e) => {
      e.stopPropagation();
      if (clickTimer) return;
      clickTimer = setTimeout(() => {
        clickTimer = null;
        selectedNodeId = id;
        showGraphActionPanel(id, e);
      }, 250);
    });
    grp.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      selectedNodeId = id;
      showGraphActionPanel(id, e);
    });

    nodesG.appendChild(grp);
  });

  // viewBox 조정 (학생 라벨 영역까지 확보: lowerY 400 + 48 라벨 끝 + 여유)
  const maxY = cmCount > 0 ? 470 : 320;
  svg.setAttribute('viewBox', `0 0 ${W} ${maxY}`);
}

// 그래프 위에서 액션 패널 표시
function showGraphActionPanel(personId, evt) {
  const person = personId === state.me.id ? state.me : state.people.find(p => p.id === personId);
  if (!person) return;

  document.querySelectorAll('.action-panel').forEach(p => p.remove());

  const panel = document.createElement('div');
  panel.className = 'action-panel';

  const buttons = [];
  if (!person.isSelf) {
    buttons.push({ label: person.confirmed ? '⏱ 대기로' : '✓ 인증', className: 'confirm', onClick: () => { toggleConfirm(person.id); closeGraphPanel(); } });
  }
  if (person.role === 'student' && !person.isSelf) {
    buttons.push({ label: '➕ 학급친구 추가', className: 'order', onClick: () => { openModalForSlot('student'); closeGraphPanel(); } });
  }
  if (!person.isSelf) {
    buttons.push({ label: '🗑 삭제', className: 'delete', onClick: () => { deletePerson(person.id); closeGraphPanel(); } });
  }

  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `ap-btn ${b.className || ''}`;
    btn.innerHTML = b.label;
    if (b.disabled) btn.disabled = true;
    else btn.onclick = b.onClick;
    panel.appendChild(btn);
  });

  const svgEl = document.getElementById('graphSvg');
  const wrap = svgEl.closest('.graph-canvas-wrap');
  if (!wrap) return;
  const wrapRect = wrap.getBoundingClientRect();
  const targetRect = evt.target.getBoundingClientRect();
  const x = targetRect.left + targetRect.width / 2 - wrapRect.left;
  const y = targetRect.bottom - wrapRect.top + 12;

  panel.style.position = 'absolute';
  panel.style.left = `${x - 75}px`;
  panel.style.top = `${y}px`;
  wrap.style.position = 'relative';
  wrap.appendChild(panel);
}

function closeGraphPanel() {
  document.querySelectorAll('.action-panel').forEach(p => p.remove());
}

// ============================================================
// List
// ============================================================
function renderList() {
  const container = document.getElementById('resultList1');
  const summaryEl = document.getElementById('verifySummary');
  if (!container) return;
  container.innerHTML = '';

  // 인증 카운트 요약
  const allPeople = [state.me, ...state.people];
  const confirmedCount = allPeople.filter(p => p.confirmed || p.isSelf).length;
  const pendingCount = allPeople.length - confirmedCount;
  if (summaryEl) {
    summaryEl.innerHTML = `
      <div class="verify-stat-card">
        <div class="verify-stat-value total">${allPeople.length}</div>
        <div class="verify-stat-label">전체</div>
      </div>
      <div class="verify-stat-card confirmed">
        <div class="verify-stat-value confirmed">${confirmedCount}</div>
        <div class="verify-stat-label">✓ 인증</div>
      </div>
      <div class="verify-stat-card pending">
        <div class="verify-stat-value pending">${pendingCount}</div>
        <div class="verify-stat-label">⏱ 미인증</div>
      </div>
    `;
  }

  const teachers = state.people.filter(p => p.role === 'teacher');
  if (teachers.length > 0) {
    const td = document.createElement('div');
    td.className = 'list-tier';
    td.innerHTML = `<div class="list-tier-header"><span class="tier-badge teacher">👩‍🏫 교사</span><span class="tier-count">${teachers.length}명</span></div>`;
    teachers.forEach(p => td.appendChild(makeListItem(p)));
    container.appendChild(td);
  }

  const myParents = state.people.filter(p => p.role === 'parent' && p.isMyHome);
  if (myParents.length > 0) {
    const pd = document.createElement('div');
    pd.className = 'list-tier';
    pd.innerHTML = `<div class="list-tier-header"><span class="tier-badge parent">🏠 우리집 학부모</span><span class="tier-count">${myParents.length}명</span></div>`;
    myParents.forEach(p => pd.appendChild(makeListItem(p)));
    container.appendChild(pd);
  }

  const students = sortByAttendance([state.me, ...state.people.filter(p => p.role === 'student')]);
  const sd = document.createElement('div');
  sd.className = 'list-tier';
  sd.innerHTML = `<div class="list-tier-header"><span class="tier-badge student">🧒 학생 (출석번호순)</span><span class="tier-count">${students.length}명</span></div>`;
  students.forEach(s => sd.appendChild(makeListItem(s)));
  container.appendChild(sd);
}

function makeListItem(p) {
  const item = document.createElement('div');
  item.className = `list-item ${p.role || ''}${p.isSelf ? ' self' : ''}`;
  item.onclick = () => { selectedNodeId = p.id; switchView('tree'); };

  const roleNames = { teacher: '담임 교사', parent: '학부모', student: '학생' };
  const attendText = p.role === 'student' && p.attendanceNo ? `<span class="attendance-pill">${p.attendanceNo}번</span>` : '';

  let extra = roleNames[p.role] || '';
  if (p.role === 'parent' && p.isMyHome) extra = '학부모 · 우리집';

  const quickBtn = !p.confirmed && !p.isSelf
    ? `<button class="verify-quick-btn" onclick="event.stopPropagation(); quickConfirmList('${p.id}')">✓ 인증</button>`
    : '';

  item.innerHTML = `
    <div class="list-item-avatar">${p.name.charAt(0)}</div>
    <div class="list-item-info">
      <div class="list-item-name">${p.name} ${p.isSelf ? '<span class="name-self">(나)</span>' : ''} ${attendText}</div>
      <div class="list-item-rel">${extra}</div>
    </div>
    ${quickBtn}
    <div class="list-item-status ${p.confirmed || p.isSelf ? 'confirmed' : 'pending'}">
      ${p.confirmed || p.isSelf ? '✓' : '⏱'}
    </div>
  `;
  return item;
}

// 인증현황 빠른 인증
function quickConfirmList(personId) {
  const p = personId === 'me' || personId === state.me.id ? state.me : state.people.find(x => x.id === personId);
  if (!p) return;
  p.confirmed = true;
  renderAll();
  showToast('✓', `${p.name} 인증됨`);
}

function updateSummary() {
  const total = state.people.length + 1;
  const confirmed = state.people.filter(p => p.confirmed).length + 1;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statConfirmed').textContent = confirmed;
}

function showToast(emoji, text) {
  const toast = document.getElementById('toast1');
  document.getElementById('toastEmoji1').textContent = emoji;
  document.getElementById('toastText1').textContent = text;
  toast.classList.add('visible');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => toast.classList.remove('visible'), 2400);
}

function renderAll() {
  updateSummary();
  renderGraph();
}

document.getElementById('graphSvg').addEventListener('click', e => {
  if (e.target.tagName === 'svg' || e.target.id === 'graphEdges' || e.target.id === 'graphNodes') {
    closeGraphPanel();
    selectedNodeId = null;
  }
});

document.getElementById('modalFs1').addEventListener('click', e => {
  if (e.target.id === 'modalFs1') closeFsModal();
});

document.getElementById('modalFsName1').addEventListener('keypress', e => {
  if (e.key === 'Enter') confirmFsAdd();
});

renderAll();
</script>

<!-- 백엔드 그래프 영속 연동 (CHON graphs API) — 비로그인 시 데모로 동작 -->
<script>
(function () {
  if (!window.PassAPI || !PassAPI.isLoggedIn()) return;
  var KIND = 'class';
  function getGraph() { return state; }
  function setGraph(d) { state = d; }
  var saveTimer = null, ready = false;
  function scheduleSave() {
    if (!ready) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      PassAPI.graphs.save(KIND, getGraph()).catch(function () {});
    }, 800);
  }
  var _origRender = renderAll;
  renderAll = function () { _origRender.apply(this, arguments); scheduleSave(); };
  PassAPI.graphs.get(KIND).then(function (res) {
    if (res && res.data) setGraph(res.data);
    renderAll();
    ready = true;
  }).catch(function () { ready = true; });
})();
</script>

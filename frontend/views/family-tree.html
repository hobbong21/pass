<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFFBF0">
<title>PASS — 가족증 (가계도)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="../lib/auth-guard.js" data-require="login"></script>
<style>
  :root {
    --chon-orange: #F7931E;
    --chon-orange-dark: #E87F0A;
    --chon-yellow-soft: #FFF3D6;
    --bg-app: #FFFBF0;
    --bg-card: #FFFFFF;
    --text-primary: #1F1F1F;
    --text-secondary: #64748B;
    --text-tertiary: #94A3B8;
    --border-light: #E2E8F0;
    --status-confirmed: #10B981;
    --status-pending: #F59E0B;
    --node-male: #DBEAFE;
    --node-male-border: #6FA8DC;
    --node-female: #FCE7F3;
    --node-female-border: #E89BAA;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 6px 18px rgba(0,0,0,0.10);
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-pill: 999px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-app);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg-app);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  @media (min-width: 768px) {
    body { padding: 32px 0; background: #F5F7FB; }
    .app {
      border-radius: 28px;
      overflow: hidden;
      min-height: calc(100dvh - 64px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
    }
  }

  /* Topbar */
  .topbar {
    padding: calc(14px + var(--safe-top)) 14px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-app);
    border-bottom: 1px solid #F1F5F9;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 36px; height: 36px;
    border: none;
    background: transparent;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-primary);
    font-family: inherit;
  }
  .icon-btn:active { background: rgba(0,0,0,0.06); }
  .icon-btn svg { width: 22px; height: 22px; }
  .topbar h1 {
    flex: 1;
    margin: 0;
    font-size: 17px;
    font-weight: 900;
    text-align: center;
    letter-spacing: -0.4px;
  }
  /* 타이틀 중앙 정렬용 placeholder — back 버튼과 동일한 폭 */
  .topbar-spacer { width: 36px; height: 36px; flex-shrink: 0; }

  /* Stepper — 3단계 탭 */
  .stepper {
    display: flex;
    gap: 6px;
    padding: 12px 14px;
    background: var(--bg-app);
    flex-shrink: 0;
  }
  .step {
    flex: 1;
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 10px 4px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: all 0.15s;
  }
  .step:active { transform: scale(0.97); }
  .step-num {
    font-size: 11px;
    font-weight: 900;
    color: var(--text-tertiary);
    background: #F1F5F9;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--text-secondary);
  }
  .step.active {
    background: var(--chon-orange);
    border-color: var(--chon-orange);
  }
  .step.active .step-num {
    background: white;
    color: var(--chon-orange-dark);
  }
  .step.active .step-label { color: white; }

  /* Content area */
  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(20px + var(--safe-bottom));
  }
  .stage { padding: 8px 14px 24px; }

  /* Hint banner */
  .hint {
    background: var(--chon-yellow-soft);
    border: 1px solid rgba(247, 147, 30, 0.25);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    margin: 6px 0 14px;
    font-size: 12px;
    color: var(--chon-orange-dark);
    line-height: 1.5;
  }

  /* ============================================
     Stage 1 — 만들기: 세대별 그리드
     ============================================ */
  .gen-row { margin-bottom: 18px; }
  .gen-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding: 0 2px;
  }
  .gen-num {
    background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
    color: white;
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.3px;
  }
  .gen-name {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-primary);
  }
  .person-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .person-card {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 2px solid var(--node-male-border);
    border-radius: var(--radius-md);
    padding: 8px 12px 8px 8px;
    cursor: pointer;
    font-family: inherit;
    min-width: 130px;
    text-align: left;
    transition: all 0.12s;
  }
  .person-card.female { border-color: var(--node-female-border); }
  .person-card.self {
    border-color: var(--chon-orange);
    border-width: 2.5px;
    box-shadow: 0 0 0 3px rgba(247,147,30,0.15);
  }
  .person-card:active { transform: scale(0.97); }
  .person-card.confirmed { background: rgba(16,185,129,0.06); }
  .pc-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--node-male);
    color: var(--node-male-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 14px;
    flex-shrink: 0;
  }
  .person-card.female .pc-avatar {
    background: var(--node-female);
    color: var(--node-female-border);
  }
  .person-card.self .pc-avatar {
    background: var(--chon-yellow-soft);
    color: var(--chon-orange-dark);
  }
  .pc-info { min-width: 0; flex: 1; }
  .pc-name {
    font-size: 13px;
    font-weight: 800;
    line-height: 1.2;
    color: var(--text-primary);
  }
  .pc-rel {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
    font-weight: 600;
  }

  /* Stage CTA — 다음 단계 */
  .stage-cta {
    padding: 20px 0 4px;
    text-align: center;
  }
  .cta-hint {
    font-size: 11px;
    color: var(--text-tertiary);
    margin: 0 0 10px;
  }
  .next-step-btn {
    background: var(--chon-orange);
    color: white;
    border: none;
    padding: 12px 22px;
    border-radius: var(--radius-pill);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    box-shadow: var(--shadow-md);
  }
  .next-step-btn:active { transform: scale(0.97); background: var(--chon-orange-dark); }

  /* Action panel (popover) */
  .action-panel {
    position: fixed;
    background: white;
    border: 2px solid var(--chon-orange);
    border-radius: var(--radius-md);
    padding: 6px;
    box-shadow: var(--shadow-md);
    z-index: 80;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 170px;
    max-width: 240px;
    animation: panelPop 0.16s ease;
  }
  @keyframes panelPop {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .ap-btn {
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    color: var(--text-primary);
  }
  .ap-btn:active { transform: scale(0.97); }
  .ap-btn.add { border-color: var(--chon-orange); color: var(--chon-orange-dark); }
  .ap-btn.edit { border-color: #94A3B8; color: #475569; }
  .ap-btn.danger { border-color: #FCA5A5; color: #DC2626; }

  /* ============================================
     Stage 2 — 인증: 요약 + 행 리스트
     ============================================ */
  .summary-cards {
    display: flex;
    gap: 6px;
    margin: 6px 0 14px;
  }
  .summary-card {
    flex: 1;
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 10px 6px;
    text-align: center;
  }
  .summary-card.confirmed {
    border-color: rgba(16,185,129,0.4);
    background: rgba(16,185,129,0.06);
  }
  .summary-card.pending {
    border-color: rgba(245,158,11,0.4);
    background: rgba(245,158,11,0.06);
  }
  .sc-num {
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
    color: var(--text-primary);
  }
  .sc-num.confirmed { color: var(--status-confirmed); }
  .sc-num.pending { color: var(--status-pending); }
  .sc-label {
    font-size: 10px;
    font-weight: 800;
    color: var(--text-tertiary);
    margin-top: 6px;
    letter-spacing: 0.3px;
  }
  .verify-group { margin-bottom: 14px; }
  .vg-title {
    margin: 0 0 8px;
    font-size: 13px;
    font-weight: 900;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .vg-count {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 600;
  }
  .verify-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    margin-bottom: 6px;
  }
  .verify-row.confirmed {
    background: rgba(16,185,129,0.05);
    border-color: rgba(16,185,129,0.3);
  }
  .verify-row.pending {
    background: rgba(245,158,11,0.05);
    border-color: rgba(245,158,11,0.3);
  }
  .vrow-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--node-male);
    color: var(--node-male-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .vrow-avatar.female {
    background: var(--node-female);
    color: var(--node-female-border);
  }
  .vrow-info { flex: 1; min-width: 0; }
  .vrow-name {
    font-size: 13px;
    font-weight: 800;
    line-height: 1.2;
    color: var(--text-primary);
  }
  .vrow-rel {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 600;
    margin-left: 4px;
  }
  .vrow-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .vb {
    font-size: 10px;
    font-weight: 800;
    color: var(--text-secondary);
    padding: 2px 6px;
    border-radius: var(--radius-pill);
    background: #F1F5F9;
  }
  .vb.confirmed {
    color: var(--status-confirmed);
    background: rgba(16,185,129,0.12);
  }
  .vb.pending {
    color: var(--status-pending);
    background: rgba(245,158,11,0.12);
  }
  .vrow-phone {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .vrow-actions { flex-shrink: 0; }
  .vrow-btn {
    border: 1.5px solid var(--border-light);
    background: white;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    color: var(--text-primary);
    white-space: nowrap;
  }
  .vrow-btn.primary {
    background: var(--chon-orange);
    color: white;
    border-color: var(--chon-orange);
  }
  .vrow-btn.ghost { color: var(--text-secondary); }
  .vrow-btn:active { transform: scale(0.95); }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-tertiary);
    font-size: 13px;
  }

  /* ============================================
     Stage 3 — 전체보기: 그래프 SVG
     ============================================ */
  .graph-wrap {
    margin: 6px 0;
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  #graphSvg {
    width: 100%;
    height: 560px;
    display: block;
    background: #FAFBFC;
  }
  .graph-legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px 8px 0;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .gl-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 700;
  }
  .gl-line {
    width: 16px;
    height: 2.5px;
    border-radius: 1px;
    display: inline-block;
  }
  .gl-dash {
    width: 16px;
    height: 2.5px;
    background-image: linear-gradient(to right, currentColor 50%, transparent 50%);
    background-size: 5px 100%;
    display: inline-block;
  }
  .gl-line--confirmed { background: var(--status-confirmed); }
  .gl-item--pending   { color: var(--status-pending); }
  .gl-item--spouse    { color: #DC2626; }

  /* ============================================
     Stage 4 — 증명서 발급
     ============================================ */
  /* 발급 폼 — 증명서 이름 + 대표 이미지 */
  .issue-form {
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .issue-form .m-section { margin-bottom: 14px; }
  .issue-form .m-section:last-child { margin-bottom: 0; }
  .image-picker {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .img-preview-thumb {
    width: 64px; height: 64px;
    border-radius: 10px;
    object-fit: cover;
    border: 1.5px solid var(--border-light);
    flex-shrink: 0;
  }
  .img-preview-empty {
    width: 64px; height: 64px;
    border-radius: 10px;
    background: #F1F5F9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    border: 1.5px dashed var(--text-tertiary);
    flex-shrink: 0;
  }
  .image-picker-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .img-pick-btn {
    background: var(--chon-orange);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  .img-pick-btn:active { transform: scale(0.96); background: var(--chon-orange-dark); }
  .img-clear-btn {
    background: white;
    color: var(--text-secondary);
    border: 1.5px solid var(--border-light);
    padding: 8px 14px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  /* 미리보기 카드 상단 이미지 */
  .cp-image {
    width: 100%;
    max-height: 160px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 12px;
    position: relative;
  }
  /* 발급 내역의 작은 썸네일 */
  .ir-thumb {
    width: 36px; height: 36px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border-light);
  }

  .cert-preview {
    background: linear-gradient(165deg, #FFD580 0%, #FFA000 60%, #E87F0A 100%);
    border-radius: var(--radius-lg);
    padding: 22px 18px 18px;
    color: white;
    margin-bottom: 14px;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }
  .cert-preview::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 70%);
    pointer-events: none;
  }
  .cp-title {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
    position: relative;
  }
  .cp-subtitle {
    font-size: 12px;
    opacity: 0.92;
    margin-bottom: 14px;
    position: relative;
  }
  .cp-members {
    background: rgba(255, 255, 255, 0.18);
    border-radius: var(--radius-md);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    -webkit-backdrop-filter: blur(3px);
    backdrop-filter: blur(3px);
  }
  .cp-member {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: white;
  }
  .cp-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .cp-member small {
    opacity: 0.85;
    font-weight: 500;
    margin-left: 4px;
  }

  .issue-btn {
    width: 100%;
    background: var(--chon-orange);
    color: white;
    border: none;
    padding: 14px;
    border-radius: var(--radius-pill);
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
    box-shadow: var(--shadow-md);
    transition: transform 0.12s, background 0.15s;
  }
  .issue-btn:active:not(:disabled) {
    transform: scale(0.98);
    background: var(--chon-orange-dark);
  }
  .issue-btn:disabled {
    background: #CBD5E1;
    color: #64748B;
    cursor: not-allowed;
    box-shadow: none;
  }
  .issue-hint {
    margin: 8px 0 18px;
    font-size: 11px;
    color: var(--text-tertiary);
    text-align: center;
  }
  .issued-title {
    margin: 14px 0 8px;
    font-size: 13px;
    font-weight: 900;
    color: var(--text-primary);
  }
  .issued-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    margin-bottom: 6px;
  }
  .ir-info { flex: 1; min-width: 0; }
  .ir-title { font-size: 13px; font-weight: 800; color: var(--text-primary); }
  .ir-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; font-weight: 600; }

  /* ============================================
     Modal (가족 추가/편집)
     ============================================ */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.45);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal.visible { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-sheet {
    background: var(--bg-app);
    width: 100%;
    max-width: 480px;
    max-height: 92dvh;
    border-radius: 22px 22px 0 0;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.26s ease;
    overflow: hidden;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: white;
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
  }
  .modal-header h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 900;
    flex: 1;
    text-align: center;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text-secondary);
    cursor: pointer;
    width: 32px; height: 32px;
    font-family: inherit;
  }
  .modal-save {
    background: var(--chon-orange);
    color: white;
    border: none;
    padding: 7px 16px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 800;

</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <button class="icon-btn" type="button" onclick="goBack()" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <h1>가족증 — 가계도</h1>
    <span class="topbar-spacer" aria-hidden="true"></span>
  </header>

  <nav class="stepper" role="tablist">
    <button type="button" class="step active" data-step="1" onclick="goToStep(1)" role="tab">
      <span class="step-num">1</span><span class="step-label">만들기</span>
    </button>
    <button type="button" class="step" data-step="2" onclick="goToStep(2)" role="tab">
      <span class="step-num">2</span><span class="step-label">인증</span>
    </button>
    <button type="button" class="step" data-step="3" onclick="goToStep(3)" role="tab">
      <span class="step-num">3</span><span class="step-label">전체보기</span>
    </button>
    <button type="button" class="step" data-step="4" onclick="goToStep(4)" role="tab">
      <span class="step-num">4</span><span class="step-label">발급</span>
    </button>
  </nav>

  <main class="content">

    <!-- Stage 1 — 만들기 -->
    <section class="stage" id="stageBuild" hidden>
      <div class="hint">
        사람을 탭하면 <strong>＋부모 / ＋형제 / ＋배우자 / ＋자녀</strong> 옵션이 나타나요. 무한히 확장됩니다.
      </div>
      <div id="treeView"></div>
    </section>

    <!-- Stage 2 — 인증 -->
    <section class="stage" id="stageVerify" hidden>
      <div class="summary-cards" id="verifySummary"></div>
      <div id="verifyList"></div>
    </section>

    <!-- Stage 3 — 전체보기 -->
    <section class="stage" id="stageView" hidden>
      <div class="summary-cards" id="viewSummary"></div>
      <div class="graph-wrap">
        <svg id="graphSvg" viewBox="0 0 360 560" preserveAspectRatio="xMidYMid meet">
          <g id="graphEdges"></g>
          <g id="graphNodes"></g>
        </svg>
      </div>
      <div class="graph-legend">
        <div class="gl-item"><span class="gl-line gl-line--confirmed"></span> 인증됨</div>
        <div class="gl-item gl-item--pending"><span class="gl-dash"></span> 응답 대기</div>
        <div class="gl-item gl-item--spouse"><span class="gl-dash"></span> 부부</div>
      </div>
      <div class="stage-cta">
        <button class="next-step-btn" type="button" onclick="goToStep(4)">다음: 증명서 발급 →</button>
      </div>
    </section>

    <!-- Stage 4 — 증명서 발급 -->
    <section class="stage" id="stageIssue" hidden>
      <div class="summary-cards" id="issueSummary"></div>
      <div class="issue-form" id="issueForm"></div>
      <div id="issuePreview"></div>
      <button class="issue-btn" id="issueBtn" type="button" onclick="issueCertificate()">증명서 발급하기</button>
      <p class="issue-hint" id="issueHint"></p>
      <div id="issuedList"></div>
    </section>

  </main>

  <!-- Modal: 가족 추가 / 편집 -->
  <div class="modal" id="personModal" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <button class="modal-close" type="button" onclick="closeModal()" aria-label="닫기">✕</button>
        <h2 id="modalTitle">가족 추가</h2>
        <button class="modal-save" type="button" onclick="confirmModal()">완료</button>
      </div>
      <div class="modal-body">
        <div class="modal-intro" id="modalIntro">새 가족을 등록합니다.</div>

        <div class="m-section">
          <div class="m-label">이름</div>
          <input type="text" class="m-input" id="modalName" placeholder="홍길동" autocomplete="off"/>
        </div>

        <div class="m-section">
          <div class="m-label">연락처 <span class="hint">(선택 — 입력 시 인증 초대가 발송됩니다)</span></div>
          <input type="tel" class="m-input" id="modalPhone" placeholder="010-1234-5678" autocomplete="off" inputmode="tel"/>
        </div>

        <div class="m-section">
          <div class="m-label">성별</div>
          <div class="gender-toggle" id="modalGender">
            <button type="button" class="g-opt selected" data-gender="male" onclick="selectGender('male')">♂ 남성</button>
            <button type="button" class="g-opt" data-gender="female" onclick="selectGender('female')">♀ 여성</button>
          </div>
        </div>

        <div class="m-section">
          <div class="m-label">관계</div>
          <div class="rel-grid" id="modalRelGrid"></div>
          <input type="text" class="m-input mt8" id="modalRel" placeholder="직접 입력" autocomplete="off"/>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

</div>

<script>
// ============================================================
// State & Persistence
// 데이터는 localStorage에 JSON으로 저장 — 백엔드 동기화는 추후
// ============================================================
const STORAGE_KEY = 'pass_family_tree';

function defaultData() {
  const now = Date.now();
  return {
    meta: { version: 1, createdAt: now, updatedAt: now },
    me: { id: 'me', name: '나', gender: 'female', spouseId: null },
    myParentIds: ['dad', 'mom'],
    people: {
      dad: { id: 'dad', name: '아버지', gender: 'male', relation: '아버지', parentIds: [], spouseId: 'mom', phone: null, invitedAt: null, confirmed: false, addedAt: now },
      mom: { id: 'mom', name: '어머니', gender: 'female', relation: '어머니', parentIds: [], spouseId: 'dad', phone: null, invitedAt: null, confirmed: false, addedAt: now + 1 }
    }
  };
}

let data = loadData();
let currentStep = 1;
let pendingModal = null; // { mode: 'add'|'edit', targetId, addType }

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.me && parsed.people) return parsed;
    }
  } catch (e) {}
  return defaultData();
}

function saveData() {
  data.meta.updatedAt = Date.now();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch (e) { console.warn('saveData failed', e); }
}

function newId() {
  return 'p_' + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4);
}

// ============================================================
// Person helpers
// ============================================================
function isMe(id) { return id === 'me'; }

function getPerson(id) {
  if (isMe(id)) {
    return {
      id: 'me',
      name: data.me.name || '나',
      gender: data.me.gender || 'female',
      spouseId: data.me.spouseId || null,
      relation: '본인',
      parentIds: data.myParentIds || [],
      addedAt: 0,
      isSelf: true,
      confirmed: true
    };
  }
  return data.people[id] || null;
}

function getAllPeople() {
  return [getPerson('me'), ...Object.values(data.people)];
}

function getParents(id) {
  const p = getPerson(id);
  if (!p) return [];
  return (p.parentIds || []).map(getPerson).filter(Boolean);
}

function getSpouse(id) {
  const p = getPerson(id);
  if (!p || !p.spouseId) return null;
  return getPerson(p.spouseId);
}

// id의 자녀 = 그 id를 parentIds에 가진 사람들
function getChildren(id) {
  const result = [];
  if ((data.myParentIds || []).includes(id)) result.push(getPerson('me'));
  for (const p of Object.values(data.people)) {
    if (p.parentIds && p.parentIds.includes(id)) result.push(p);
  }
  return result;
}

// me 기준 세대 오프셋 계산 — BFS로 모든 도달 가능 인물에 세대 부여
function computeGenerations() {
  const gens = {};
  const visited = new Set(['me']);
  const queue = [{ id: 'me', gen: 0 }];
  gens['me'] = 0;

  while (queue.length) {
    const { id, gen } = queue.shift();
    const p = getPerson(id);
    if (!p) continue;

    // 부모 (gen - 1)
    for (const pid of (p.parentIds || [])) {
      if (visited.has(pid) || !getPerson(pid)) continue;
      visited.add(pid);
      gens[pid] = gen - 1;
      queue.push({ id: pid, gen: gen - 1 });
    }
    // 배우자 (동세대)
    if (p.spouseId && !visited.has(p.spouseId) && getPerson(p.spouseId)) {
      visited.add(p.spouseId);
      gens[p.spouseId] = gen;
      queue.push({ id: p.spouseId, gen });
    }
    // 자녀 (gen + 1) — 누군가가 이 id를 parentIds에 가지고 있으면 자녀
    for (const other of getAllPeople()) {
      if (visited.has(other.id)) continue;
      if (other.parentIds && other.parentIds.includes(id)) {
        visited.add(other.id);
        gens[other.id] = gen + 1;
        queue.push({ id: other.id, gen: gen + 1 });
      }
    }
  }

  return gens;
}

// ============================================================
// Navigation
// ============================================================
function goBack() {
  if (history.length > 1) history.back();
  else location.href = '../main/cert.html';
}

function goToStep(n) {
  currentStep = n;
  document.querySelectorAll('.step').forEach(b =>
    b.classList.toggle('active', Number(b.dataset.step) === n)
  );
  document.querySelectorAll('.stage').forEach(s => s.hidden = true);
  const map = { 1: 'stageBuild', 2: 'stageVerify', 3: 'stageView', 4: 'stageIssue' };
  document.getElementById(map[n]).hidden = false;
  closeActionPanel();
  rerender();
}

function rerender() {
  if (currentStep === 1) renderBuild();
  else if (currentStep === 2) renderVerify();
  else if (currentStep === 3) renderView();
  else if (currentStep === 4) renderIssue();
}

// ============================================================
// Stage 1 — 만들기
// ============================================================
function renderBuild() {
  const root = document.getElementById('treeView');
  root.innerHTML = '';

  const gens = computeGenerations();
  const byGen = {};
  for (const [id, g] of Object.entries(gens)) (byGen[g] = byGen[g] || []).push(id);
  const genNumbers = Object.keys(byGen).map(Number).sort((a, b) => a - b);

  for (const g of genNumbers) {
    const ids = byGen[g];
    ids.sort((a, b) => (getPerson(a).addedAt || 0) - (getPerson(b).addedAt || 0));
    const row = document.createElement('div');
    row.className = 'gen-row';
    row.innerHTML = `
      <div class="gen-header">
        <span class="gen-num">${g >= 0 ? '+' + g : g}</span>
        <span class="gen-name">${genLabel(g)}</span>
      </div>
      <div class="person-row"></div>
    `;
    const pr = row.querySelector('.person-row');
    for (const id of ids) pr.appendChild(makeBuildCard(id));
    root.appendChild(row);
  }

  const cta = document.createElement('div');
  cta.className = 'stage-cta';
  cta.innerHTML = `
    <p class="cta-hint">가족을 다 추가했다면 다음 단계로 이동하세요.</p>
    <button class="next-step-btn" type="button" onclick="goToStep(2)">다음: 연락처 인증 →</button>
  `;
  root.appendChild(cta);
}

function genLabel(g) {
  if (g === 0) return '나·동세대';
  if (g === -1) return '부모';
  if (g === -2) return '조부모';
  if (g <= -3) return `${-g}대 위 조상`;
  if (g === 1) return '자녀';
  if (g === 2) return '손주';
  if (g >= 3) return `${g}대 아래`;
  return '';
}

function makeBuildCard(id) {
  const p = getPerson(id);
  const card = document.createElement('button');
  card.type = 'button';
  card.className = 'person-card';
  card.dataset.id = id;
  card.classList.add(p.gender === 'female' ? 'female' : 'male');
  if (p.isSelf) card.classList.add('self');
  if (p.confirmed && !p.isSelf) card.classList.add('confirmed');
  const married = p.spouseId ? ' 💍' : '';
  card.innerHTML = `
    <span class="pc-avatar">${escapeHtml((p.name || '?').charAt(0))}</span>
    <span class="pc-info">
      <span class="pc-name">${escapeHtml(p.name || '?')}${married}</span>
      <span class="pc-rel">${escapeHtml(p.relation || (p.isSelf ? '본인' : ''))}</span>
    </span>
  `;
  card.onclick = (e) => {
    e.stopPropagation();
    showActionPanel(id, card);
  };
  return card;
}

// ============================================================
// Action panel (popover) — Stage 1에서 사람 탭 시 표시
// ============================================================
function showActionPanel(personId, anchorEl) {
  closeActionPanel();
  const p = getPerson(personId);
  if (!p) return;

  const panel = document.createElement('div');
  panel.className = 'action-panel';
  panel.dataset.for = personId;

  const parents = getParents(personId);
  const spouse = getSpouse(personId);
  const buttons = [];

  if (parents.length < 2) {
    buttons.push({ label: '＋ 부모 추가', cls: 'add', click: () => openAddModal(personId, 'parent') });
  }
  if (parents.length > 0) {
    buttons.push({ label: '＋ 형제 추가', cls: 'add', click: () => openAddModal(personId, 'sibling') });
  }
  if (!spouse) {
    buttons.push({ label: '＋ 배우자 추가', cls: 'add', click: () => openAddModal(personId, 'spouse') });
  }
  buttons.push({ label: '＋ 자녀 추가', cls: 'add', click: () => openAddModal(personId, 'child') });
  buttons.push({ label: p.isSelf ? '✏ 내 이름 편집' : '✏ 이름·관계 편집', cls: 'edit', click: () => openEditModal(personId) });
  if (!p.isSelf) {
    buttons.push({ label: '🗑 가계도에서 제거', cls: 'danger', click: () => deletePerson(personId) });
  }

  for (const b of buttons) {
    const el = document.createElement('button');
    el.type = 'button';
    el.className = `ap-btn ${b.cls || ''}`;
    el.textContent = b.label;
    el.onclick = () => { closeActionPanel(); b.click(); };
    panel.appendChild(el);
  }

  document.body.appendChild(panel);
  positionPanel(panel, anchorEl);
}

function positionPanel(panel, anchor) {
  const r = anchor.getBoundingClientRect();
  const pw = panel.offsetWidth;
  const ph = panel.offsetHeight;
  let left = r.left + r.width / 2 - pw / 2;
  let top = r.bottom + 8;
  const maxLeft = window.innerWidth - pw - 8;
  if (left < 8) left = 8;
  if (left > maxLeft) left = maxLeft;
  if (top + ph > window.innerHeight - 12) {
    top = r.top - ph - 8;
    if (top < 8) top = 8;
  }
  panel.style.left = `${left}px`;
  panel.style.top = `${top}px`;
}

function closeActionPanel() {
  document.querySelectorAll('.action-panel').forEach(p => p.remove());
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.action-panel') && !e.target.closest('.person-card')) {
    closeActionPanel();
  }
});

// ============================================================
// Modal — 가족 추가/편집
// ============================================================
const MODAL_PRESETS = {
  parent: {
    title: '부모 추가',
    male: { chips: ['아버지', '시아버지', '장인'], def: '아버지' },
    female: { chips: ['어머니', '시어머니', '장모'], def: '어머니' },
  },
  sibling: {
    title: '형제 추가',
    male: { chips: ['형', '오빠', '남동생'], def: '남동생' },
    female: { chips: ['누나', '언니', '여동생'], def: '여동생' },
  },
  spouse: {
    title: '배우자 추가',
    male: { chips: ['남편'], def: '남편' },
    female: { chips: ['아내'], def: '아내' },
  },
  child: {
    title: '자녀 추가',
    male: { chips: ['아들'], def: '아들' },
    female: { chips: ['딸'], def: '딸' },
  },
};

function openAddModal(targetId, addType) {
  pendingModal = { mode: 'add', targetId, addType };
  const preset = MODAL_PRESETS[addType];
  const target = getPerson(targetId);

  document.getElementById('modalTitle').textContent = preset.title;
  document.getElementById('modalIntro').textContent = `${target.name || '?'}님의 ${preset.title.replace(' 추가', '')}를 등록합니다.`;
  document.getElementById('modalName').value = '';
  document.getElementById('modalPhone').value = '';

  // 기본 성별: 부모/배우자는 추론, 그 외는 male
  let g = 'male';
  if (addType === 'parent') {
    // 첫 번째 부모 없으면 같은 성별, 두 번째라면 반대 성별 추천 (배우자 페어링)
    const parents = getParents(targetId);
    if (parents.length === 1) g = parents[0].gender === 'male' ? 'female' : 'male';
    else g = target.gender === 'male' ? 'male' : 'female';
  } else if (addType === 'spouse') {
    g = target.gender === 'male' ? 'female' : 'male';
  }
  selectGender(g);
  renderRelationChips(addType, g);

  document.getElementById('personModal').classList.add('visible');
  setTimeout(() => document.getElementById('modalName').focus(), 250);
}

function openEditModal(targetId) {
  pendingModal = { mode: 'edit', targetId, addType: null };
  const target = getPerson(targetId);

  document.getElementById('modalTitle').textContent = '이름 / 관계 편집';
  document.getElementById('modalIntro').textContent = target.isSelf ? '내 정보를 수정합니다.' : `${target.name}님 정보를 수정합니다.`;
  document.getElementById('modalName').value = target.name || '';
  document.getElementById('modalPhone').value = target.phone || '';
  selectGender(target.gender || 'male');

  // 편집 모드에서는 chip preset 없음 — 자유 입력만
  document.getElementById('modalRelGrid').innerHTML = '';
  document.getElementById('modalRel').value = target.relation || '';

  document.getElementById('personModal').classList.add('visible');
  setTimeout(() => document.getElementById('modalName').focus(), 250);
}

function renderRelationChips(addType, gender) {
  const grid = document.getElementById('modalRelGrid');
  grid.innerHTML = '';
  const preset = MODAL_PRESETS[addType];
  if (!preset) return;
  const { chips, def } = preset[gender] || preset.male;
  document.getElementById('modalRel').value = def || '';
  for (const c of chips) {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'rel-chip';
    if (c === def) chip.classList.add('selected');
    chip.textContent = c;
    chip.onclick = () => {
      grid.querySelectorAll('.rel-chip').forEach(x => x.classList.remove('selected'));
      chip.classList.add('selected');
      document.getElementById('modalRel').value = c;
    };
    grid.appendChild(chip);
  }
}

function selectGender(g) {
  document.querySelectorAll('#modalGender .g-opt').forEach(opt => {
    opt.classList.toggle('selected', opt.dataset.gender === g);
  });
  if (pendingModal && pendingModal.addType) {
    renderRelationChips(pendingModal.addType, g);
  }
}

function closeModal() {
  document.getElementById('personModal').classList.remove('visible');
  pendingModal = null;
}

function confirmModal() {
  if (!pendingModal) return;
  const name = document.getElementById('modalName').value.trim();
  const phoneRaw = document.getElementById('modalPhone').value.trim();
  const phone = phoneRaw ? phoneRaw.replace(/[^0-9+\-]/g, '') : '';
  const rel = document.getElementById('modalRel').value.trim();
  const gender = document.querySelector('#modalGender .g-opt.selected')?.dataset.gender || 'male';

  if (!name) { showToast('⚠️', '이름을 입력하세요'); return; }

  // ----- Edit mode -----
  if (pendingModal.mode === 'edit') {
    const id = pendingModal.targetId;
    if (id === 'me') {
      data.me.name = name;
      data.me.gender = gender;
    } else {
      const p = data.people[id];
      if (p) {
        p.name = name;
        p.gender = gender;
        if (rel) p.relation = rel;
        // 연락처가 명시적으로 비워졌으면 초대/인증도 리셋, 새 번호면 invitedAt 갱신
        const oldPhone = p.phone || '';
        if (phoneRaw === '') {
          p.phone = null;
          p.invitedAt = null;
          p.confirmed = false;
        } else if (phone !== oldPhone) {
          p.phone = phone;
          p.invitedAt = Date.now();
          p.confirmed = false;
        }
      }
    }
    saveData();
    closeModal();
    rerender();
    showToast('✓', '저장됨');
    return;
  }

  // ----- Add mode -----
  const { targetId, addType } = pendingModal;
  const preset = MODAL_PRESETS[addType];
  const defaultRel = preset?.[gender]?.def || '';
  const id = newId();
  const now = Date.now();
  const person = {
    id, name, gender,
    relation: rel || defaultRel,
    parentIds: [],
    spouseId: null,
    phone: phone || null,
    invitedAt: phone ? now : null,
    confirmed: false,
    addedAt: now,
  };

  const target = getPerson(targetId);

  if (addType === 'parent') {
    data.people[id] = person;
    if (targetId === 'me') {
      if (!data.myParentIds.includes(id)) data.myParentIds.push(id);
    } else {
      const t = data.people[targetId];
      if (t) {
        t.parentIds = t.parentIds || [];
        if (!t.parentIds.includes(id)) t.parentIds.push(id);
      }
    }
    // 부부 자동 연결: 추가된 부모가 두 번째라면 첫 번째와 spouse로 묶기
    const allParents = (targetId === 'me' ? data.myParentIds : data.people[targetId]?.parentIds) || [];
    if (allParents.length === 2) {
      const [a, b] = allParents;
      const pa = data.people[a], pb = data.people[b];
      if (pa && pb && !pa.spouseId && !pb.spouseId) {
        pa.spouseId = b; pb.spouseId = a;
      }
    }
  } else if (addType === 'sibling') {
    const tParents = targetId === 'me' ? data.myParentIds : (target.parentIds || []);
    person.parentIds = [...tParents];
    data.people[id] = person;
  } else if (addType === 'spouse') {
    person.spouseId = targetId;
    data.people[id] = person;
    if (targetId === 'me') data.me.spouseId = id;
    else {
      const t = data.people[targetId];
      if (t) t.spouseId = id;
    }
  } else if (addType === 'child') {
    person.parentIds = [targetId];
    if (target.spouseId) person.parentIds.push(target.spouseId);
    data.people[id] = person;
  }

  saveData();
  closeModal();
  rerender();
  showToast(phone ? '✉' : '✓', phone ? `${name}님에게 인증 초대 발송` : `${name}님 추가됨`);
}

// ============================================================
// Delete (가계도에서 제거)
// 이 인물을 다른 인물의 parentIds, spouseId에서 모두 제거
// ============================================================
function deletePerson(id) {
  if (id === 'me') { showToast('⚠️', '본인은 삭제할 수 없어요'); return; }
  const p = getPerson(id);
  if (!p) return;
  if (!confirm(`${p.name}님을 가계도에서 제거할까요?\n(자녀가 있다면 부모 링크만 끊어집니다)`)) return;
  for (const other of Object.values(data.people)) {
    if (other.parentIds) other.parentIds = other.parentIds.filter(x => x !== id);
    if (other.spouseId === id) other.spouseId = null;
  }
  data.myParentIds = (data.myParentIds || []).filter(x => x !== id);
  if (data.me.spouseId === id) data.me.spouseId = null;
  delete data.people[id];
  saveData();
  rerender();
  showToast('🗑', '제거됨');
}

// ============================================================
// Stage 2 — 인증
// ============================================================
function renderVerify() {
  const root = document.getElementById('verifyList');
  const sum = document.getElementById('verifySummary');
  root.innerHTML = '';

  const gens = computeGenerations();
  const ids = Object.keys(gens).filter(id => id !== 'me');

  const total = ids.length;
  const confirmedCount = ids.filter(id => getPerson(id)?.confirmed).length;
  const pendingCount = ids.filter(id => {
    const p = getPerson(id); return p && !p.confirmed && p.invitedAt;
  }).length;
  const notStartedCount = total - confirmedCount - pendingCount;

  sum.innerHTML = `
    <div class="summary-card"><div class="sc-num">${total}</div><div class="sc-label">전체</div></div>
    <div class="summary-card confirmed"><div class="sc-num confirmed">${confirmedCount}</div><div class="sc-label">✓ 인증</div></div>
    <div class="summary-card pending"><div class="sc-num pending">${pendingCount}</div><div class="sc-label">⏱ 대기</div></div>
    <div class="summary-card"><div class="sc-num">${notStartedCount}</div><div class="sc-label">미시작</div></div>
  `;

  if (ids.length === 0) {
    root.innerHTML = `<div class="empty">먼저 [1 만들기]에서 가족을 추가하세요.</div>`;
    return;
  }

  const byGen = {};
  for (const id of ids) (byGen[gens[id]] = byGen[gens[id]] || []).push(id);
  const genNumbers = Object.keys(byGen).map(Number).sort((a, b) => a - b);

  for (const g of genNumbers) {
    const groupIds = byGen[g];
    groupIds.sort((a, b) => (getPerson(a).addedAt || 0) - (getPerson(b).addedAt || 0));
    const group = document.createElement('div');
    group.className = 'verify-group';
    group.innerHTML = `<h3 class="vg-title">${genLabel(g)} <span class="vg-count">${groupIds.length}명</span></h3>`;
    for (const id of groupIds) group.appendChild(makeVerifyRow(id));
    root.appendChild(group);
  }

  const cta = document.createElement('div');
  cta.className = 'stage-cta';
  cta.innerHTML = `<button class="next-step-btn" type="button" onclick="goToStep(3)">다음: 전체보기 →</button>`;
  root.appendChild(cta);
}

function makeVerifyRow(id) {
  const p = getPerson(id);
  const row = document.createElement('div');
  row.className = 'verify-row';
  if (p.confirmed) row.classList.add('confirmed');
  else if (p.invitedAt) row.classList.add('pending');

  let statusBadge, actionBtn;
  if (p.confirmed) {
    statusBadge = `<span class="vb confirmed">✓ 인증 완료</span>`;
    actionBtn = `<button class="vrow-btn" type="button" onclick="revertConfirm('${id}')">↩ 해제</button>`;
  } else if (p.invitedAt) {
    statusBadge = `<span class="vb pending">⏱ 응답 대기</span>`;
    actionBtn = `<button class="vrow-btn primary" type="button" onclick="markConfirmed('${id}')">✓ 완료 처리</button>`;
  } else if (p.phone) {
    statusBadge = `<span class="vb">📱 연락처 등록됨</span>`;
    actionBtn = `<button class="vrow-btn primary" type="button" onclick="sendInvite('${id}')">✉ 초대 발송</button>`;
  } else {
    statusBadge = `<span class="vb">⚪ 연락처 미등록</span>`;
    actionBtn = `<button class="vrow-btn primary" type="button" onclick="openContactPrompt('${id}')">📱 연락처</button>`;
  }
  const phoneText = p.phone ? `<span class="vrow-phone">${escapeHtml(p.phone)}</span>` : '';

  row.innerHTML = `
    <div class="vrow-avatar ${p.gender === 'female' ? 'female' : 'male'}">${escapeHtml((p.name || '?').charAt(0))}</div>
    <div class="vrow-info">
      <div class="vrow-name">${escapeHtml(p.name)} <span class="vrow-rel">${escapeHtml(p.relation || '')}</span></div>
      <div class="vrow-meta">${statusBadge}${phoneText}</div>
    </div>
    <div class="vrow-actions">${actionBtn}</div>
  `;
  return row;
}

function openContactPrompt(id) {
  const p = getPerson(id);
  if (!p) return;
  const input = prompt(`${p.name}님의 전화번호를 입력하세요 (예: 010-1234-5678):`, p.phone || '');
  if (input === null) return;
  const phone = input.trim().replace(/[^0-9+\-]/g, '');
  const target = data.people[id];
  if (!target) return;
  if (!phone) {
    target.phone = null; target.invitedAt = null; target.confirmed = false;
    saveData(); rerender();
    showToast('📱', '연락처 제거됨');
    return;
  }
  target.phone = phone;
  target.invitedAt = Date.now();
  target.confirmed = false;
  saveData(); rerender();
  showToast('✉', `${p.name}님에게 인증 초대 발송`);
}

function sendInvite(id) {
  const p = data.people[id];
  if (!p) return;
  if (!p.phone) { showToast('⚠️', '연락처 먼저 추가'); return; }
  p.invitedAt = Date.now();
  saveData(); rerender();
  showToast('✉', `${p.name}님에게 인증 초대 발송`);
}

function markConfirmed(id) {
  const p = data.people[id];
  if (!p) return;
  p.confirmed = true;
  saveData(); rerender();
  showToast('✓', `${p.name}님 인증 완료`);

function revertConfirm(id) {
  const p = data.people[id];

// Stage 4 — 증명서 발급
// 인증된 가족 ≥2명일 때 활성화. 발급 시 cert.html에서 슬라이드로 노출됨.
// ============================================================
const CERT_STORAGE_KEY = 'pass_family_certificates';

function loadCertificates() {
  try {
    const raw = localStorage.getItem(CERT_STORAGE_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) return arr;
    }
  } catch (e) {}
  return [];
}

function saveCertificates(certs) {
  // throw할 수 있어 호출자가 try/catch 처리
  localStorage.setItem(CERT_STORAGE_KEY, JSON.stringify(certs));
}

// 발급 폼 임시 상태 (다른 탭으로 이동해도 유지, 발급 성공 시 리셋)
let pendingCertTitle = null; // null이면 default 사용
let pendingCertImage = null; // dataURL or null

function defaultCertTitle() {
  return `${data.me.name || '나'}의 가족증`;
}

// 이미지를 최대 240px로 리사이즈하고 JPEG dataURL 반환 (~20KB)
function resizeImageToDataUrl(file, maxDim = 240) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h) { if (w > maxDim) { h = (h * maxDim) / w; w = maxDim; } }
        else      { if (h > maxDim) { w = (w * maxDim) / h; h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImageUpload(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  if (!/^image\//.test(file.type)) { showToast('⚠️', '이미지 파일을 선택하세요'); return; }
  try {
    pendingCertImage = await resizeImageToDataUrl(file, 240);
    renderIssueForm();
    renderIssuePreview();
  } catch (err) {
    console.warn('image upload failed', err);
    showToast('⚠️', '이미지를 불러오지 못했어요');
  }
}

  }).join('');

}

function issueCertificate() {
  const confirmedOthers = getAllPeople().filter(p => p.confirmed && !p.isSelf);
  if (confirmedOthers.length < 2) {
    showToast('⚠️', '인증된 가족 2명 이상 필요');
    return;
  }
  const me = getPerson('me');
  const members = [me, ...confirmedOthers].map(p => ({
    id: p.id, name: p.name, gender: p.gender,
    relation: p.relation || (p.isSelf ? '본인' : ''),
    confirmed: true,
  }));
  const customTitle = (pendingCertTitle || '').trim() || defaultCertTitle();
  const cert = {
    id: 'fam_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    kind: 'family',
    title: '가족증',
    customTitle,
    customImage: pendingCertImage || null,
    issuedAt: Date.now(),
    issuedFor: { id: 'me', name: me.name, gender: me.gender },
    members,
  };
  const certs = loadCertificates();
  certs.push(cert);
  try {
    saveCertificates(certs);
  } catch (err) {
    showToast('⚠️', '저장 공간 부족 — 이미지를 작게 하거나 제거 후 다시 시도');
    return;
  }
  // 다음 발급을 위해 draft 리셋
  pendingCertTitle = null;
  pendingCertImage = null;
  renderIssue();
  showToast('🎉', `${customTitle} 발급 완료 (${members.length}명)`);
}

function deleteCertificate(id) {
  if (!confirm('이 증명서를 삭제할까요? 증명서 화면에서도 사라집니다.')) return;
  let certs = loadCertificates();
  certs = certs.filter(c => c.id !== id);
  try { saveCertificates(certs); } catch (e) {}
  renderIssue();
  showToast('🗑', '삭제됨');
}

// ============================================================
// Stage 3 — 전체보기 (SVG 그래프)
// ============================================================
function renderView() {
  const sum = document.getElementById('viewSummary');
  const all = getAllPeople();
  const confirmedCount = all.filter(p => p.confirmed).length;
  const pendingCount = all.filter(p => !p.confirmed && p.invitedAt).length;
  sum.innerHTML = `
    <div class="summary-card"><div class="sc-num">${all.length}</div><div class="sc-label">전체</div></div>
    <div class="summary-card confirmed"><div class="sc-num confirmed">${confirmedCount}</div><div class="sc-label">✓ 인증</div></div>
    <div class="summary-card pending"><div class="sc-num pending">${pendingCount}</div><div class="sc-label">⏱ 대기</div></div>
  `;
  renderGraphSvg();
}

function renderGraphSvg() {
  const svg = document.getElementById('graphSvg');
  const edgesG = document.getElementById('graphEdges');
  const nodesG = document.getElementById('graphNodes');
  edgesG.innerHTML = '';
  nodesG.innerHTML = '';

  const gens = computeGenerations();
  const byGen = {};
  for (const [id, g] of Object.entries(gens)) (byGen[g] = byGen[g] || []).push(id);
  const genNumbers = Object.keys(byGen).map(Number).sort((a, b) => a - b);

  const W = 360;
  const rowH = 80;
  const startY = 40;
  const positions = {};

  genNumbers.forEach((g, gi) => {
    const ids = byGen[g];
    ids.sort((a, b) => (getPerson(a).addedAt || 0) - (getPerson(b).addedAt || 0));
    const n = ids.length;
    const minGap = 70;
    const maxRow = W - 30;
    const gap = n > 1 ? Math.min(minGap, maxRow / (n - 1)) : 0;
    const totalW = (n - 1) * gap;
    const startX = W / 2 - totalW / 2;
    ids.forEach((id, i) => {
      positions[id] = { x: startX + i * gap, y: startY + gi * rowH };
    });
  });

  // Edges
  for (const p of getAllPeople()) {
    if (!positions[p.id]) continue;
    const from = positions[p.id];
    // parent edges (this person → each parent)
    for (const pid of (p.parentIds || [])) {
      const to = positions[pid];
      if (!to) continue;
      const status = p.confirmed ? 'confirmed' : (p.invitedAt ? 'pending' : 'inactive');
      edgesG.appendChild(makeEdge(from, to, status, 'parent'));
    }
    // spouse edges — draw once
    if (p.spouseId && p.id < p.spouseId) {
      const to = positions[p.spouseId];
      if (to) edgesG.appendChild(makeEdge(from, to, 'spouse', 'spouse'));
    }
  }

  // Nodes
  for (const p of getAllPeople()) {
    const pos = positions[p.id];
    if (!pos) continue;
    nodesG.appendChild(makeGraphNode(p, pos));
  }

  const maxY = startY + (genNumbers.length - 1) * rowH + 40;
  svg.setAttribute('viewBox', `0 0 ${W} ${Math.max(360, maxY)}`);
}

function makeEdge(from, to, status, type) {
  const NS = 'http://www.w3.org/2000/svg';
  const path = document.createElementNS(NS, 'path');
  let d;
  if (type === 'spouse') {
    d = `M ${from.x} ${from.y} L ${to.x} ${to.y}`;
  } else {
    // parent edge: from (child) up to parent through midpoint
    const midY = (from.y + to.y) / 2;
    const childY = from.y - 14;
    const parentY = to.y + 14;
    d = `M ${from.x} ${childY} L ${from.x} ${midY} L ${to.x} ${midY} L ${to.x} ${parentY}`;
  }
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  let stroke = '#94A3B8', dasharray = null, width = 1.5;
  if (status === 'confirmed') { stroke = '#10B981'; width = 2; }
  else if (status === 'pending') { stroke = '#F59E0B'; dasharray = '4 3'; }
  else if (status === 'spouse') { stroke = '#DC2626'; dasharray = '3 3'; }
  path.setAttribute('stroke', stroke);
  path.setAttribute('stroke-width', width);
  path.setAttribute('stroke-linecap', 'round');
  if (dasharray) path.setAttribute('stroke-dasharray', dasharray);
  return path;
}

function makeGraphNode(p, pos) {
  const NS = 'http://www.w3.org/2000/svg';
  const g = document.createElementNS(NS, 'g');
  const w = 58, h = 28;
  const rect = document.createElementNS(NS, 'rect');
  rect.setAttribute('x', pos.x - w / 2);
  rect.setAttribute('y', pos.y - h / 2);
  rect.setAttribute('width', w);
  rect.setAttribute('height', h);
  rect.setAttribute('rx', 7);
  let fill = '#DBEAFE', stroke = '#6FA8DC', sw = 1.5;
  if (p.isSelf) { fill = '#FFFFFF'; stroke = '#F7931E'; sw = 2.5; }
  else if (p.gender === 'female') { fill = '#FCE7F3'; stroke = '#E89BAA'; }
  rect.setAttribute('fill', fill);
  rect.setAttribute('stroke', stroke);
  rect.setAttribute('stroke-width', sw);
  if (!p.confirmed && !p.isSelf) rect.setAttribute('stroke-dasharray', '3 2');
  g.appendChild(rect);

  const text = document.createElementNS(NS, 'text');
  text.setAttribute('x', pos.x);
  text.setAttribute('y', pos.y + 4);
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('font-size', '10.5');
  text.setAttribute('font-weight', '800');
  text.setAttribute('fill', '#1F1F1F');
  text.textContent = (p.name || '?').slice(0, 4);
  g.appendChild(text);

  // status dot
  const dot = document.createElementNS(NS, 'circle');
  dot.setAttribute('cx', pos.x + w / 2 - 5);
  dot.setAttribute('cy', pos.y - h / 2 + 5);
  dot.setAttribute('r', 3.5);
  dot.setAttribute('fill', p.confirmed ? '#10B981' : (p.invitedAt ? '#F59E0B' : '#CBD5E1'));
  g.appendChild(dot);

  return g;
}

// ============================================================
// Toast
// ============================================================
function showToast(emoji, text) {
  const t = document.getElementById('toast');
  t.innerHTML = `<span class="t-emoji">${emoji}</span><span>${escapeHtml(text)}</span>`;
  t.classList.add('visible');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove('visible'), 2200);
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ============================================================
// Modal: 바깥 클릭 닫기 + Enter 키
// ============================================================
document.getElementById('personModal').addEventListener('click', (e) => {
  if (e.target.id === 'personModal') closeModal();
});
document.getElementById('modalName').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('modalPhone').focus();
  }
});
document.getElementById('modalPhone').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    confirmModal();
  }
});

// ============================================================
// Init — ?step=N (1~4) 지원: cert.html의 "관계도 보기" 등에서 진입
// ============================================================
function getInitialStep() {
  try {
    const params = new URLSearchParams(location.search);
    const s = parseInt(params.get('step') || '', 10);
    if (Number.isFinite(s) && s >= 1 && s <= 4) return s;
  } catch (e) {}
  return 1;
}
goToStep(getInitialStep());
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFA000">
<title>PASS — 관계형 SNS</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root {
    --chon-orange: #FFA000;
    --chon-orange-dark: #E87F0A;
    --chon-yellow-soft: #FFF3D6;
    --bg-app: #FFFBF0;
    --bg-content: #FFFFFF;
    --bg-empty: #F8FAFC;
    --text-primary: #1F1F1F;
    --text-secondary: #64748B;
    --text-tertiary: #94A3B8;

    --friend-green: #5BBA6F;
    --friend-green-dark: #16A34A;
    --friend-green-bg: #DCFCE7;
    --friend-green-light: #ECFDF5;

    --node-male: #DBEAFE;
    --node-male-border: #6FA8DC;
    --node-female: #FCE7F3;
    --node-female-border: #E89BAA;
    --node-self-bg: #FFFFFF;
    --node-self-border: #FFA000;
    --node-friend-bg: #DCFCE7;
    --node-friend-border: #5BBA6F;
    --node-ff-bg: #F0FDF4;
    --node-ff-border: #BBF7D0;

    --container-friends: rgba(91, 186, 111, 0.08);
    --container-friends-border: rgba(91, 186, 111, 0.35);
    --container-ff: rgba(187, 247, 208, 0.25);
    --container-ff-border: rgba(187, 247, 208, 0.6);
    --container-me: rgba(255, 230, 200, 0.7);
    --container-me-border: rgba(247, 147, 30, 0.6);

    --status-confirmed: #10B981;
    --status-pending: #F59E0B;

    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 14px rgba(0,0,0,0.08);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.14);

    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-pill: 999px;

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #FFE9C7 0%, var(--bg-app) 280px);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================
     App Shell — Responsive Hybrid Web
     ============================================ */
  .app {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg-app);
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
  }

  /* ============================================
     Header (sticky)
     ============================================ */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--bg-app);
    padding: calc(14px + var(--safe-top)) 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .app-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-brand-mark {
    width: 36px; height: 36px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--chon-orange), var(--friend-green));
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px;
    letter-spacing: -0.5px;
    box-shadow: var(--shadow-sm);
  }
  .app-brand-text { line-height: 1.1; }
  .app-brand-title {
    font-size: 19px;
    font-weight: 900;
    letter-spacing: -0.3px;
  }
  .app-brand-sub {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 700;
    margin-top: 2px;
  }
  .header-action {
    background: white;
    border: 1.5px solid var(--friend-green);
    color: var(--friend-green-dark);
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    flex-shrink: 0;
  }
  .header-action:active { transform: scale(0.97); }

  /* ============================================
     View toggle (sticky below header)
     ============================================ */
  .view-toggle {
    position: sticky;
    top: calc(58px + var(--safe-top));
    z-index: 29;
    background: var(--bg-app);
    display: flex;
    gap: 6px;
    padding: 0 16px 14px;
  }
  .view-toggle-btn {
    flex: 1;
    background: white;
    border: 1.5px solid #E2E8F0;
    color: var(--text-secondary);
    padding: 11px 6px;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .view-toggle-btn.active {
    background: var(--friend-green);
    color: white;
    border-color: var(--friend-green);
    box-shadow: 0 6px 16px rgba(91,186,111,0.32);
  }
  .view-toggle-btn:not(.active):hover {
    border-color: var(--friend-green);
    color: var(--friend-green-dark);
  }

  /* ============================================
     Content
     ============================================ */
  .content {
    flex: 1;
    background: var(--bg-content);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    overflow-x: hidden;
    padding-bottom: calc(40px + var(--safe-bottom));
  }
  .view-panel { display: none; }
  .view-panel.active { display: block; animation: fadeIn 0.18s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============================================
     Summary card
     ============================================ */
  .summary-card {
    background: linear-gradient(135deg, var(--friend-green-light), white);
    margin: 14px 16px 8px;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--node-friend-border);
  }
  .summary-avatar {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: white;
    border: 2.5px solid var(--friend-green);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .summary-info { flex: 1; min-width: 0; }
  .summary-name { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
  .summary-stats {
    font-size: 12px;
    color: var(--friend-green-dark);
    font-weight: 700;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* ============================================
     Verify summary
     ============================================ */
  .verify-summary {
    display: flex;
    gap: 8px;
    padding: 12px 16px 16px;
  }
  .verify-stat-card {
    flex: 1;
    background: white;
    border: 1.5px solid #E2E8F0;
    border-radius: var(--radius-md);
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .verify-stat-card.confirmed {
    border-color: rgba(16, 185, 129, 0.4);
    background: rgba(16, 185, 129, 0.06);
  }
  .verify-stat-card.pending {
    border-color: rgba(245, 158, 11, 0.4);
    background: rgba(245, 158, 11, 0.06);
  }
  .verify-stat-card:active { transform: scale(0.97); }
  .verify-stat-value {
    font-size: 24px;
    font-weight: 900;
    line-height: 1;
  }
  .verify-stat-value.confirmed { color: var(--status-confirmed); }
  .verify-stat-value.pending { color: var(--status-pending); }
  .verify-stat-value.total { color: var(--text-primary); }
  .verify-stat-label {
    font-size: 10px;
    color: var(--text-tertiary);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-top: 6px;
  }
  .verify-quick-btn {
    background: var(--friend-green);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    margin-left: 4px;
  }
  .verify-quick-btn:active { transform: scale(0.95); }

  /* ============================================
     Tree (추가하기) — box containment
     ============================================ */
  .tree-canvas {
    padding: 14px 16px 30px;
    overflow-x: visible;
  }
  .me-block {
    background: var(--container-me);
    border: 2px solid var(--container-me-border);
    border-radius: var(--radius-md);
    padding: 14px 12px 12px;
    margin-bottom: 16px;
    position: relative;
  }
  .me-block-label {
    position: absolute;
    top: -10px;
    left: 14px;
    background: white;
    padding: 2px 10px;
    border-radius: var(--radius-pill);
    font-size: 10px;
    font-weight: 800;
    color: var(--chon-orange-dark);
    border: 1px solid var(--chon-orange-dark);
  }
  .me-block-row {
    display: flex;
    justify-content: center;
  }

  .friends-box {
    background: var(--container-friends);
    border: 2px solid var(--container-friends-border);
    border-radius: var(--radius-md);
    padding: 18px 12px 12px;
    margin-bottom: 16px;
    position: relative;
  }
  .friends-box-label {
    position: absolute;
    top: -10px;
    left: 14px;
    background: white;
    padding: 2px 10px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 800;
    color: var(--friend-green-dark);
    border: 1px solid var(--friend-green);
  }
  .friends-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .ff-box {
    background: var(--container-ff);
    border: 2px dashed var(--container-ff-border);
    border-radius: var(--radius-md);
    padding: 18px 12px 12px;
    margin-bottom: 16px;
    position: relative;
  }
  .ff-box-label {
    position: absolute;
    top: -10px;
    left: 14px;
    background: white;
    padding: 2px 10px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 800;
    color: var(--friend-green-dark);
    border: 1px dashed var(--friend-green);
  }

  .person-node {
    background: white;
    border: 2px solid #CBD5E1;
    border-radius: 10px;
    padding: 9px 10px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    min-width: 0;
  }
  .person-node:active { transform: scale(0.97); }
  .person-node.male { background: var(--node-male); border-color: var(--node-male-border); }
  .person-node.female { background: var(--node-female); border-color: var(--node-female-border); }
  .person-node.self {
    background: var(--node-self-bg);
    border-color: var(--node-self-border);
    border-width: 2.5px;
    box-shadow: 0 0 0 3px rgba(247, 147, 30, 0.15);
  }
  .person-node.friend {
    background: var(--node-friend-bg);
    border-color: var(--node-friend-border);
  }
  .person-node.ff {
    background: var(--node-ff-bg);
    border-color: var(--node-ff-border);
    border-style: dashed;
  }
  .person-node.selected {
    box-shadow: 0 0 0 3px rgba(91, 186, 111, 0.35);
    border-color: var(--friend-green);
  }
  .person-node-name {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .person-node.self .person-node-name { color: var(--chon-orange); }
  .person-node-meta {
    font-size: 9px;
    color: rgba(0,0,0,0.4);
    margin-top: 2px;
    font-weight: 600;
  }
  .person-confirm-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 16px; height: 16px;
    background: var(--status-confirmed);
    color: white;
    border-radius: 50%;
    font-size: 9px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid white;
  }
  .person-confirm-badge.pending { background: var(--status-pending); }

  .empty-slot {
    background: white;
    border: 2px dashed #CBD5E1;
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
    cursor: pointer;
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 52px;
  }
  .empty-slot:active {
    background: var(--friend-green-light);
    border-color: var(--friend-green);
    color: var(--friend-green-dark);
  }

  /* ============================================
     Action panel
     ============================================ */
  .action-panel {
    position: absolute;
    background: white;
    border: 2px solid var(--friend-green);
    border-radius: var(--radius-md);
    padding: 8px;
    box-shadow: var(--shadow-lg);
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 180px;
    animation: panelPop 0.18s ease;
  }
  @keyframes panelPop {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .action-panel::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 8px solid var(--friend-green);
  }
  .ap-btn {
    background: white;
    border: 1.5px solid #E2E8F0;
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .ap-btn:active { transform: scale(0.97); }
  .ap-btn.confirm { border-color: var(--status-confirmed); color: var(--status-confirmed); }
  .ap-btn.promote { border-color: var(--friend-green); color: var(--friend-green-dark); }
  .ap-btn.delete { border-color: #FCA5A5; color: #DC2626; }

  /* ============================================
     Graph (SVG)
     ============================================ */
  .graph-canvas-wrap {
    margin: 0 16px;
    background: var(--bg-empty);
    border: 1px solid #E2E8F0;
    border-radius: var(--radius-md);
    overflow: hidden;
    position: relative;
  }
  #graphSvg {
    width: 100%;
    height: 520px;
    display: block;
  }
  .graph-node-group { cursor: pointer; transition: filter 0.15s; }
  .graph-node-group:hover .graph-node-rect { filter: brightness(1.05); }
  .graph-node-group.me-glow .graph-node-rect {
    filter: drop-shadow(0 0 6px rgba(247, 147, 30, 0.4));
  }
  .graph-node-label {
    font-family: 'Pretendard', sans-serif;
    font-size: 10px;
    font-weight: 700;
    fill: var(--text-primary);
    pointer-events: none;
    text-anchor: middle;
  }
  .graph-node-rel {
    font-family: 'Pretendard', sans-serif;
    font-size: 8.5px;
    font-weight: 500;
    fill: var(--text-tertiary);
    pointer-events: none;
    text-anchor: middle;
  }
  .graph-node-avatar {
    font-size: 26px;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .graph-tier-label {
    font-family: 'Pretendard', sans-serif;
    font-size: 9px;
    font-weight: 700;
    fill: var(--text-tertiary);
    pointer-events: none;
    text-anchor: start;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .graph-legend {
    margin: 12px 16px 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .gl-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
  }
  .gl-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid;
    display: inline-block;
  }

  /* ============================================
     List (인증현황)
     ============================================ */
  .section-header {
    padding: 8px 16px 8px;
    display: flex;
    align-items: center;
  }
  .section-header h2 {
    margin: 0;
    font-size: 14px;
    font-weight: 800;
    color: var(--text-secondary);
  }
  .list-section { padding: 0 16px 30px; }
  .list-tier { margin-bottom: 18px; }
  .list-tier-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 4px;
    margin-bottom: 8px;
  }
  .tier-badge {
    background: var(--friend-green-light);
    color: var(--friend-green-dark);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 800;
    border: 1px solid var(--friend-green);
  }
  .tier-badge.ff {
    background: white;
    color: var(--friend-green-dark);
    border-style: dashed;
  }
  .tier-count { color: var(--text-tertiary); font-size: 11px; font-weight: 700; }
  .list-item {
    background: white;
    border: 1px solid #E2E8F0;
    border-radius: var(--radius-md);
    padding: 11px 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .list-item:active { transform: scale(0.98); }
  .list-item:hover { border-color: var(--friend-green); }
  .list-item.friend { border-left: 4px solid var(--friend-green); }
  .list-item.ff { border-left: 4px dashed var(--friend-green); }
  .list-item.self { border-left: 4px solid var(--chon-orange); }
  .list-item-avatar {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: var(--friend-green);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .list-item.self .list-item-avatar { background: var(--chon-orange); }
  .list-item.ff .list-item-avatar { background: var(--text-tertiary); }
  .list-item-info { flex: 1; min-width: 0; }
  .list-item-name {
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 2px;
  }
  .list-item-meta {
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .list-item-status {
    font-size: 18px;
    font-weight: 900;
  }

  /* ============================================
     Modal — Full screen on mobile, centered on desktop
     ============================================ */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
    display: none;
    animation: backdropFade 0.2s ease;
  }
  .modal-backdrop.visible { display: block; }
  @keyframes backdropFade { from { opacity: 0; } to { opacity: 1; } }

  .modal-fs {
    position: fixed;
    inset: 0;
    background: var(--bg-app);
    z-index: 100;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-fs.visible {
    display: flex;
    animation: slideUp 0.28s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-fs-header {
    padding: calc(14px + var(--safe-top)) 16px 14px;
    background: white;
    border-bottom: 1px solid #E2E8F0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .modal-fs-close {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text-secondary);
    cursor: pointer;
    width: 32px; height: 32px;
  }
  .modal-fs-title { font-size: 16px; font-weight: 900; text-align: center; flex: 1; }
  .modal-fs-save {
    background: var(--friend-green);
    color: white;
    border: none;
    padding: 7px 18px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  .modal-fs-body { flex: 1; overflow-y: auto; padding: 24px; max-width: 560px; margin: 0 auto; width: 100%; }
  .modal-section { margin-bottom: 24px; }
  .modal-section-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--text-secondary);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #E2E8F0;
    border-radius: var(--radius-md);
    font-size: 16px;
    font-family: inherit;
    background: white;
  }
  .modal-input:focus { outline: none; border-color: var(--friend-green); }
  .gender-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .gender-option {
    padding: 16px;
    text-align: center;
    border-radius: var(--radius-md);
    border: 2px solid #E2E8F0;
    cursor: pointer;
    font-weight: 700;
    background: white;
    font-size: 14px;
  }
  .gender-option.selected.male {
    background: var(--node-male);
    border-color: var(--node-male-border);
    color: #1E3A8A;
  }
  .gender-option.selected.female {
    background: var(--node-female);
    border-color: var(--node-female-border);
    color: #831843;
  }

  /* ============================================
     Toast
     ============================================ */
  .toast {
    position: fixed;
    bottom: calc(40px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: var(--text-primary);
    color: white;
    padding: 13px 22px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    display: flex;
    gap: 8px;
    box-shadow: var(--shadow-lg);
    white-space: nowrap;
  }
  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ============================================
     Responsive breakpoints
     ============================================ */
  @media (min-width: 768px) {
    body { padding: 32px 0; }
    .app {
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: calc(100vh - 64px);
      min-height: calc(100dvh - 64px);
    }
    .modal-fs {
      max-width: 560px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: var(--radius-lg);
      top: 32px;
      bottom: 32px;
      inset: auto;
      height: auto;
    }
    .modal-fs.visible {
      animation: modalPop 0.25s ease;
    }
    @keyframes modalPop {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
  }

  @media (min-width: 1024px) {
    .app { max-width: 640px; }
    #graphSvg { height: 580px; }
    .friends-grid { grid-template-columns: repeat(4, 1fr); }
  }

  @media (min-width: 1280px) {
    .app { max-width: 720px; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <div class="app-brand">
      <div class="app-brand-mark">P</div>
      <div class="app-brand-text">
        <div class="app-brand-title">PASS</div>
        <div class="app-brand-sub">관계형 SNS · 모임 네트워크</div>
      </div>
    </div>
    <button class="header-action" onclick="resetAll()">처음부터</button>
  </header>

  <nav class="view-toggle">
    <button class="view-toggle-btn active" id="toggleGraph" onclick="switchView('graph')">
      <span>🌐</span><span>모임</span>
    </button>
    <button class="view-toggle-btn" id="toggleTree" onclick="switchView('tree')">
      <span>➕</span><span>추가하기</span>
    </button>
    <button class="view-toggle-btn" id="toggleList" onclick="switchView('list')">
      <span>✓</span><span>인증현황</span>
    </button>
  </nav>

  <main class="content">
    <div class="summary-card">
      <div class="summary-avatar">🌐</div>
      <div class="summary-info">
        <div class="summary-name" id="summaryName">내 PASS 네트워크</div>
        <div class="summary-stats">
          <span>👥 <strong id="statTotal">5</strong>명</span>
          <span>✓ <strong id="statConfirmed">3</strong>명</span>
          <span>🔗 <strong id="statFf">2</strong>명(2-hop)</span>
        </div>
      </div>
    </div>

    <!-- Graph View (default) -->
    <section class="view-panel active" id="viewGraph">
      <div class="graph-canvas-wrap">
        <svg id="graphSvg" viewBox="0 0 360 500" preserveAspectRatio="xMidYMid meet">
          <g id="graphEdges"></g>
          <g id="graphNodes"></g>
        </svg>
      </div>
      <div class="graph-legend">
        <div class="gl-item"><span class="gl-dot" style="background: var(--node-friend-bg); border-color: var(--node-friend-border);"></span> 모임원 (1-hop)</div>
        <div class="gl-item"><span class="gl-dot" style="background: var(--node-ff-bg); border-color: var(--node-ff-border); border-style: dashed;"></span> 모임원 추천 (2-hop)</div>
      </div>
    </section>

    <!-- Tree View (추가하기) -->
    <section class="view-panel" id="viewTree">
      <div class="tree-canvas" id="treeCanvas"></div>
    </section>

    <!-- List View (인증현황) -->
    <section class="view-panel" id="viewList">
      <div class="verify-summary" id="verifySummary"></div>
      <div class="section-header">
        <h2>✓ 인증 현황</h2>
      </div>
      <div class="list-section" id="resultList"></div>
    </section>
  </main>
</div>

<!-- Modal backdrop -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeFsModal()"></div>

<!-- Modal -->
<div class="modal-fs" id="modalFs">
  <div class="modal-fs-header">
    <button class="modal-fs-close" onclick="closeFsModal()" aria-label="닫기">✕</button>
    <div class="modal-fs-title" id="modalFsTitle">새 모임원 추가</div>
    <button class="modal-fs-save" onclick="confirmFsAdd()">완료</button>
  </div>
  <div class="modal-fs-body">
    <div class="modal-section">
      <div class="modal-section-label">이름</div>
      <input type="text" class="modal-input" id="modalFsName" placeholder="홍길동" autocomplete="off"/>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">성별</div>
      <div class="gender-toggle">
        <div class="gender-option male selected" onclick="selectGender('male')">남성</div>
        <div class="gender-option female" onclick="selectGender('female')">여성</div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span id="toastEmoji">✓</span><span id="toastText"></span>
</div>

<script>
// ============================================================
// Data
// ============================================================
const initialMe = {
  id: 'me', name: '홍길순', gender: 'female', isSelf: true, confirmed: true
};
const initialPeople = [
  { id: 'f1', name: '김민수', gender: 'male', hopLevel: 1, confirmed: true, knows: ['f2'] },
  { id: 'f2', name: '박지영', gender: 'female', hopLevel: 1, confirmed: true, knows: ['f3'] },
  { id: 'f3', name: '이상호', gender: 'male', hopLevel: 1, confirmed: true },
  { id: 'ff1', name: '최서연', gender: 'female', hopLevel: 2, confirmed: false, viaFriend: 'f1' },
  { id: 'ff2', name: '정태우', gender: 'male', hopLevel: 2, confirmed: false, viaFriends: ['f2', 'f1'] },
  { id: 'ff3', name: '강하늘', gender: 'male', hopLevel: 2, confirmed: false, viaFriends: ['f1', 'f2', 'f3'] }
];

let state = {
  me: { ...initialMe },
  people: JSON.parse(JSON.stringify(initialPeople))
};
let selectedNodeId = null;
let pendingGender = 'male';
let pendingAction = null;
let currentView = 'graph';

function getPerson(id) {
  if (id === 'me' || id === state.me.id) return state.me;
  return state.people.find(x => x.id === id);
}

function getViaList(p) {
  if (Array.isArray(p.viaFriends)) return p.viaFriends.slice();
  if (p.viaFriend) return [p.viaFriend];
  return [];
}

// ============================================================
// View switch
// ============================================================
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.remove('active'));
  const btnMap = { tree: 'toggleTree', graph: 'toggleGraph', list: 'toggleList' };
  const panelMap = { tree: 'viewTree', graph: 'viewGraph', list: 'viewList' };
  document.getElementById(btnMap[view]).classList.add('active');
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(panelMap[view]).classList.add('active');
  if (view === 'tree') renderTree();
  else if (view === 'graph') renderGraph();
  else renderList();
  document.querySelectorAll('.action-panel').forEach(p => p.remove());
}

// ============================================================
// Tree View
// ============================================================
function renderTree() {
  const canvas = document.getElementById('treeCanvas');
  if (!canvas) return;
  canvas.innerHTML = '';

  const meBlock = document.createElement('div');
  meBlock.className = 'me-block';
  meBlock.innerHTML = '<div class="me-block-label">🏠 나</div>';
  const meRow = document.createElement('div');
  meRow.className = 'me-block-row';
  meRow.appendChild(makePersonNode(state.me));
  meBlock.appendChild(meRow);
  canvas.appendChild(meBlock);

  const friends = state.people.filter(p => p.hopLevel === 1);
  const fBox = document.createElement('div');
  fBox.className = 'friends-box';
  fBox.innerHTML = `<div class="friends-box-label">👫 모임원 (${friends.length}명, 1-hop)</div>`;
  const fGrid = document.createElement('div');
  fGrid.className = 'friends-grid';
  friends.forEach(p => fGrid.appendChild(makePersonNode(p)));
  const fSlot = document.createElement('div');
  fSlot.className = 'empty-slot';
  fSlot.textContent = '+ 모임원';
  fSlot.onclick = (e) => { e.stopPropagation(); openAddRoot('friend'); };
  fGrid.appendChild(fSlot);
  fBox.appendChild(fGrid);
  canvas.appendChild(fBox);

  const ffs = state.people.filter(p => p.hopLevel === 2);
  const ffBox = document.createElement('div');
  ffBox.className = 'ff-box';
  ffBox.innerHTML = `<div class="ff-box-label">🔗 모임원 추천 (${ffs.length}명, 2-hop)</div>`;
  const ffGrid = document.createElement('div');
  ffGrid.className = 'friends-grid';
  ffs.forEach(p => ffGrid.appendChild(makePersonNode(p)));
  const ffSlot = document.createElement('div');
  ffSlot.className = 'empty-slot';
  ffSlot.textContent = '+ 추천받은 사람';
  ffSlot.onclick = (e) => { e.stopPropagation(); openAddRoot('ff'); };
  ffGrid.appendChild(ffSlot);
  ffBox.appendChild(ffGrid);
  canvas.appendChild(ffBox);
}

function makePersonNode(person) {
  const node = document.createElement('div');
  let classes = ['person-node'];
  if (person.isSelf) classes.push('self');
  else if (person.hopLevel === 1) classes.push('friend');
  else if (person.hopLevel === 2) classes.push('ff');
  if (person.id === selectedNodeId) classes.push('selected');
  node.className = classes.join(' ');

  let meta = '';
  if (person.hopLevel === 1) meta = '모임원';
  else if (person.hopLevel === 2) {
    const vias = getViaList(person).map(id => getPerson(id)).filter(Boolean);
    if (vias.length === 0) meta = '소개';
    else if (vias.length === 1) meta = `via ${vias[0].name}`;
    else meta = `via ${vias[0].name} 외 ${vias.length - 1}명`;
  }

  node.innerHTML = `
    <div class="person-node-name">${person.name}${person.isSelf ? ' <span style="font-size:9px;">(나)</span>' : ''}</div>
    ${meta ? `<div class="person-node-meta">${meta}</div>` : ''}
    ${!person.isSelf ? `<div class="person-confirm-badge ${person.confirmed ? '' : 'pending'}">${person.confirmed ? '✓' : '!'}</div>` : ''}
  `;

  node.onclick = (e) => {
    e.stopPropagation();
    selectNode(person.id);
  };

  return node;
}

function selectNode(id) {
  if (selectedNodeId === id) selectedNodeId = null;
  else selectedNodeId = id;
  renderTree();
  if (selectedNodeId) setTimeout(showActionPanelForSelected, 50);
}

function showActionPanelForSelected() {
  if (!selectedNodeId) return;
  const person = getPerson(selectedNodeId);
  if (!person) return;

  const nodes = document.querySelectorAll('.person-node.selected');
  if (nodes.length === 0) return;
  const node = nodes[0];
  const canvas = document.getElementById('treeCanvas');
  const nodeRect = node.getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();

  document.querySelectorAll('.action-panel').forEach(p => p.remove());

  const panel = document.createElement('div');
  panel.className = 'action-panel';

  const buttons = [];
  if (!person.isSelf) {
    if (person.hopLevel === 2 && !person.confirmed) {
      buttons.push({ label: '🤝 모임원으로 인증 (승격)', className: 'promote', onClick: () => promoteToFriend(person.id) });
    } else {
      buttons.push({ label: person.confirmed ? '⏱ 대기로' : '✓ 인증', className: 'confirm', onClick: () => toggleConfirm(person.id) });
    }
    buttons.push({ label: '🗑 삭제', className: 'delete', onClick: () => deletePerson(person.id) });
  }

  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `ap-btn ${b.className || ''}`;
    btn.innerHTML = b.label;
    btn.onclick = b.onClick;
    panel.appendChild(btn);
  });

  const cx = nodeRect.left + nodeRect.width / 2 - canvasRect.left;
  const by = nodeRect.bottom - canvasRect.top + 12;
  panel.style.position = 'absolute';
  panel.style.left = `${cx - 90}px`;
  panel.style.top = `${by}px`;
  canvas.style.position = 'relative';
  canvas.appendChild(panel);
}

// ============================================================
// Graph View
// ============================================================
function renderGraph() {
  const svg = document.getElementById('graphSvg');
  if (!svg) return;
  const edgesG = document.getElementById('graphEdges');
  const nodesG = document.getElementById('graphNodes');
  edgesG.innerHTML = '';
  nodesG.innerHTML = '';

  const friends = state.people.filter(p => p.hopLevel === 1);
  const ffs = state.people.filter(p => p.hopLevel === 2);

  const W = 360;
  const cx = W / 2;
  const cy = 240;
  const positions = {};

  positions[state.me.id] = { x: cx, y: cy };

  const fRadius = 85;
  const fCount = friends.length;
  friends.forEach((f, i) => {
    const angle = (-Math.PI / 2) + (i / Math.max(fCount, 1)) * Math.PI * 2;
    positions[f.id] = {
      x: cx + Math.cos(angle) * fRadius,
      y: cy + Math.sin(angle) * fRadius
    };
  });

  const ffRadius = 150;
  const ffCount = ffs.length;
  ffs.forEach((ff, i) => {
    const viaList = getViaList(ff).filter(id => positions[id]);
    let ffAngle;
    if (viaList.length > 0) {
      const avgX = viaList.reduce((s, id) => s + positions[id].x, 0) / viaList.length;
      const avgY = viaList.reduce((s, id) => s + positions[id].y, 0) / viaList.length;
      const dist = Math.hypot(avgX - cx, avgY - cy);
      if (dist >= 15) {
        ffAngle = Math.atan2(avgY - cy, avgX - cx);
        const offset = (i / Math.max(ffCount, 1)) * 0.3 - 0.15;
        ffAngle += offset;
      } else {
        const sumCos = viaList.reduce((s, id) => s + Math.cos(Math.atan2(positions[id].y - cy, positions[id].x - cx)), 0);
        const sumSin = viaList.reduce((s, id) => s + Math.sin(Math.atan2(positions[id].y - cy, positions[id].x - cx)), 0);
        if (Math.hypot(sumCos, sumSin) >= 0.1) {
          ffAngle = Math.atan2(sumSin, sumCos);
        } else {
          ffAngle = (i / Math.max(ffCount, 1)) * Math.PI * 2 + Math.PI / 4;
        }
      }
    } else {
      ffAngle = (i / Math.max(ffCount, 1)) * Math.PI * 2 + Math.PI / 4;
    }
    positions[ff.id] = {
      x: cx + Math.cos(ffAngle) * ffRadius,
      y: cy + Math.sin(ffAngle) * ffRadius
    };
  });

  const lblMe = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  lblMe.classList.add('graph-tier-label');
  lblMe.setAttribute('x', 8); lblMe.setAttribute('y', 18);
  lblMe.textContent = '🌐 PASS 모임 네트워크';
  nodesG.appendChild(lblMe);

  const edges = [];
  friends.forEach(f => {
    edges.push({ from: state.me.id, to: f.id, hop: 1, status: f.confirmed ? 'confirmed' : 'pending' });
  });
  ffs.forEach(ff => {
    getViaList(ff).forEach(vid => {
      if (positions[vid]) edges.push({ from: vid, to: ff.id, hop: 2, status: 'confirmed' });
    });
  });
  const seenLateral = new Set();
  friends.forEach(f => {
    (f.knows || []).forEach(otherId => {
      const key = [f.id, otherId].sort().join('|');
      if (seenLateral.has(key)) return;
      seenLateral.add(key);
      if (positions[otherId]) edges.push({ from: f.id, to: otherId, hop: 'lateral', status: 'confirmed' });
    });
  });

  const trimToBox = (fx, fy, tx, ty) => {
    const dx = tx - fx, dy = ty - fy;
    if (dx === 0 && dy === 0) return [fx, fy];
    const halfW = 25, topOff = 25, bottomOff = 51;
    let bestT = Infinity;
    if (dy < 0) { const t = -topOff / dy; if (t > 0 && t < bestT) bestT = t; }
    else if (dy > 0) { const t = bottomOff / dy; if (t > 0 && t < bestT) bestT = t; }
    if (dx > 0) { const t = halfW / dx; if (t > 0 && t < bestT) bestT = t; }
    else if (dx < 0) { const t = -halfW / dx; if (t > 0 && t < bestT) bestT = t; }
    if (!isFinite(bestT)) return [fx, fy];
    return [fx + dx * bestT, fy + dy * bestT];
  };

  edges.forEach(e => {
    const from = positions[e.from];
    const to = positions[e.to];
    if (!from || !to) return;
    const [x1, y1] = trimToBox(from.x, from.y, to.x, to.y);
    const [x2, y2] = trimToBox(to.x, to.y, from.x, from.y);

    if (e.hop === 'lateral') {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;
      const ox = mx - cx;
      const oy = my - cy;
      const olen = Math.hypot(ox, oy) || 1;
      const curv = 30;
      const cpX = mx + (ox / olen) * curv;
      const cpY = my + (oy / olen) * curv;
      path.setAttribute('d', `M ${x1} ${y1} Q ${cpX} ${cpY} ${x2} ${y2}`);
      path.setAttribute('stroke', '#34D399');
      path.setAttribute('stroke-width', '1.8');
      path.setAttribute('stroke-dasharray', '6 4');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('fill', 'none');
      edgesG.appendChild(path);
      return;
    }

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    if (e.hop === 1) {
      line.setAttribute('stroke', e.status === 'confirmed' ? '#5BBA6F' : '#F59E0B');
      line.setAttribute('stroke-width', e.status === 'confirmed' ? 2 : 1.5);
      if (e.status !== 'confirmed') line.setAttribute('stroke-dasharray', '4 3');
    } else {
      line.setAttribute('stroke', '#BBF7D0');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('stroke-dasharray', '3 3');
    }
    line.setAttribute('stroke-linecap', 'round');
    edgesG.appendChild(line);
  });

  const getRelLabel = (p) => {
    if (p.isSelf) return '본인';
    if (p.hopLevel === 1) return '모임원';
    if (p.hopLevel === 2) return '추천 (2-hop)';
    return '';
  };
  const getAvatar = (p) => {
    if (p.gender === 'female') return '👩';
    if (p.gender === 'male') return '👨';
    return '👤';
  };

  Object.entries(positions).forEach(([id, pos]) => {
    const person = getPerson(id);
    if (!person) return;

    const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    grp.classList.add('graph-node-group');
    if (person.isSelf) grp.classList.add('me-glow');

    const w = 50, h = 50;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.classList.add('graph-node-rect');
    rect.setAttribute('x', pos.x - w/2);
    rect.setAttribute('y', pos.y - h/2);
    rect.setAttribute('width', w);
    rect.setAttribute('height', h);
    rect.setAttribute('rx', 10);

    let fill, stroke, sw = 1.5;
    if (person.isSelf) { fill = '#FFFFFF'; stroke = '#FFA000'; sw = 2.5; }
    else if (person.hopLevel === 1) { fill = '#DCFCE7'; stroke = '#5BBA6F'; sw = 2; }
    else { fill = '#F0FDF4'; stroke = '#BBF7D0'; rect.setAttribute('stroke-dasharray', '3 2'); }
    if (!person.confirmed && !person.isSelf && person.hopLevel === 1) rect.setAttribute('stroke-dasharray', '3 2');
    rect.setAttribute('fill', fill);
    rect.setAttribute('stroke', stroke);
    rect.setAttribute('stroke-width', sw);
    grp.appendChild(rect);

    const avatar = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    avatar.classList.add('graph-node-avatar');
    avatar.setAttribute('x', pos.x);
    avatar.setAttribute('y', pos.y);
    avatar.textContent = getAvatar(person);
    grp.appendChild(avatar);

    const nameT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameT.classList.add('graph-node-label');
    nameT.setAttribute('x', pos.x);
    nameT.setAttribute('y', pos.y + 37);
    nameT.textContent = person.name;
    grp.appendChild(nameT);

    const relLabel = getRelLabel(person);
    if (relLabel) {
      const relT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      relT.classList.add('graph-node-rel');
      relT.setAttribute('x', pos.x);
      relT.setAttribute('y', pos.y + 48);
      relT.textContent = relLabel;
      grp.appendChild(relT);
    }

    let clickTimer = null;
    grp.addEventListener('click', (e) => {
      e.stopPropagation();
      if (clickTimer) return;
      clickTimer = setTimeout(() => {
        clickTimer = null;
        selectedNodeId = id;
        showGraphActionPanel(id, e);
      }, 250);
    });
    grp.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      selectedNodeId = id;
      switchView('tree');
    });

    nodesG.appendChild(grp);
  });
}

function showGraphActionPanel(personId, evt) {
  const person = getPerson(personId);
  if (!person) return;
  document.querySelectorAll('.action-panel').forEach(p => p.remove());

  const panel = document.createElement('div');
  panel.className = 'action-panel';

  const buttons = [];
  if (!person.isSelf) {
    if (person.hopLevel === 2 && !person.confirmed) {
      buttons.push({ label: '🤝 모임원으로 인증', className: 'promote', onClick: () => { promoteToFriend(person.id); closeGraphPanel(); } });
    } else {
      buttons.push({ label: person.confirmed ? '⏱ 대기로' : '✓ 인증', className: 'confirm', onClick: () => { toggleConfirm(person.id); closeGraphPanel(); } });
    }
  }
  buttons.push({ label: '➕ 추가하기 탭', className: 'promote', onClick: () => { switchView('tree'); } });
  if (!person.isSelf) {
    buttons.push({ label: '🗑 삭제', className: 'delete', onClick: () => { deletePerson(person.id); closeGraphPanel(); } });
  }

  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `ap-btn ${b.className || ''}`;
    btn.innerHTML = b.label;
    btn.onclick = b.onClick;
    panel.appendChild(btn);
  });

  const svgEl = document.getElementById('graphSvg');
  const wrap = svgEl.closest('.graph-canvas-wrap');
  if (!wrap) return;
  const wrapRect = wrap.getBoundingClientRect();
  const targetRect = evt.target.getBoundingClientRect();
  const x = targetRect.left + targetRect.width / 2 - wrapRect.left;
  const y = targetRect.bottom - wrapRect.top + 12;

  panel.style.position = 'absolute';
  panel.style.left = `${Math.max(8, x - 90)}px`;
  panel.style.top = `${y}px`;
  wrap.style.position = 'relative';
  wrap.appendChild(panel);
}

function closeGraphPanel() {
  document.querySelectorAll('.action-panel').forEach(p => p.remove());
}

// ============================================================
// List View
// ============================================================
function renderList() {
  const container = document.getElementById('resultList');
  const summaryEl = document.getElementById('verifySummary');
  if (!container) return;
  container.innerHTML = '';

  const allPeople = [state.me, ...state.people];
  const confirmedCount = allPeople.filter(p => p.confirmed || p.isSelf).length;
  const pendingCount = allPeople.length - confirmedCount;
  summaryEl.innerHTML = `
    <div class="verify-stat-card">
      <div class="verify-stat-value total">${allPeople.length}</div>
      <div class="verify-stat-label">전체</div>
    </div>
    <div class="verify-stat-card confirmed">
      <div class="verify-stat-value confirmed">${confirmedCount}</div>
      <div class="verify-stat-label">✓ 인증</div>
    </div>
    <div class="verify-stat-card pending">
      <div class="verify-stat-value pending">${pendingCount}</div>
      <div class="verify-stat-label">⏱ 미인증</div>
    </div>
  `;

  const meDiv = document.createElement('div');
  meDiv.className = 'list-tier';
  meDiv.innerHTML = `<div class="list-tier-header"><span class="tier-badge" style="background:rgba(247,147,30,0.15); border-color:var(--chon-orange); color:var(--chon-orange-dark);">🏠 나</span><span class="tier-count">1명</span></div>`;
  meDiv.appendChild(makeListItem(state.me));
  container.appendChild(meDiv);

  const friends = state.people.filter(p => p.hopLevel === 1);
  if (friends.length > 0) {
    const fd = document.createElement('div');
    fd.className = 'list-tier';
    fd.innerHTML = `<div class="list-tier-header"><span class="tier-badge">👫 모임원 (1-hop)</span><span class="tier-count">${friends.length}명</span></div>`;
    friends.forEach(p => fd.appendChild(makeListItem(p)));
    container.appendChild(fd);
  }

  const ffs = state.people.filter(p => p.hopLevel === 2);
  if (ffs.length > 0) {
    const ffd = document.createElement('div');
    ffd.className = 'list-tier';
    ffd.innerHTML = `<div class="list-tier-header"><span class="tier-badge ff">🔗 모임원 추천 (2-hop)</span><span class="tier-count">${ffs.length}명</span></div>`;
    ffs.forEach(p => ffd.appendChild(makeListItem(p)));
    container.appendChild(ffd);
  }
}

function makeListItem(p) {
  const item = document.createElement('div');
  let classes = ['list-item'];
  if (p.isSelf) classes.push('self');
  else if (p.hopLevel === 1) classes.push('friend');
  else if (p.hopLevel === 2) classes.push('ff');
  item.className = classes.join(' ');
  item.onclick = () => { selectedNodeId = p.id; switchView('tree'); };

  let meta = '';
  if (p.isSelf) meta = '본인';
  else if (p.hopLevel === 1) meta = '모임원';
  else {
    const vias = getViaList(p).map(id => getPerson(id)).filter(Boolean);
    if (vias.length === 0) meta = '소개';
    else if (vias.length === 1) meta = `소개: ${vias[0].name}`;
    else meta = `소개: ${vias[0].name} 외 ${vias.length - 1}명`;
  }

  let quickBtn = '';
  if (!p.confirmed && !p.isSelf) {
    if (p.hopLevel === 2) {
      quickBtn = `<button class="verify-quick-btn" onclick="event.stopPropagation(); quickPromote('${p.id}')">🤝 모임원으로</button>`;
    } else {
      quickBtn = `<button class="verify-quick-btn" onclick="event.stopPropagation(); quickConfirmList('${p.id}')">✓ 인증</button>`;
    }
  }

  item.innerHTML = `
    <div class="list-item-avatar">${p.name.charAt(0)}</div>
    <div class="list-item-info">
      <div class="list-item-name">${p.name}${p.isSelf ? ' <span style="color: var(--chon-orange);">(나)</span>' : ''}</div>
      <div class="list-item-meta">${meta}</div>
    </div>
    ${quickBtn}
    <div class="list-item-status" style="color: ${p.confirmed || p.isSelf ? 'var(--status-confirmed)' : 'var(--status-pending)'};">
      ${p.confirmed || p.isSelf ? '✓' : '⏱'}
    </div>
  `;
  return item;
}

function quickConfirmList(id) {
  const p = getPerson(id);
  if (!p) return;
  p.confirmed = true;
  renderAll();
  showToast('✓', `${p.name} 인증됨`);
}

function quickPromote(id) { promoteToFriend(id); }

// ============================================================
// Modal & Actions
// ============================================================
function openAddRoot(type) {
  pendingAction = { type };
  document.getElementById('modalFsName').value = '';
  pendingGender = 'male';
  document.querySelectorAll('.gender-option').forEach(o => o.classList.remove('selected'));
  document.querySelector('.gender-option.male').classList.add('selected');
  document.getElementById('modalFsTitle').textContent = type === 'ff' ? '🔗 추천받은 사람 추가' : '👫 새 모임원 추가';
  document.getElementById('modalFs').classList.add('visible');
  document.getElementById('modalBackdrop').classList.add('visible');
  setTimeout(() => document.getElementById('modalFsName').focus(), 350);
}

function selectGender(g) {
  pendingGender = g;
  document.querySelectorAll('.gender-option').forEach(o => o.classList.remove('selected'));
  document.querySelector(`.gender-option.${g}`).classList.add('selected');
}

function closeFsModal() {
  document.getElementById('modalFs').classList.remove('visible');
  document.getElementById('modalBackdrop').classList.remove('visible');
  pendingAction = null;
}

function confirmFsAdd() {
  const name = document.getElementById('modalFsName').value.trim();
  if (!name) { showToast('⚠️', '이름을 입력'); return; }
  if (!pendingAction) return;

  const newId = 'p' + Date.now();
  const newPerson = {
    id: newId, name, gender: pendingGender,
    hopLevel: pendingAction.type === 'ff' ? 2 : 1,
    confirmed: false
  };
  if (pendingAction.type === 'ff') {
    const firstFriend = state.people.find(p => p.hopLevel === 1);
    if (firstFriend) newPerson.viaFriend = firstFriend.id;
  }
  state.people.push(newPerson);
  closeFsModal();
  renderAll();
  showToast('➕', `${name} 추가됨`);
}

function toggleConfirm(id) {
  const p = getPerson(id);
  if (!p || p.isSelf) return;
  p.confirmed = !p.confirmed;
  selectedNodeId = null;
  renderAll();
  showToast(p.confirmed ? '✓' : '⏱', `${p.name} ${p.confirmed ? '인증됨' : '대기로'}`);
}

function promoteToFriend(id) {
  const p = getPerson(id);
  if (!p) return;
  p.confirmed = true;
  if (p.hopLevel === 2) {
    p.hopLevel = 1;
    delete p.viaFriend;
    delete p.viaFriends;
  }
  selectedNodeId = null;
  renderAll();
  showToast('🤝', `${p.name} 모임원으로 인증됨!`);
}

function deletePerson(id) {
  const p = getPerson(id);
  if (!p || p.isSelf) return;
  if (!confirm(`${p.name}님을 삭제할까요?`)) return;
  state.people = state.people.filter(x => x.id !== id);
  state.people.forEach(x => {
    if (x.viaFriend === id) delete x.viaFriend;
    if (Array.isArray(x.viaFriends)) x.viaFriends = x.viaFriends.filter(v => v !== id);
  });
  selectedNodeId = null;
  renderAll();
  showToast('🗑', '삭제됨');
}

function resetAll() {
  if (!confirm('초기화할까요?')) return;
  state = {
    me: { ...initialMe },
    people: JSON.parse(JSON.stringify(initialPeople))
  };
  selectedNodeId = null;
  renderAll();
  showToast('🔄', '초기화됨');
}

// ============================================================
// Summary + render all
// ============================================================
function updateSummary() {
  const total = state.people.length + 1;
  const confirmed = state.people.filter(p => p.confirmed).length + 1;
  const ffCount = state.people.filter(p => p.hopLevel === 2).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statConfirmed').textContent = confirmed;
  document.getElementById('statFf').textContent = ffCount;
}

function renderAll() {
  updateSummary();
  if (currentView === 'tree') renderTree();
  else if (currentView === 'graph') renderGraph();
  else renderList();
}

// ============================================================
// Toast
// ============================================================
function showToast(emoji, text) {
  document.getElementById('toastEmoji').textContent = emoji;
  document.getElementById('toastText').textContent = text;
  const t = document.getElementById('toast');
  t.classList.add('visible');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove('visible'), 2400);
}

// ============================================================
// Event listeners
// ============================================================
document.getElementById('treeCanvas').addEventListener('click', e => {
  if (e.target === e.currentTarget ||
      e.target.classList.contains('me-block') ||
      e.target.classList.contains('friends-box') ||
      e.target.classList.contains('ff-box') ||
      e.target.classList.contains('friends-grid')) {
    selectedNodeId = null;
    document.querySelectorAll('.action-panel').forEach(p => p.remove());
    renderTree();
  }
});

document.getElementById('graphSvg').addEventListener('click', e => {
  if (e.target.tagName === 'svg' || e.target.id === 'graphEdges' || e.target.id === 'graphNodes') {
    closeGraphPanel();
    selectedNodeId = null;
  }
});

document.getElementById('modalFsName').addEventListener('keypress', e => {
  if (e.key === 'Enter') confirmFsAdd();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modalFs').classList.contains('visible')) closeFsModal();
    closeGraphPanel();
  }
});

renderAll();
</script>
</body>
</html>

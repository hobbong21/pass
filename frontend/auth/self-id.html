<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F5F5">
<title>CHON — Self ID 만들기</title>
<script src="../lib/auth-guard.js" data-require="login"></script>
<script src="../lib/pass-api.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root {
    --bg-page: #F5F5F5;
    --bg-card: #FFFFFF;
    --text-primary: #1E1E1E;
    --text-secondary: #5B5B5B;
    --text-tertiary: #9CA3AF;
    --line: #E5E7EB;
    --line-soft: #F1F5F9;

    --chon-orange: #F7931E;
    --chon-orange-dark: #E87F0A;
    --chon-orange-soft: #FFF3D6;

    --success: #16A34A;
    --success-soft: #ECFDF5;

    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 6px 18px rgba(0,0,0,0.08);
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-pill: 100px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg-page);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  @media (min-width: 768px) {
    body { padding: 32px 0; background: #DDE2E8; }
    .app {
      border-radius: 28px;
      overflow: hidden;
      min-height: calc(100dvh - 64px);
      box-shadow: var(--shadow-md);
    }
  }

  /* ============================================
     Top Bar (back + skip)
     ============================================ */
  .topbar {
    padding: calc(8px + var(--safe-top)) 12px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .back-btn {
    width: 40px; height: 40px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-primary);
    font-family: inherit;
    padding: 0;
  }
  .back-btn svg { width: 22px; height: 22px; }
  .back-btn:active { opacity: 0.6; }
  .skip-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    padding: 8px 12px;
    font-family: inherit;
  }
  .skip-btn.is-hidden { visibility: hidden; }

  /* ============================================
     Step Page
     ============================================ */
  .step-content {
    flex: 1;
    padding: 8px 16px 24px;
    display: none;
    flex-direction: column;
    overflow-y: auto;
  }
  .step-content.active { display: flex; }

  .step-title {
    margin: 14px 8px 28px;
    font-size: 28px;
    font-weight: 800;
    line-height: 1.18;
    letter-spacing: -0.56px;
    color: var(--text-primary);
    white-space: pre-line;
  }
  .step-sub {
    margin: -16px 8px 22px;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* ============================================
     Method buttons (Step 1 — 촬영 / 직접입력)
     ============================================ */
  .method-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .method-btn {
    background: var(--bg-card);
    border: 1.5px solid var(--line);
    border-radius: var(--radius-pill);
    height: 64px;
    padding: 0 18px 0 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
    width: 100%;
  }
  .method-btn:hover {
    border-color: var(--chon-orange);
    box-shadow: var(--shadow-sm);
  }
  .method-btn:active { transform: scale(0.99); }
  .method-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--chon-orange-soft);
    color: var(--chon-orange-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .method-label {
    flex: 1;
    text-align: left;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .method-chev {
    color: var(--text-tertiary);
    font-size: 20px;
    font-weight: 700;
  }

  /* ============================================
     Type grid (Step 2 — 신분증 종류)
     ============================================ */
  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .type-btn {
    background: var(--bg-card);
    border: 1.5px solid var(--line);
    border-radius: var(--radius-lg);
    height: 110px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
  }
  .type-btn:hover {
    border-color: var(--chon-orange);
    box-shadow: var(--shadow-sm);
  }
  .type-btn:active { transform: scale(0.97); }
  .type-btn.selected {
    border-color: var(--chon-orange);
    background: var(--chon-orange-soft);
  }
  .type-icon {
    font-size: 26px;
    line-height: 1;
  }
  .type-label {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  /* ============================================
     Camera frame (Step 3 — 촬영)
     ============================================ */
  .camera-stage {
    background: #111111;
    border-radius: var(--radius-lg);
    aspect-ratio: 3/4;
    margin: 8px 0;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .camera-guide {
    width: 86%;
    aspect-ratio: 1.6/1;
    border-radius: 14px;
    border: 2.5px dashed rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.05);
    position: relative;
  }
  .camera-guide::before {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1px dashed rgba(255,255,255,0.35);
    border-radius: 8px;
  }
  .camera-hint {
    text-align: center;
    color: var(--text-secondary);
    font-size: 14px;
    margin: 12px 6px 4px;
  }

  /* ============================================
     Form (Step 3 manual / Step 4 review)
     ============================================ */
  .form-group {
    margin-bottom: 14px;
  }
  .form-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: block;
  }
  .form-input {
    width: 100%;
    height: 56px;
    background: var(--bg-card);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 0 16px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--chon-orange); }
  .form-input.readonly { background: var(--bg-page); color: var(--text-secondary); }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .gender-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .gender-opt {
    height: 56px;
    background: var(--bg-card);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.15s;
  }
  .gender-opt.selected {
    border-color: var(--chon-orange);
    background: var(--chon-orange-soft);
    color: var(--chon-orange-dark);
  }

  /* ============================================
     ID Card Preview (Step 5)
     ============================================ */
  .id-card-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 8px 0 20px;
  }
  .id-card {
    width: 100%;
    max-width: 320px;
    aspect-ratio: 228/368;
    background: linear-gradient(165deg, #FFFFFF 0%, #FFF8E7 100%);
    border: 1px solid rgba(247, 147, 30, 0.4);
    border-radius: 18px;
    padding: 22px 20px;
    box-shadow: 0 10px 24px rgba(247, 147, 30, 0.18);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .id-card-eyebrow {
    font-size: 11px;
    font-weight: 800;
    color: var(--chon-orange-dark);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .id-card-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 18px;
    letter-spacing: -0.3px;
  }
  .id-card-avatar {
    width: 80px;
    height: 96px;
    border-radius: 8px;
    background: #F1F5F9;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    line-height: 1;
  }
  .id-card-name {
    font-size: 22px;
    font-weight: 900;
    text-align: center;
    color: var(--text-primary);
    letter-spacing: -0.4px;
  }
  .id-card-roman {
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
    margin-top: 2px;
    font-weight: 600;
  }
  .id-card-meta {
    font-size: 14px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 12px;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    letter-spacing: 1px;
  }
  .id-card-footer {
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid rgba(247, 147, 30, 0.2);
    text-align: center;
    font-size: 11px;
    color: var(--chon-orange-dark);
    font-weight: 700;
    letter-spacing: 0.4px;
  }

  /* ============================================
     Bottom CTA
     ============================================ */
  .footer-bar {
    padding: 12px 16px calc(16px + var(--safe-bottom));
    background: var(--bg-page);
    flex-shrink: 0;
  }
  .step-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--line);
    transition: width 0.2s, background 0.2s;
  }
  .dot.active {
    width: 22px;
    border-radius: 4px;
    background: var(--chon-orange);
  }
  .dot.done { background: var(--chon-orange-soft); }

  .primary-btn {
    width: 100%;
    height: 56px;
    background: var(--chon-orange);
    color: white;
    border: none;
    border-radius: var(--radius-pill);
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, transform 0.12s;
    box-shadow: 0 8px 20px rgba(247, 147, 30, 0.28);
  }
  .primary-btn:active:not(:disabled) {
    background: var(--chon-orange-dark);
    transform: scale(0.99);
  }
  .primary-btn:disabled {
    background: #E5E7EB;
    color: var(--text-tertiary);
    box-shadow: none;
    cursor: not-allowed;
  }

  /* ============================================
     Toast
     ============================================ */
  .toast {
    position: fixed;
    bottom: calc(100px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1F1F1F;
    color: white;
    padding: 12px 22px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
    box-shadow: var(--shadow-md);
  }
  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <button type="button" class="back-btn" id="backBtn" onclick="goBack()" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <button type="button" class="skip-btn" id="skipBtn" onclick="skipFlow()">건너뛰기</button>
  </div>

  <!-- ============ Step 1: 방법 선택 ============ -->
  <section class="step-content active" id="step1">
    <h1 class="step-title">어떤 방법으로
ID를 생성할까요?</h1>
    <div class="method-list">
      <button type="button" class="method-btn" onclick="chooseMethod('scan')">
        <span class="method-icon">📷</span>
        <span class="method-label">신분증 촬영</span>
        <span class="method-chev">›</span>
      </button>
      <button type="button" class="method-btn" onclick="chooseMethod('manual')">
        <span class="method-icon">✍</span>
        <span class="method-label">직접입력</span>
        <span class="method-chev">›</span>
      </button>
    </div>
  </section>

  <!-- ============ Step 2: 신분증 종류 (촬영 only) ============ -->
  <section class="step-content" id="step2">
    <h1 class="step-title">신분증 스캔을 위한
촬영 방법을 선택해 주세요</h1>
    <div class="type-grid">
      <button type="button" class="type-btn" data-type="rrn"      onclick="selectType('rrn')">
        <span class="type-icon">🪪</span>
        <span class="type-label">주민등록증</span>
      </button>
      <button type="button" class="type-btn" data-type="license"  onclick="selectType('license')">
        <span class="type-icon">🚗</span>
        <span class="type-label">운전면허증</span>
      </button>
      <button type="button" class="type-btn" data-type="passport" onclick="selectType('passport')">
        <span class="type-icon">📘</span>
        <span class="type-label">여권</span>
      </button>
      <button type="button" class="type-btn" data-type="other"    onclick="selectType('other')">
        <span class="type-icon">📄</span>
        <span class="type-label">기타</span>
      </button>
    </div>
  </section>

  <!-- ============ Step 3a: 촬영 화면 ============ -->
  <section class="step-content" id="step3-scan">
    <h1 class="step-title">신분증을 촬영해 주세요</h1>
    <p class="step-sub">표시된 영역 안에 신분증을 잘 넣고
화면을 가볍게 눌러주세요.</p>
    <div class="camera-stage">
      <div class="camera-guide"></div>
    </div>
    <p class="camera-hint">📸 카메라는 데모에서 자동으로 통과됩니다</p>
  </section>

  <!-- ============ Step 3b: 직접 입력 ============ -->
  <section class="step-content" id="step3-manual">
    <h1 class="step-title">정보를 입력해 주세요</h1>
    <div class="form-group">
      <label class="form-label" for="idName">이름</label>
      <input type="text" class="form-input" id="idName" placeholder="예) 홍길순" autocomplete="off" oninput="validateManual()"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="idBirth">생년월일 (YYMMDD)</label>
      <input type="text" class="form-input" id="idBirth" placeholder="예) 820701" maxlength="6" inputmode="numeric" oninput="validateManual()"/>
    </div>
    <div class="form-group">
      <label class="form-label">성별</label>
      <div class="gender-row">
        <button type="button" class="gender-opt" id="genderFemale" onclick="selectGender('female')">여성</button>
        <button type="button" class="gender-opt selected" id="genderMale" onclick="selectGender('male')">남성</button>
      </div>
    </div>
  </section>

  <!-- ============ Step 4: 정보 확인/수정 ============ -->
  <section class="step-content" id="step4">
    <h1 class="step-title">정보를 확인해 주세요</h1>
    <p class="step-sub">잘못된 부분이 있으면 수정할 수 있어요.</p>
    <div class="form-group">
      <label class="form-label">이름</label>
      <input type="text" class="form-input" id="reviewName" oninput="onReviewChange()"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">생년월일</label>
        <input type="text" class="form-input" id="reviewBirth" maxlength="6" inputmode="numeric" oninput="onReviewChange()"/>
      </div>
      <div class="form-group">
        <label class="form-label">성별</label>
        <input type="text" class="form-input readonly" id="reviewGender" readonly/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">신분증 종류</label>
      <input type="text" class="form-input readonly" id="reviewType" readonly/>
    </div>
  </section>

  <!-- ============ Step 5: 발급 완료 ============ -->
  <section class="step-content" id="step5">
    <h1 class="step-title">CHON DID 트로피
발급 완료</h1>
    <p class="step-sub">이제 가족·지인과 상호 인증을 시작할 수 있어요.</p>
    <div class="id-card-wrap">
      <div class="id-card">
        <div class="id-card-eyebrow">CHON DID</div>
        <div class="id-card-title">트로피 ID</div>
        <div class="id-card-avatar" id="cardAvatar">👤</div>
        <div class="id-card-name" id="cardName">홍길순</div>
        <div class="id-card-roman" id="cardRoman">Hong Gilsoon</div>
        <div class="id-card-meta" id="cardMeta">820701-2******</div>
        <div class="id-card-footer">위·변조 불가 · 칩 기반 보호</div>
      </div>
    </div>
  </section>

  <!-- ============ Footer ============ -->
  <div class="footer-bar">
    <div class="step-dots" id="stepDots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <button type="button" class="primary-btn" id="primaryBtn" onclick="next()">다음</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =========================================================
// State
// =========================================================
const FLOW = ['step1', 'step2', 'step3', 'step4', 'step5'];
let stepIndex = 0;
let chosenMethod = null;   // 'scan' | 'manual'
let chosenType = null;     // 'rrn' | 'license' | 'passport' | 'other'
const data = { name: '', birth: '', gender: 'male' };

const TYPE_LABEL = {
  rrn: '주민등록증',
  license: '운전면허증',
  passport: '여권',
  other: '기타',
};

// =========================================================
// Step routing
// =========================================================
function currentStepName() { return FLOW[stepIndex]; }

function pageIdFor(stepName) {
  if (stepName === 'step3') return chosenMethod === 'manual' ? 'step3-manual' : 'step3-scan';
  return stepName;
}

function showStep(id) {
  document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function updateDots() {
  const dots = document.querySelectorAll('#stepDots .dot');
  dots.forEach((d, i) => {
    d.classList.remove('active', 'done');
    if (i < stepIndex)  d.classList.add('done');
    if (i === stepIndex && stepIndex < FLOW.length - 1) d.classList.add('active');
    if (stepIndex === FLOW.length - 1) d.classList.add('done');
  });
}

function render() {
  showStep(pageIdFor(currentStepName()));
  updateDots();

  const primary = document.getElementById('primaryBtn');
  const skip = document.getElementById('skipBtn');
  skip.classList.remove('is-hidden');

  switch (currentStepName()) {
    case 'step1':
      primary.textContent = '시작하기';
      primary.disabled = true;       // 카드 두 개 중 하나 눌러야 진행
      break;
    case 'step2':
      primary.textContent = '다음';
      primary.disabled = !chosenType;
      skip.classList.add('is-hidden');
      break;
    case 'step3':
      primary.textContent = '다음';
      if (chosenMethod === 'manual') {
        primary.disabled = !canProceedFromManual();
      } else {
        primary.disabled = false; // 데모: 촬영은 항상 통과
      }
      skip.classList.add('is-hidden');
      break;
    case 'step4':
      primary.textContent = '발급받기';
      primary.disabled = !canProceedFromReview();
      skip.classList.add('is-hidden');
      break;
    case 'step5':
      primary.textContent = '홈으로 돌아가기';
      primary.disabled = false;
      skip.classList.add('is-hidden');
      break;
  }
}

function canProceedFromManual() {
  return data.name.trim().length >= 2 && /^\d{6}$/.test(data.birth);
}

function canProceedFromReview() {
  const n = document.getElementById('reviewName').value.trim();
  const b = document.getElementById('reviewBirth').value.trim();
  return n.length >= 2 && /^\d{6}$/.test(b);
}

// =========================================================
// Step actions
// =========================================================
function chooseMethod(method) {
  chosenMethod = method;
  // 직접입력은 step2(종류 선택) 건너뛰기 — 바로 step3로
  stepIndex = method === 'manual' ? 2 : 1;
  render();
}

function selectType(type) {
  chosenType = type;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.type === type);
  });
  document.getElementById('primaryBtn').disabled = false;
}

function selectGender(g) {
  data.gender = g;
  document.getElementById('genderMale').classList.toggle('selected', g === 'male');
  document.getElementById('genderFemale').classList.toggle('selected', g === 'female');
}

function validateManual() {
  data.name  = document.getElementById('idName').value.trim();
  data.birth = document.getElementById('idBirth').value.trim();
  document.getElementById('primaryBtn').disabled = !canProceedFromManual();
}

function preparePreview() {
  // step4 review 폼에 현재 데이터 채우기
  if (chosenMethod === 'manual') {
    data.name  = document.getElementById('idName').value.trim() || data.name;
    data.birth = document.getElementById('idBirth').value.trim() || data.birth;
  } else {
    // 촬영 데모: OCR 결과를 가짜로 채움
    if (!data.name)  data.name  = '홍길순';
    if (!data.birth) data.birth = '820701';
  }
  document.getElementById('reviewName').value   = data.name;
  document.getElementById('reviewBirth').value  = data.birth;
  document.getElementById('reviewGender').value = data.gender === 'female' ? '여성' : '남성';
  document.getElementById('reviewType').value   = chosenMethod === 'manual'
    ? '직접입력'
    : (TYPE_LABEL[chosenType] || '신분증');
  document.getElementById('primaryBtn').disabled = !canProceedFromReview();
}

function onReviewChange() {
  data.name  = document.getElementById('reviewName').value.trim();
  data.birth = document.getElementById('reviewBirth').value.trim();
  document.getElementById('primaryBtn').disabled = !canProceedFromReview();
}

function prepareIdCard() {
  document.getElementById('cardName').textContent  = data.name;
  document.getElementById('cardRoman').textContent = romanize(data.name);
  const sexDigit = data.gender === 'female' ? '2' : '1';
  document.getElementById('cardMeta').textContent  = `${data.birth}-${sexDigit}******`;
  document.getElementById('cardAvatar').textContent = data.gender === 'female' ? '👩' : '👨';
}

function romanize(name) {
  // 간단한 자모 매핑 (데모)
  const map = { '홍':'Hong','길':'gil','순':'soon','민':'min','수':'soo','지':'ji','영':'young',
                '박':'Park','김':'Kim','이':'Lee','최':'Choi','정':'Jung','희':'hee','철':'chul',
                '하':'ha','상':'sang','호':'ho','선':'sun','경':'kyung' };
  return [...name].map(c => map[c] || c).join(' ').trim() || name;
}

// =========================================================
// Navigation
// =========================================================
function next() {
  const cur = currentStepName();

  if (cur === 'step1') {
    showToast('방법을 선택해 주세요');
    return;
  }
  if (cur === 'step2' && !chosenType) {
    showToast('신분증 종류를 선택해 주세요');
    return;
  }
  if (cur === 'step3' && chosenMethod === 'manual' && !canProceedFromManual()) {
    showToast('이름과 생년월일을 입력해 주세요');
    return;
  }
  if (cur === 'step4' && !canProceedFromReview()) {
    showToast('정보를 확인해 주세요');
    return;
  }
  if (cur === 'step5') {
    goHome();
    return;
  }

  stepIndex++;
  if (currentStepName() === 'step4') preparePreview();
  if (currentStepName() === 'step5') prepareIdCard();
  render();
}

function goBack() {
  if (stepIndex === 0) {
    if (confirm('Self ID 생성을 그만두고 홈으로 갈까요?\n나중에 다시 만들 수 있습니다.')) {
      window.location.href = '../main/home.html';
    }
    return;
  }
  // 직접입력 흐름은 step2를 건너뛰므로 되돌아갈 때도 step1로
  if (stepIndex === 2 && chosenMethod === 'manual') {
    stepIndex = 0;
  } else {
    stepIndex--;
  }
  render();
}

function skipFlow() {
  if (confirm('Self ID 생성을 건너뛸까요?\n나중에 홈에서 다시 시작할 수 있습니다.')) {
    window.location.href = '../main/home.html';
  }
}

function goHome() {
  try {
    localStorage.setItem('selfIdCreated', '1');
    localStorage.setItem('passSelfId', JSON.stringify({
      name: data.name,
      birth: data.birth,
      gender: data.gender,
      type: chosenType,
      method: chosenMethod,
      issuedAt: Date.now(),
    }));
  } catch (e) {}
  window.location.href = '../main/home.html';
}

// =========================================================
// View mode — ?mode=view (홈의 트로피 카드 클릭 시 발급된 ID 보기)
// =========================================================
(function initViewMode() {
  try {
    const params = new URLSearchParams(location.search);
    if (params.get('mode') !== 'view') return;
    const raw = localStorage.getItem('passSelfId');
    if (!raw) return;
    const saved = JSON.parse(raw);
    data.name   = saved.name   || '홍길순';
    data.birth  = saved.birth  || '820701';
    data.gender = saved.gender || 'male';
    chosenMethod = saved.method || 'manual';
    chosenType   = saved.type   || 'other';
    stepIndex = 4;             // step5
    window._viewMode = true;
  } catch (e) {}
})();

// =========================================================
// Toast
// =========================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove('visible'), 2200);
}

// =========================================================
// Init
// =========================================================
render();
if (window._viewMode) {
  prepareIdCard();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFA000">
<title>PASS — 전체</title>
<script src="../lib/auth-guard.js" data-require="login"></script>
<script src="../lib/pass-api.js"></script>
<script src="../lib/scanner.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root {
    --chon-orange: #F7931E;
    --chon-orange-dark: #E87F0A;
    --chon-orange-light: #FFC78A;
    --chon-yellow: #FFC300;
    --chon-yellow-soft: #FFF3D6;
    --bg-app: #FFFBF0;
    --bg-card: #FFFFFF;
    --sidebar-bg: #FFF1D6;
    --sidebar-active: var(--chon-orange);
    --text-primary: #1F1F1F;
    --text-secondary: #5B5B5B;
    --text-tertiary: #9CA3AF;
    --border-light: #F1F5F9;
    --line: #E5E7EB;
    --danger: #DC2626;
    --success: #16A34A;

    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 6px 18px rgba(0,0,0,0.08);

    --radius-md: 14px;
    --radius-lg: 20px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --nav-h: 76px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-app);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .app {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg-app);
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
  }
  @media (min-width: 768px) {
    body { padding: 32px 0; background: #F5F7FB; }
    .app { border-radius: 28px; overflow: hidden; min-height: calc(100dvh - 64px); box-shadow: var(--shadow-md); }
  }

  /* ============ Header (통일) ============ */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--bg-app);
    padding: calc(14px + var(--safe-top)) 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-button { background: transparent; border: none; padding: 0; cursor: pointer; font-family: inherit; color: inherit; text-align: left; }
  .brand-button:active { transform: scale(0.97); }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--chon-orange), #5BBA6F);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 16px;
    box-shadow: var(--shadow-sm);
  }
  .brand-name { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
  .brand-sub { font-size: 11px; color: var(--text-secondary); font-weight: 700; margin-top: -2px; }
  .brand-text { line-height: 1.1; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: white;
    border: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
    position: relative;
  }
  .icon-btn-dot {
    position: absolute; top: 8px; right: 10px;
    width: 8px; height: 8px;
    background: #DC2626;
    border-radius: 50%;
    border: 2px solid white;
  }

  .welcome-bar {
    background: linear-gradient(90deg, var(--chon-yellow-soft), white);
    border-bottom: 1px solid var(--border-light);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700;
  }
  .welcome-emoji { font-size: 16px; }
  .welcome-msg strong { color: var(--chon-orange-dark); font-weight: 900; }
  .welcome-user {
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
    font: inherit;
    color: var(--chon-orange-dark);
    font-weight: 900;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(247, 147, 30, 0.35);
    text-decoration-thickness: 1.5px;
    transition: text-decoration-color 0.15s, transform 0.12s;
  }
  .welcome-user:hover { text-decoration-color: var(--chon-orange-dark); }
  .welcome-user:active { transform: scale(0.97); }

  .all-section-title {
    padding: 16px 20px 8px;
    font-size: 15px;
    font-weight: 900;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  /* ============ Top tabs ============ */
  .all-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--bg-app);
    border-bottom: 1px solid var(--line);
  }
  .all-tab {
    background: transparent;
    border: none;
    padding: 14px 8px;
    font-size: 14px;
    font-weight: 800;
    color: var(--text-tertiary);
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
  }
  .all-tab .tab-ico { font-size: 16px; line-height: 1; }
  .all-tab.active { color: var(--text-primary); }
  .all-tab.active::after {
    content: '';
    position: absolute;
    left: 16%; right: 16%;
    bottom: -1px;
    height: 2px;
    background: var(--chon-orange);
    border-radius: 2px;
  }
  .all-tab + .all-tab { border-left: 1px solid var(--line); }

  /* ============ Body (sidebar + content) ============ */
  .all-body {
    flex: 1;
    display: grid;
    grid-template-columns: 112px 1fr;
    min-height: 0;
    padding-bottom: calc(var(--nav-h) + 12px + var(--safe-bottom));
  }
  .all-sidebar {
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    padding: 4px 0 24px;
  }
  .all-cat {
    background: transparent;
    border: none;
    padding: 16px 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    font-family: inherit;
    cursor: pointer;
    border-left: 3px solid transparent;
    line-height: 1.35;
  }
  .all-cat:active { background: rgba(0,0,0,0.04); }
  .all-cat.active {
    background: var(--chon-orange);
    color: white;
    border-left-color: var(--chon-orange-dark);
    font-weight: 900;
  }

  .all-content {
    background: var(--bg-card);
    padding: 8px 0;
  }
  .all-item {
    width: 100%;
    background: transparent;
    border: none;
    text-align: left;
    padding: 16px 18px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid var(--border-light);
  }
  .all-item:last-child { border-bottom: none; }
  .all-item:active { background: #FAFBFC; }
  .all-item-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .all-item-ico { font-size: 18px; line-height: 1; }
  .all-item-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .all-item-meta { font-size: 12px; font-weight: 700; color: var(--text-tertiary); }
  .all-item-meta.danger { color: var(--danger); }
  .all-item-meta.success { color: var(--success); }
  .all-item-arrow { color: var(--text-tertiary); font-size: 18px; transition: transform 0.18s; }
  .all-item.expanded { background: #FAFBFC; }
  .all-item.expanded .all-item-arrow { transform: rotate(90deg); }

  /* 인라인 패널 — 메뉴 항목 아래로 펼쳐지는 영역 */
  .all-item-panel {
    background: #F8FAFC;
    border-bottom: 1px solid var(--border-light);
    padding: 14px 18px 18px;
    animation: panelSlideDown 0.2s ease;
  }
  @keyframes panelSlideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============================================
     보이스피싱 인라인 컴포넌트 (vp-)
     ============================================ */
  .vp-hint {
    background: #FEE2E2;
    border: 1px solid rgba(220,38,38,0.25);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 10px;
    font-size: 11px;
    color: #DC2626;
    line-height: 1.5;
  }
  .vp-level-card {
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .vp-level-title { font-size: 12px; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; }
  .vp-level-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .vp-level-options.vp-level-options--4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .vp-level-opt {
    padding: 9px 4px;
    border: 2px solid var(--border-light);
    border-radius: 8px;
    background: white;
    text-align: center;
    cursor: pointer;
    font-family: inherit;
    font-weight: 800;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .vp-level-opt.selected {
    background: #FEE2E2;
    border-color: #DC2626;
    color: #DC2626;
  }
  .vp-level-desc {
    margin: 8px 0 0;
    font-size: 11px;
    color: var(--text-tertiary);
    text-align: center;
  }

  .vp-form-card {
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .vp-form-row { margin-bottom: 10px; }
  .vp-form-row:last-child { margin-bottom: 0; }
  .vp-form-label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    color: var(--text-secondary);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .vp-form-label-hint {
    font-weight: 500;
    color: var(--text-tertiary);
    font-size: 10px;
    text-transform: none;
    margin-left: 4px;
  }
  .vp-form-input, .vp-form-select, .vp-form-textarea {
    width: 100%;
    padding: 9px 12px;
    border: 2px solid var(--border-light);
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    background: white;
  }
  .vp-form-input:focus, .vp-form-select:focus, .vp-form-textarea:focus {
    outline: none;
    border-color: #DC2626;
  }
  .vp-form-textarea { resize: vertical; min-height: 54px; }
  .vp-form-submit {
    width: 100%;
    background: #DC2626;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 10px rgba(220,38,38,0.22);
  }
  .vp-form-submit:active { transform: scale(0.98); background: #B91C1C; }

  .vp-list-title {
    margin: 12px 0 6px;
    font-size: 12px;
    font-weight: 900;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .vp-list-count {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 600;
  }
  .vp-list-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 5px;
  }
  .vp-list-info { flex: 1; min-width: 0; }
  .vp-list-phone {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .vp-list-meta {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
    font-weight: 600;
    line-height: 1.4;
  }
  .vp-list-badge {
    display: inline-block;
    background: #FEE2E2;
    color: #DC2626;
    padding: 1px 6px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 800;
    margin-right: 4px;
  }
  .vp-list-del {
    border: 1.5px solid var(--border-light);
    background: white;
    color: var(--text-secondary);
    padding: 5px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    flex-shrink: 0;
  }
  .vp-list-del:active { transform: scale(0.95); }
  .vp-empty {
    text-align: center;
    padding: 20px;
    color: var(--text-tertiary);
    font-size: 12px;
  }
  .all-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
    font-weight: 700;
  }

  /* ============ Bottom nav (shared) ============ */
  .bottom-nav {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
    width: 100%;
    max-width: 480px;
    background: white;
    border-top: 1px solid var(--line);
    height: calc(var(--nav-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    align-items: center;
    z-index: 50;
  }
  .nav-btn {
    background: transparent;
    border: none;
    padding: 8px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--text-tertiary);
    font-family: inherit;
    cursor: pointer;
  }
  .nav-btn-icon { font-size: 22px; line-height: 1; }
  .nav-btn-label { font-size: 10px; font-weight: 800; }
  .nav-btn.active { color: var(--chon-orange-dark); }
  .nav-btn.center { position: relative; padding-top: 0; }
  .nav-btn.center .nav-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--chon-orange), var(--chon-yellow));
    color: white;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    margin-top: -22px;
    box-shadow: 0 6px 16px rgba(247, 147, 30, 0.45);
  }
  .nav-btn.center .nav-btn-label { color: var(--chon-orange-dark); margin-top: 4px; }

  /* Hamburger lines icon */
  .ico-hamburger {
    width: 22px; height: 22px;
    display: inline-flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .ico-hamburger span {
    display: block;
    height: 2.5px;
    width: 100%;
    background: currentColor;
    border-radius: 2px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(var(--nav-h) + 24px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: rgba(31, 31, 31, 0.94);
    color: white;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 200;
    max-width: 80vw;
    text-align: center;
  }
  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <button type="button" class="brand brand-button" onclick="location.href='./home.html'" aria-label="홈으로">
      <div class="brand-mark">P</div>
      <div class="brand-text">
        <div class="brand-name">PASS</div>
        <div class="brand-sub">관계형 SNS</div>
      </div>
    </button>
    <div class="header-actions">
      <button type="button" class="icon-btn" onclick="openScanner()" aria-label="QR 스캔" title="QR 스캔"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1.5"/></svg></button>
      <button type="button" class="icon-btn" onclick="location.href='./home.html?page=auth'" aria-label="알림">
        🔔
        <span class="icon-btn-dot"></span>
      </button>
    </div>
  </header>

  <div class="welcome-bar">
    <span class="welcome-emoji">👋</span>
    <span class="welcome-msg"><button type="button" class="welcome-user" id="welcomeName" onclick="location.href='./cert.html'">사용자</button>님 환영합니다 · 오늘도 즐거운 하루되세요</span>
  </div>

  <div class="all-section-title" id="allSectionTitle">부가서비스</div>

  <nav class="all-tabs" role="tablist">
    <button type="button" class="all-tab active" data-tab="cert" onclick="switchTab('cert')" role="tab">
      <span class="tab-ico">🧩</span><span>부가서비스</span>
    </button>
    <button type="button" class="all-tab" data-tab="my" onclick="switchTab('my')" role="tab">
      <span class="tab-ico">👤</span><span>내정보관리</span>
    </button>
  </nav>

  <div class="all-body">
    <aside class="all-sidebar" id="allSidebar" aria-label="카테고리"></aside>
    <section class="all-content" id="allContent" aria-live="polite"></section>
  </div>

  <nav class="bottom-nav">
    <button type="button" class="nav-btn" onclick="location.href='./home.html'">
      <div class="nav-btn-icon">🏠</div>
      <div class="nav-btn-label">홈</div>
    </button>
    <button type="button" class="nav-btn" onclick="location.href='./contact.html'">
      <div class="nav-btn-icon">📰</div>
      <div class="nav-btn-label">연락처</div>
    </button>
    <button type="button" class="nav-btn center" onclick="location.href='./cert.html'">
      <div class="nav-circle">🆔</div>
      <div class="nav-btn-label">증명서</div>
    </button>
    <button type="button" class="nav-btn" onclick="location.href='./home.html?page=auth'">
      <div class="nav-btn-icon">🤝</div>
      <div class="nav-btn-label">인증</div>
    </button>
    <button type="button" class="nav-btn active">
      <div class="nav-btn-icon" aria-hidden="true">
        <span class="ico-hamburger"><span></span><span></span><span></span></span>
      </div>
      <div class="nav-btn-label">전체</div>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// =========================================================
// Data — categories & items
// =========================================================
const MENU = {
  cert: [
    {
      id: 'voice-phishing',
      label: '보이스피싱',
      items: [
        { ico: '📞', label: '안심콜 보호',    inline: 'safeCall' },
        { ico: '🚨', label: '의심 번호 신고', inline: 'report' },
        { ico: '🚫', label: '차단 번호 관리', inline: 'blocked' },
      ],
    },
    {
      id: 'access-card',
      label: '출입카드',
      items: [
        { ico: '🏢', label: '회사 출입증',  toast: '🏢 회사 출입증' },
        { ico: '🏠', label: '아파트 키',    toast: '🏠 아파트 키' },
        { ico: '🏫', label: '학교 출입증',  toast: '🏫 학교 출입증' },
      ],
    },
    {
      id: 'shop',
      label: '상점',
      items: [
        { ico: '🎟', label: '멤버십 카드',  toast: '🎟 멤버십 카드' },
        { ico: '🏷', label: '적립 카드',    toast: '🏷 적립 카드' },
        { ico: '💳', label: '결제 수단',    toast: '💳 결제 수단' },
      ],
    },
  ],
  my: [
    {
      id: 'chon-id',
      label: 'CHON ID',
      items: [
        { ico: '🪪', label: 'CHON DID 트로피', href: './cert.html' },
        { ico: '📱', label: '자기 자신 인증',   href: '../auth/self-id.html' },
      ],
    },
    {
      id: 'health',
      label: '건강데이터',
      items: [
        { ico: '💉', label: '백신 접종 증명',  toast: '💉 백신 접종 증명' },
        { ico: '🩺', label: '건강검진 기록',   toast: '🩺 건강검진 기록' },
        { ico: '🏥', label: '의료보험증',      toast: '🏥 의료보험증' },
      ],
    },

// =========================================================
// State
// =========================================================
let activeTab = 'cert';
let activeCat = MENU.cert[0].id;

// =========================================================
// 보이스피싱 인라인 state — voice-phishing.html 페이지를 흡수
// =========================================================
const VP_STORAGE_KEY = 'pass_voice_phishing';
const VP_LEVEL_DESC = {
  off:    '0 — 보호 없음. 모든 통화가 평소대로 연결됩니다.',
  low:    '약함 — 명백한 보이스피싱 패턴만 경고',
  medium: '보통 — 등록 안 된 번호도 주의 표시 (권장)',
  high:   '강함 — 모든 외부 번호 차단 후 안내 SMS 전송',
};
const VP_LEVEL_LABEL = { off: '꺼짐', low: '약함', medium: '보통', high: '강함' };
const VP_TYPE_LABEL = { phishing: '보이스피싱', spam: '스팸', ad: '광고', other: '기타' };

function vpDefault() {
  const now = Date.now();
  return {
    meta: { version: 1, createdAt: now, updatedAt: now },
    safeCall: { enabled: true, level: 'medium' },
    reports: [],
    blocked: [],
  };
}
function vpLoad() {
  try {
    const raw = localStorage.getItem(VP_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.safeCall) {
        // 마이그레이션: 이전 스키마에서 enabled:false였다면 level을 'off'로 정규화
        if (parsed.safeCall.enabled === false && parsed.safeCall.level !== 'off') {
          parsed.safeCall.level = 'off';
        }
        return parsed;
      }
    }
  } catch (e) {}
  return vpDefault();
}
function vpSave() {
  vpData.meta.updatedAt = Date.now();
  try { localStorage.setItem(VP_STORAGE_KEY, JSON.stringify(vpData)); }
  catch (e) { console.warn('vpSave failed', e); }
}
const vpData = vpLoad();

function vpNewId(p) { return p + '_' + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4); }
function vpNormPhone(s) { return String(s || '').trim().replace(/[^0-9+\-]/g, ''); }
function vpFormatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

// =========================================================
// Render
// =========================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderSidebar() {
  const cats = MENU[activeTab] || [];
  const sb = document.getElementById('allSidebar');
  sb.innerHTML = cats.map(c =>
    `<button type="button" class="all-cat${c.id === activeCat ? ' active' : ''}" data-cat="${escapeHtml(c.id)}" onclick="selectCat('${escapeHtml(c.id)}')">${escapeHtml(c.label)}</button>`
  ).join('');
}

function renderContent() {
  const cats = MENU[activeTab] || [];
  const cat = cats.find(c => c.id === activeCat) || cats[0];
  const content = document.getElementById('allContent');
  if (!cat || !cat.items?.length) {
    content.innerHTML = `<div class="all-empty">표시할 항목이 없습니다</div>`;
    return;
  }
  content.innerHTML = cat.items.map((it, idx) => {
    // inline 항목은 vpData에서 meta 동적 계산
    let metaText = it.meta, metaCls = it.metaClass;
    if (it.inline === 'safeCall') {
      const lv = vpData.safeCall.level || 'medium';
      metaText = VP_LEVEL_LABEL[lv] || '꺼짐';
      metaCls = lv !== 'off' ? 'success' : '';
    } else if (it.inline === 'report') {
      metaText = vpData.reports.length ? `${vpData.reports.length}건` : '';
      metaCls = '';
    } else if (it.inline === 'blocked') {
      metaText = vpData.blocked.length ? `${vpData.blocked.length}건` : '';
      metaCls = '';
    }
    const metaClsPart = metaCls ? ' ' + metaCls : '';
    const metaHtml = metaText ? `<span class="all-item-meta${metaClsPart}">${escapeHtml(metaText)}</span>` : '';
    return `
      <button type="button" class="all-item" data-cat="${escapeHtml(cat.id)}" data-idx="${idx}" onclick="onItem('${escapeHtml(cat.id)}', ${idx})">
        <span class="all-item-main">
          <span class="all-item-ico">${it.ico || '•'}</span>
          <span class="all-item-label">${escapeHtml(it.label)}</span>
        </span>
        ${metaHtml}
        <span class="all-item-arrow">›</span>
      </button>
    `;
  }).join('');
}

// inline 항목의 meta 라벨만 가볍게 갱신 (패널 열린 상태 보존)
function updateInlineItemMeta(catId, idx) {
  const itemEl = document.querySelector(`.all-item[data-cat="${catId}"][data-idx="${idx}"]`);
  if (!itemEl) return;
  const cats = MENU[activeTab] || [];
  const cat = cats.find(c => c.id === catId);
  const it = cat?.items?.[idx];
  if (!it) return;
  let metaText = '', metaCls = '';
  if (it.inline === 'safeCall') {
    const lv = vpData.safeCall.level || 'medium';
    metaText = VP_LEVEL_LABEL[lv] || '꺼짐';
    metaCls = lv !== 'off' ? 'success' : '';
  } else if (it.inline === 'report') {
    metaText = vpData.reports.length ? `${vpData.reports.length}건` : '';
  } else if (it.inline === 'blocked') {
    metaText = vpData.blocked.length ? `${vpData.blocked.length}건` : '';
  }
  // 기존 meta span 제거 후 새로 삽입 (혹은 빈 경우 제거)
  const oldMeta = itemEl.querySelector('.all-item-meta');
  if (oldMeta) oldMeta.remove();
  if (metaText) {
    const span = document.createElement('span');
    span.className = 'all-item-meta' + (metaCls ? ' ' + metaCls : '');
    span.textContent = metaText;
    // arrow 앞에 삽입
    const arrow = itemEl.querySelector('.all-item-arrow');
    if (arrow) itemEl.insertBefore(span, arrow);
    else itemEl.appendChild(span);
  }
}

const TAB_TITLES = { cert: '부가서비스', my: '내 정보 관리' };

function switchTab(tab) {
  if (!MENU[tab]) return;
  activeTab = tab;
  document.querySelectorAll('.all-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  activeCat = MENU[tab][0]?.id;
  const t = document.getElementById('allSectionTitle');
  if (t) t.textContent = TAB_TITLES[tab] || '';
  renderSidebar();
  renderContent();
}

function selectCat(id) {
  activeCat = id;
  renderSidebar();
  renderContent();
}

function onItem(catId, idx) {
  const cats = MENU[activeTab] || [];
  const cat = cats.find(c => c.id === catId);
  const it = cat?.items?.[idx];
  if (!it) return;
  if (it.action === 'logout') { logoutPass(); return; }
  if (it.inline) { toggleInlinePanel(catId, idx, it.inline); return; }
  if (it.href)  { location.href = it.href; return; }
  if (it.toast) { showToast(it.toast); return; }
}

// =========================================================
// Inline 패널 토글 — 한 번에 하나만 열림
// =========================================================
function toggleInlinePanel(catId, idx, kind) {
  const itemEl = document.querySelector(`.all-item[data-cat="${catId}"][data-idx="${idx}"]`);
  if (!itemEl) return;
  const next = itemEl.nextElementSibling;
  // 이미 열려 있으면 닫기
  if (next && next.classList.contains('all-item-panel')) {
    next.remove();
    itemEl.classList.remove('expanded');
    return;
  }
  // 다른 패널 모두 닫기
  document.querySelectorAll('.all-item-panel').forEach(p => p.remove());
  document.querySelectorAll('.all-item.expanded').forEach(e => e.classList.remove('expanded'));

  const panel = document.createElement('div');
  panel.className = 'all-item-panel';
  panel.dataset.cat = catId;
  panel.dataset.idx = idx;
  panel.dataset.kind = kind;
  itemEl.classList.add('expanded');
  itemEl.insertAdjacentElement('afterend', panel);
  renderInlinePanel(panel, kind);
}

function renderInlinePanel(panel, kind) {
  if (kind === 'safeCall') renderSafeCallPanel(panel);
  else if (kind === 'report') renderReportPanel(panel);
  else if (kind === 'blocked') renderBlockedPanel(panel);
}

// 현재 열린 패널을 재렌더 (state 변경 후 호출)
function refreshOpenPanel() {
  const panel = document.querySelector('.all-item-panel');
  if (!panel) return;
  renderInlinePanel(panel, panel.dataset.kind);
}

      </div>
      <div class="vp-form-row">
        <label class="vp-form-label" for="vpReportType">신고 유형</label>
        <select class="vp-form-select" id="vpReportType">
          <option value="phishing">보이스피싱</option>
          <option value="spam">스팸</option>
          <option value="ad">광고</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="vp-form-row">

        <textarea class="vp-form-textarea" id="vpReportMemo" placeholder="예: 은행을 사칭해서 OTP를 요구함" rows="2"></textarea>

function vpSubmitReport() {
  const phone = vpNormPhone(document.getElementById('vpReportPhone').value);
  const type = document.getElementById('vpReportType').value;
  const memo = document.getElementById('vpReportMemo').value.trim();
  if (!phone) { showToast('⚠️ 전화번호를 입력하세요'); return; }
  if (phone.length < 7) { showToast('⚠️ 번호가 너무 짧습니다'); return; }
  vpData.reports.push({
    id: vpNewId('rep'), phone, type, memo: memo || null, reportedAt: Date.now(),
  });
  vpSave();
  refreshOpenPanel();
  updateInlineItemMeta('voice-phishing', 1);
  showToast(`🚨 ${phone} 신고 접수`);
}

function vpDeleteReport(id) {
  if (!confirm('이 신고를 삭제할까요?')) return;
  vpData.reports = vpData.reports.filter(r => r.id !== id);
  vpSave();
  refreshOpenPanel();
  updateInlineItemMeta('voice-phishing', 1);
  showToast('🗑 삭제됨');
}

function renderBlockedPanel(panel) {
  const blocked = vpData.blocked.slice().reverse();
  const listHtml = blocked.length === 0
    ? `<div class="vp-empty">차단된 번호가 없습니다.</div>`

      </div>

function vpAddBlocked() {
  const phone = vpNormPhone(document.getElementById('vpBlockPhone').value);
  const reason = document.getElementById('vpBlockReason').value.trim();
  if (!phone) { showToast('⚠️ 전화번호를 입력하세요'); return; }
  if (phone.length < 7) { showToast('⚠️ 번호가 너무 짧습니다'); return; }
  if (vpData.blocked.some(b => b.phone === phone)) {
    showToast('⚠️ 이미 차단된 번호입니다'); return;
  }
  vpData.blocked.push({
    id: vpNewId('blk'), phone, reason: reason || null, blockedAt: Date.now(),
  });
  vpSave();
  refreshOpenPanel();
  updateInlineItemMeta('voice-phishing', 2);
  showToast(`🚫 ${phone} 차단됨`);
}

function vpDeleteBlocked(id) {
  const t = vpData.blocked.find(b => b.id === id);
  if (!confirm(`${t ? t.phone + ' ' : ''}차단을 해제할까요?`)) return;
  vpData.blocked = vpData.blocked.filter(b => b.id !== id);
  vpSave();
  refreshOpenPanel();
  updateInlineItemMeta('voice-phishing', 2);
  showToast('↩ 차단 해제됨');
}

// =========================================================
// Greeting name — CHON ID name > passUser.name > email handle
// =========================================================
function resolveName() {
  try {
    const idRaw = localStorage.getItem('passSelfId');
    if (idRaw) {
      const id = JSON.parse(idRaw);
      if (id?.name) return id.name;
    }
  } catch (e) {}
  try {
    const u = JSON.parse(localStorage.getItem('passUser') || '{}');
    if (u.name) return u.name;
    if (u.email) return u.email.split('@')[0];
  } catch (e) {}
  return '사용자';
}

function applyGreet() {
  const name = resolveName();
  const el = document.getElementById('welcomeName');
  if (el) el.textContent = name;
}

// =========================================================
// Logout
// =========================================================
async function logoutPass() {
  if (!confirm('로그아웃 하시겠습니까?\n\n간편 번호(2FA) 등록은 이 디바이스에 유지됩니다.\n다음 로그인 시 간편 번호 6자리로 빠르게 들어올 수 있습니다.')) return;
  if (window.PassAPI && PassAPI.isLoggedIn()) {
    try { await PassAPI.auth.logout(false); } catch (e) {}
  }
  if (window.PassAPI) PassAPI.clearSession();
  else {
    try { localStorage.removeItem('passUser'); localStorage.removeItem('passWelcomed'); } catch (e) {}
  }
  window.location.href = '../auth/login.html';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove('visible'), 2200);
}

// =========================================================
// Init — ?tab=cert|my, ?cat=<id>, ?open=safeCall|report|blocked 지원
// 다른 페이지(home.html 등)에서 딥링크로 진입 시 해당 카테고리/패널 자동 열기
// =========================================================
applyGreet();

(function applyDeepLink() {
  let targetTab = 'cert', targetCat = null, targetOpen = null;
  try {
    const params = new URLSearchParams(location.search);
    const t = params.get('tab');
    if (t === 'cert' || t === 'my') targetTab = t;
    targetCat = params.get('cat');
    targetOpen = params.get('open');
  } catch (e) {}

  activeTab = targetTab;
  document.querySelectorAll('.all-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));
  const tEl = document.getElementById('allSectionTitle');
  if (tEl) tEl.textContent = TAB_TITLES[activeTab] || '';

  // cat 검증 + 선택 (없으면 첫 항목)
  const cats = MENU[activeTab] || [];
  if (targetCat && cats.some(c => c.id === targetCat)) {
    activeCat = targetCat;
  } else {
    activeCat = cats[0]?.id;
  }
  renderSidebar();
  renderContent();

  // open 파라미터: 해당 inline 항목 찾아서 패널 자동 펼침
  if (targetOpen) {
    const cat = cats.find(c => c.id === activeCat);
    const idx = cat?.items?.findIndex(it => it.inline === targetOpen);
    if (idx !== undefined && idx >= 0) {
      // 다음 tick에 toggle (DOM이 렌더된 후)
      setTimeout(() => toggleInlinePanel(activeCat, idx, targetOpen), 0);
    }
  }
})();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFA000">
<title>PASS — Contact</title>
<script src="../lib/auth-guard.js" data-require="login"></script>
<script src="../lib/pass-api.js"></script>
<script src="../lib/scanner.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root {
    --chon-orange: #F7931E;
    --chon-orange-dark: #E87F0A;
    --chon-orange-light: #FFC78A;
    --chon-yellow: #FFC300;
    --chon-yellow-soft: #FFF3D6;
    --bg-app: #FFFBF0;
    --bg-card: #FFFFFF;
    --text-primary: #1F1F1F;
    --text-secondary: #5B5B5B;
    --text-tertiary: #9CA3AF;
    --border-light: #F1F5F9;

    --chon-green: #16A34A;
    --chon-green-soft: #ECFDF5;
    --chon-green-mid: #D1FAE5;

    --avatar-purple: #7C3AED;
    --avatar-magenta: #DB2777;
    --avatar-pink: #EC4899;
    --avatar-orange: #F59E0B;
    --avatar-teal: #14B8A6;
    --avatar-blue: #3B82F6;

    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --radius-pill: 999px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --nav-h: 76px;
    --cta-h: 76px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-app);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg-app);
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
  }
  @media (min-width: 768px) {
    body { padding: 32px 0; background: #F5F7FB; }
    .app {
      border-radius: 28px;
      overflow: hidden;
      min-height: calc(100dvh - 64px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.14);
    }
  }

  /* ============================================
     Unified Header (home.html 과 동일)
     ============================================ */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--bg-app);
    padding: calc(14px + var(--safe-top)) 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-button {
    background: transparent;
    border: none;
    padding: 0;
    cursor: pointer;
    font-family: inherit;
    color: inherit;
    text-align: left;
    transition: opacity 0.15s;
  }
  .brand-button:hover { opacity: 0.85; }
  .brand-button:active { transform: scale(0.97); }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--chon-orange), #5BBA6F);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: -0.5px;
    box-shadow: var(--shadow-sm);
  }
  .brand-name { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; color: var(--text-primary); }
  .brand-sub { font-size: 11px; color: var(--text-secondary); font-weight: 700; margin-top: -2px; }
  .brand-text { line-height: 1.1; }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: white;
    border: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .icon-btn:active { background: var(--bg-app); }
  .icon-btn-dot {
    position: absolute;
    top: 8px; right: 10px;
    width: 8px; height: 8px;
    background: #DC2626;
    border-radius: 50%;
    border: 2px solid white;
  }

  .welcome-bar {
    background: linear-gradient(90deg, var(--chon-yellow-soft), white);
    border-bottom: 1px solid var(--border-light);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    flex-shrink: 0;
  }
  .welcome-emoji { font-size: 16px; line-height: 1; }
  .welcome-msg { flex: 1; }
  .welcome-msg strong { color: var(--chon-orange-dark); font-weight: 900; }
  .welcome-user {
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
    font: inherit;
    color: var(--chon-orange-dark);
    font-weight: 900;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(247, 147, 30, 0.35);
    text-decoration-thickness: 1.5px;
    transition: text-decoration-color 0.15s, transform 0.12s;
  }
  .welcome-user:hover { text-decoration-color: var(--chon-orange-dark); }
  .welcome-user:active { transform: scale(0.97); }

  /* ============================================
     Page Header (페이지 내 제목)
     ============================================ */
  .page-header {
    padding: 20px 24px 8px;
  }
  .page-title {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -0.6px;
    margin: 0 0 6px;
    color: var(--text-primary);
  }
  .page-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 0;
    font-weight: 500;
  }

  /* ============================================
     Search Box
     ============================================ */
  .search-wrap {
    padding: 16px 20px 8px;
  }
  .search-box {
    position: relative;
    background: #FFFFFF;
    border: 1.5px solid #E5E7EB;
    border-radius: 14px;
    display: flex;
    align-items: center;
    padding: 12px 16px;
    transition: border-color 0.15s;
  }
  .search-box:focus-within {
    border-color: var(--chon-orange);
  }
  .search-icon {
    width: 18px; height: 18px;
    color: var(--text-tertiary);
    flex-shrink: 0;
    margin-right: 10px;
  }
  .search-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    color: var(--text-primary);
  }
  .search-input::placeholder { color: var(--text-tertiary); }

  /* ============================================
     Sections / Badges
     ============================================ */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 calc(var(--cta-h) + var(--nav-h) + var(--safe-bottom) + 16px);
  }
  .section {
    margin-top: 18px;
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 0 20px 12px;
    padding: 8px 14px;
    background: var(--chon-green-soft);
    color: var(--chon-green);
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 800;
  }
  .section-badge.invite {
    background: #F3F4F6;
    color: var(--text-secondary);
  }
  .section-badge .count {
    background: rgba(255,255,255,0.6);
    padding: 1px 9px;
    border-radius: var(--radius-pill);
    font-weight: 800;
    font-size: 12px;
  }
  .section-badge.invite .count {
    background: #E5E7EB;
  }
  .section-block {
    padding: 0 16px;
  }

  /* ============================================
     Contact Item
     ============================================ */
  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    background: transparent;
    cursor: pointer;
    border-bottom: 1px solid var(--border-light);
    transition: background 0.12s;
  }
  .contact-item:last-child { border-bottom: none; }
  .contact-item:hover { background: rgba(0,0,0,0.02); }
  .contact-item:active { background: rgba(0,0,0,0.04); }

  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #E5E7EB;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FFFFFF;
    font-weight: 900;
    font-size: 18px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .avatar.ring-green {
    box-shadow: 0 0 0 2.5px var(--chon-green);
  }

  .contact-info {
    flex: 1;
    min-width: 0;
  }
  .contact-name {
    font-size: 16px;
    font-weight: 800;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .contact-phone {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-top: 2px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .contact-arrow {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
    flex-shrink: 0;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.12s;
  }
  .contact-arrow:active { transform: scale(0.93); }
  .contact-arrow.green {
    background: var(--chon-green-soft);
    color: var(--chon-green);
  }
  .contact-arrow.orange {
    background: var(--chon-yellow-soft);
    color: var(--chon-orange-dark);
  }

  /* Hash avatar colors (cycling) */
  .avatar.hash {
    background: var(--avatar-purple);
    font-size: 22px;
  }
  .avatar.hash[data-c="1"] { background: var(--avatar-magenta); }
  .avatar.hash[data-c="2"] { background: var(--avatar-pink); }
  .avatar.hash[data-c="3"] { background: var(--avatar-orange); }
  .avatar.hash[data-c="4"] { background: var(--avatar-teal); }
  .avatar.hash[data-c="5"] { background: var(--avatar-blue); }

  .empty-row {
    padding: 20px 16px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
  }

  /* ============================================
     Bottom CTA
     ============================================ */
  .cta-area {
    position: fixed;
    bottom: calc(var(--nav-h) + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(255,251,240,0) 0%, var(--bg-app) 30%);
    z-index: 35;
  }
  .cta-btn {
    width: 100%;
    padding: 16px;
    background: var(--chon-orange);
    color: #FFFFFF;
    border: none;
    border-radius: var(--radius-pill);
    font-family: inherit;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(247,147,30,0.32);
    transition: transform 0.12s, background 0.15s;
  }
  .cta-btn:active { transform: scale(0.98); background: var(--chon-orange-dark); }

  /* ============================================
     Modal — Chat sheet + Invite sheet
     ============================================ */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
  }
  .modal-backdrop.visible { opacity: 1; pointer-events: auto; }

  .modal-sheet {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 480px;
    background: var(--bg-card);
    border-radius: 24px 24px 0 0;
    z-index: 100;
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 -16px 32px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    max-height: 90dvh;
  }
  .modal-sheet.visible { transform: translateX(-50%) translateY(0); }

  /* ----- Chat sheet ----- */
  .chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
  }
  .chat-header-grip {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 4px;
    background: #D1D5DB;
    border-radius: 2px;
  }
  .chat-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--chon-green-soft);
    color: var(--chon-green);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px var(--chon-green) inset;
  }
  .chat-name { flex: 1; font-size: 16px; font-weight: 800; }
  .chat-sub { font-size: 11px; color: var(--chon-green); font-weight: 700; margin-top: 1px; }
  .chat-name-wrap { flex: 1; min-width: 0; }
  .chat-close {
    width: 32px; height: 32px;
    border: none; background: transparent;
    cursor: pointer; font-size: 18px;
    color: var(--text-secondary);
    font-family: inherit;
  }
  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--bg-app);
    min-height: 240px;
  }
  .chat-day {
    align-self: center;
    font-size: 11px;
    color: var(--text-tertiary);
    background: white;
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    margin: 4px 0;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .chat-msg {
    max-width: 72%;
    padding: 9px 13px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
    animation: msgIn 0.18s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .chat-msg.them {
    align-self: flex-start;
    background: white;
    color: var(--text-primary);
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow-sm);
  }
  .chat-msg.me {
    align-self: flex-end;
    background: var(--chon-orange);
    color: white;
    border-bottom-right-radius: 6px;
    box-shadow: 0 2px 8px rgba(247, 147, 30, 0.25);
  }
  .chat-msg-time {
    font-size: 10px;
    color: var(--text-tertiary);
    margin: 2px 4px;
    align-self: flex-end;
  }
  .chat-msg-time.them { align-self: flex-start; }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 10px 12px calc(10px + var(--safe-bottom));
    border-top: 1px solid var(--border-light);
    background: white;
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    height: 44px;
    background: var(--bg-app);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-pill);
    padding: 0 16px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    color: var(--text-primary);
  }
  .chat-input:focus { border-color: var(--chon-orange); }
  .chat-send {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--chon-orange);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .chat-send:disabled { background: var(--line); cursor: not-allowed; }
  .chat-send:not(:disabled):active { background: var(--chon-orange-dark); }

  /* ----- Invite sheet ----- */
  .invite-sheet {
    padding: 24px 22px calc(24px + var(--safe-bottom));
    position: relative;
  }
  .invite-grip {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 4px;
    background: #D1D5DB;
    border-radius: 2px;
  }
  .invite-icon {
    width: 64px; height: 64px;
    border-radius: 18px;
    background: var(--chon-yellow-soft);
    color: var(--chon-orange-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 12px auto 14px;
  }
  .invite-title {
    text-align: center;
    font-size: 19px;
    font-weight: 900;
    margin-bottom: 6px;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .invite-sub {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 8px;
  }
  .invite-sub strong { color: var(--chon-orange-dark); font-weight: 800; }
  .invite-name {
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    color: var(--text-primary);
    background: var(--bg-app);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-pill);
    padding: 8px 16px;
    display: inline-block;
    margin: 14px auto 18px;
  }
  .invite-name-row { text-align: center; }
  .invite-info {
    background: var(--chon-yellow-soft);
    border: 1px solid var(--chon-orange-light);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .invite-info-title { color: var(--chon-orange-dark); font-weight: 800; margin-bottom: 4px; }
  .invite-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .invite-btn {
    width: 100%;
    height: 52px;
    border-radius: var(--radius-pill);
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    border: 1.5px solid var(--line);
    background: white;
    color: var(--text-primary);
    transition: border-color 0.15s, background 0.12s;
  }
  .invite-btn.primary {
    background: var(--chon-orange);
    color: white;
    border-color: var(--chon-orange);
    box-shadow: 0 6px 16px rgba(247, 147, 30, 0.28);
  }
  .invite-btn.primary:active { background: var(--chon-orange-dark); }
  .invite-btn:not(.primary):hover { border-color: var(--chon-orange); }

  /* ============================================
     Bottom Nav (home.html 과 동일)
     ============================================ */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: white;
    border-top: 1px solid var(--border-light);
    padding: 8px 8px calc(8px + var(--safe-bottom));
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    align-items: end;
    z-index: 40;
    box-shadow: 0 -6px 24px rgba(0,0,0,0.05);
  }
  .nav-btn {
    background: none;
    border: none;
    padding: 8px 4px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    font-family: inherit;
    color: var(--text-tertiary);
    border-radius: 12px;
    transition: color 0.15s;
  }
  .nav-btn-icon { font-size: 22px; line-height: 1; }
  .nav-btn-label { font-size: 10px; font-weight: 800; }
  .nav-btn.active { color: var(--chon-orange-dark); }
  .nav-btn.center {
    position: relative;
    padding-top: 0;
  }
  .nav-btn.center .nav-circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--chon-yellow), var(--chon-orange));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 6px 16px rgba(247,147,30,0.4), 0 0 0 4px white;
    margin-top: -20px;
    transition: transform 0.18s;
  }
  .nav-btn.center:active .nav-circle { transform: scale(0.94); }
  .nav-btn.center .nav-btn-label {
    color: var(--chon-orange-dark);
    margin-top: 4px;
  }

  /* ============================================
     Toast
     ============================================ */
  .toast {
    position: fixed;
    bottom: calc(var(--nav-h) + var(--cta-h) + var(--safe-bottom) + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: #1F1F1F;
    color: white;
    padding: 12px 22px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <button type="button" class="brand brand-button" onclick="location.href='./home.html'" aria-label="홈으로 이동">
      <div class="brand-mark">P</div>
      <div class="brand-text">
        <div class="brand-name">PASS</div>
        <div class="brand-sub">관계형 SNS</div>
      </div>
    </button>
    <div class="header-actions">
      <button type="button" class="icon-btn" onclick="openScanner()" aria-label="QR 스캔" title="QR 스캔"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1.5"/></svg></button>
      <button type="button" class="icon-btn" onclick="location.href='./home.html?page=auth'" aria-label="알림">
        🔔
        <span class="icon-btn-dot"></span>
      </button>
    </div>
  </header>

  <div class="welcome-bar">
    <span class="welcome-emoji">👋</span>
    <span class="welcome-msg"><button type="button" class="welcome-user" onclick="location.href='./cert.html'">사용자</button>님 환영합니다 · 오늘도 즐거운 하루되세요</span>
  </div>

  <div class="search-wrap">
    <label class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="M21 21l-4.35-4.35"></path>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="이름 또는 전화번호 검색" oninput="onSearch()"/>
    </label>
  </div>

  <main class="content">
    <!-- CHON 가족 -->
    <section class="section">
      <div class="section-badge">
        CHON 가족 <span class="count" id="countChon">0</span>
      </div>
      <div class="section-block" id="listChon"></div>
    </section>

    <!-- 초대 가능 -->
    <section class="section">
      <div class="section-badge invite">
        초대 가능 <span class="count" id="countInvite">0</span>
      </div>
      <div class="section-block" id="listInvite"></div>
    </section>
  </main>

  <div class="cta-area">
    <button class="cta-btn" onclick="openManualInput()">전화번호로 직접 입력</button>
  </div>

  <!-- ============ 채팅/초대 시트 ============ -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="closeSheets()"></div>

  <!-- 채팅 시트 (인증된 CHON 가족) -->
  <div class="modal-sheet" id="chatSheet" role="dialog" aria-modal="true" aria-labelledby="chatName">
    <div class="chat-header-grip"></div>
    <div class="chat-header">
      <div class="chat-avatar" id="chatAvatar">·</div>
      <div class="chat-name-wrap">
        <div class="chat-name" id="chatName">대화</div>
        <div class="chat-sub">● CHON 인증된 모임원</div>
      </div>
      <button type="button" class="chat-close" onclick="closeSheets()" aria-label="닫기">✕</button>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <form class="chat-input-row" id="chatForm" onsubmit="sendChatMessage(event)">
      <input type="text" class="chat-input" id="chatInput" placeholder="메시지 입력" autocomplete="off"/>
      <button type="submit" class="chat-send" id="chatSendBtn" aria-label="전송">➤</button>
    </form>
  </div>

  <!-- 초대 시트 (미인증 — 초대 가능) -->
  <div class="modal-sheet invite-sheet" id="inviteSheet" role="dialog" aria-modal="true" aria-labelledby="inviteTitle">
    <div class="invite-grip"></div>
    <div class="invite-icon">📨</div>
    <h2 class="invite-title" id="inviteTitle">CHON 인증으로 초대</h2>
    <p class="invite-sub">아직 CHON 가입이 안 된 분이에요.<br/>초대 메시지를 보내면 가입 후 <strong>상호 인증</strong>을 통해 안전하게 대화할 수 있어요.</p>
    <div class="invite-name-row">
      <span class="invite-name" id="inviteName">—</span>
    </div>
    <div class="invite-info">
      <div class="invite-info-title">📌 인증 단계 안내</div>
      <div>① 초대 링크 전송 → ② 상대가 CHON 가입 → ③ 자동 매칭 → ④ 상호 인증 후 채팅 시작</div>
    </div>
    <div class="invite-actions">
      <button type="button" class="invite-btn primary" onclick="sendInvite()">SMS / 카카오로 초대하기</button>
      <button type="button" class="invite-btn" onclick="closeSheets()">취소</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <button type="button" class="nav-btn" onclick="location.href='./home.html'">
      <div class="nav-btn-icon">🏠</div>
      <div class="nav-btn-label">홈</div>
    </button>
    <button type="button" class="nav-btn active">
      <div class="nav-btn-icon">📰</div>
      <div class="nav-btn-label">연락처</div>
    </button>
    <button type="button" class="nav-btn center" onclick="location.href='./cert.html'">
      <div class="nav-circle">🆔</div>
      <div class="nav-btn-label">증명서</div>
    </button>
    <button type="button" class="nav-btn" onclick="location.href='./home.html?page=auth'">
      <div class="nav-btn-icon">🤝</div>
      <div class="nav-btn-label">인증</div>
    </button>
    <button type="button" class="nav-btn" onclick="location.href='./all.html'">
      <div class="nav-btn-icon">☰</div>
      <div class="nav-btn-label">전체</div>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 페이지 라우팅
// ============================================================
function goPage(page) {
  const map = {
    home:    './home.html',
    id:      './cert.html',
    family:  '../views/family-tree.html',
    profile: './all.html',
  };
  if (map[page]) location.href = map[page];
}

function openManualInput() {
  const phone = prompt('초대할 전화번호를 입력해 주세요 (예: 010-1234-5678)');
  if (!phone) return;
  showToast('초대 메시지를 전송했습니다 (' + phone + ')');
}

// ============================================================
// Toast
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('visible'), 1800);
}

// ============================================================
// 연락처 데이터 (백엔드 GET /api/contacts 시도 → 실패 시 데모 데이터)
// ============================================================
const DEMO_CONTACTS = {
  chon: [
    { name: 'morow',  phone: '010-6864-6650', avatar: 'https://i.pravatar.cc/120?img=11' },
    { name: '민가영', phone: '010-7540-0733', avatar: 'https://i.pravatar.cc/120?img=14' },
  ],
  invite: [
    { name: '#1-1 장은지 상담사',   phone: '010-7714-8809', c: 0 },
    { name: '#1-10 허인숙 상담사님', phone: '010-3372-4016', c: 1 },
    { name: '#1-2 이수인 상담사',   phone: '010-8897-5684', c: 2 },
    { name: '#1-3 허성숙 상담사',   phone: '010-5141-6725', c: 3 },
    { name: '#1-4 박지은 상담사',   phone: '010-2298-1142', c: 4 },
    { name: '#1-5 김현주 상담사',   phone: '010-9925-3318', c: 5 },
  ],
};

let state = { chon: [], invite: [], filterQ: '' };

async function loadContacts() {
  // 백엔드 호출 시도 (로그인된 경우만) — 응답은 ContactLink[] 배열
  if (window.PassAPI && PassAPI.isLoggedIn && PassAPI.isLoggedIn()) {
    try {
      const links = await PassAPI.contacts.list();
      if (Array.isArray(links) && links.length > 0) {
        const matched   = links.filter(l => l.registered);
        const unmatched = links.filter(l => !l.registered);
        state.chon = matched.map(l => ({
          name: l.target?.name || l.displayName || '(이름 없음)',
          phone: '', // 폰 번호는 해시만 저장 (개인정보 보호)
          avatar: l.target?.avatar || null,
        }));
        state.invite = unmatched.map((l, i) => ({
          name: l.displayName || '(이름 없음)',
          phone: '',
          c: i % 6,
        }));
        render();
        return;
      }
    } catch (e) { /* 데모 데이터로 fallback */ }
  }
  // Fallback — 디자인 검증용 데모 데이터 (전화번호 포함)
  state.chon = DEMO_CONTACTS.chon;
  state.invite = DEMO_CONTACTS.invite;
  render();
}

function matchQ(item, q) {
  if (!q) return true;
  const lower = q.toLowerCase().replace(/\s+/g, '');
  return item.name.toLowerCase().includes(lower)
      || item.phone.replace(/[^0-9]/g, '').includes(lower.replace(/[^0-9]/g, ''));
}

function render() {
  const q = state.filterQ;
  const chon   = state.chon.filter(c => matchQ(c, q));
  const invite = state.invite.filter(c => matchQ(c, q));

  document.getElementById('countChon').textContent   = chon.length;
  document.getElementById('countInvite').textContent = invite.length;

  const chonEl = document.getElementById('listChon');
  if (chon.length === 0) {
    chonEl.innerHTML = '<div class="empty-row">매칭된 연락처가 없습니다</div>';
  } else {
    chonEl.innerHTML = chon.map(item => `
      <div class="contact-item" onclick="openContact('chon', '${escapeAttr(item.name)}')">
        <div class="avatar ring-green">
          ${item.avatar
            ? `<img src="${item.avatar}" alt=""/>`
            : `<span>${item.name.slice(0,1)}</span>`}
        </div>
        <div class="contact-info">
          <div class="contact-name">${escapeHtml(item.name)}</div>
          <div class="contact-phone">${escapeHtml(item.phone)}</div>
        </div>
        <button type="button" class="contact-arrow green" aria-label="열기">›</button>
      </div>
    `).join('');
  }

  const inviteEl = document.getElementById('listInvite');
  if (invite.length === 0) {
    inviteEl.innerHTML = '<div class="empty-row">초대 가능한 연락처가 없습니다</div>';
  } else {
    inviteEl.innerHTML = invite.map(item => `
      <div class="contact-item" onclick="openContact('invite', '${escapeAttr(item.name)}')">
        <div class="avatar hash" data-c="${item.c ?? 0}">#</div>
        <div class="contact-info">
          <div class="contact-name">${escapeHtml(item.name)}</div>
          <div class="contact-phone">${escapeHtml(item.phone)}</div>
        </div>
        <button type="button" class="contact-arrow orange" aria-label="초대">›</button>
      </div>
    `).join('');
  }
}

function openContact(kind, name) {
  if (kind === 'chon') {
    openChatWith(name);
  } else {
    openInviteFor(name);
  }
}

// =========================================================
// Sheets — Chat / Invite
// =========================================================
let chatTarget = null;

// 사람당 대화 이력 (간단 캐시 — 새로고침하면 사라짐)
const chatHistories = {};

function getInitial(name) {
  return (name || '').slice(0, 1) || '?';
}

function nowHM() {
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${hh}:${mm}`;
}

function openChatWith(name) {
  chatTarget = name;
  document.getElementById('chatName').textContent = name;
  document.getElementById('chatAvatar').textContent = getInitial(name);
  // 이력 로드 (없으면 데모 인사 1개)
  if (!chatHistories[name]) {
    chatHistories[name] = [
      { who: 'them', text: '안녕하세요! 반가워요 😊', time: nowHM() },
    ];
  }
  renderChat();
  document.getElementById('modalBackdrop').classList.add('visible');
  document.getElementById('chatSheet').classList.add('visible');
  setTimeout(() => document.getElementById('chatInput').focus(), 250);
}

function openInviteFor(name) {
  chatTarget = name;
  document.getElementById('inviteName').textContent = name;
  document.getElementById('modalBackdrop').classList.add('visible');
  document.getElementById('inviteSheet').classList.add('visible');
}

function closeSheets() {
  document.getElementById('modalBackdrop').classList.remove('visible');
  document.getElementById('chatSheet').classList.remove('visible');
  document.getElementById('inviteSheet').classList.remove('visible');
  chatTarget = null;
}

function renderChat() {
  if (!chatTarget) return;
  const body = document.getElementById('chatBody');
  const history = chatHistories[chatTarget] || [];
  const today = new Date();
  const dayLabel = `${today.getMonth()+1}월 ${today.getDate()}일`;
  body.innerHTML =
    `<div class="chat-day">${dayLabel}</div>` +
    history.map(m => `
      <div class="chat-msg ${m.who}">${escapeHtml(m.text)}</div>
      <div class="chat-msg-time ${m.who}">${m.time}</div>
    `).join('');
  // 스크롤을 맨 아래로
  setTimeout(() => { body.scrollTop = body.scrollHeight; }, 0);
}

function sendChatMessage(e) {
  if (e) e.preventDefault();
  if (!chatTarget) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  chatHistories[chatTarget].push({ who: 'me', text, time: nowHM() });
  input.value = '';
  renderChat();
  // 데모 자동 응답 (1~2초 후)
  setTimeout(() => {
    if (!chatTarget) return;
    const replies = [
      '네 알겠어요!',
      '좋아요 👍',
      '확인할게요 🙏',
      '오케이 곧 답할게요',
      '재밌네요 😄',
    ];
    chatHistories[chatTarget].push({
      who: 'them',
      text: replies[Math.floor(Math.random() * replies.length)],
      time: nowHM(),
    });
    renderChat();
  }, 800 + Math.random() * 800);
}

function sendInvite() {
  if (!chatTarget) return;
  closeSheets();
  showToast('📨 ' + chatTarget + '님에게 초대 메시지를 보냈어요');
}

// ESC 로 시트 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheets();
});

function onSearch() {
  state.filterQ = document.getElementById('searchInput').value.trim();
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

loadContacts();
</script>
<script src="../lib/welcome-name.js"></script>
<script src="../lib/chat-popup.js"></script>
</body>
</html>
